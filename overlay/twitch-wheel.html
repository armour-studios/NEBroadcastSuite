<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twitch Giveaway Wheel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      font-family: 'Inter', sans-serif;
      color: white;
      overflow: hidden;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #wheel-container {
      position: relative;
      width: 480px;
      height: 480px;
      display: none;
      filter: drop-shadow(0 12px 48px rgba(5, 95, 219, 0.4));
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      position: relative;
      transition: transform 0.05s linear;
    }

    .wheel-segment {
      position: absolute;
      width: 100%;
      height: 100%;
      clip-path: polygon(50% 50%, 50% 0%, 100% 0%);
      transform-origin: 50% 50%;
    }

    .segment-fill {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      clip-path: polygon(50% 50%, 50% 0%, 100% 0%);
      font-size: 13px;
      font-weight: 700;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      position: relative;
    }

    .segment-label {
      position: absolute;
      transform: translateX(60px) rotate(var(--rotation));
      transform-origin: 0 0;
      white-space: nowrap;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      max-width: 80px;
      text-align: center;
      line-height: 1.2;
    }

    .wheel-pointer {
      position: absolute;
      top: -20px;
      left: 50%;
      width: 0;
      height: 0;
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      border-top: 30px solid #FFD700;
      transform: translateX(-50%);
      z-index: 10;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
    }

    .wheel-center {
      position: absolute;
      width: 60px;
      height: 60px;
      background: radial-gradient(circle at 30% 30%, #4ECDC4, #45B7B1);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 4px solid #FFD700;
      z-index: 8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      box-shadow: 0 4px 16px rgba(78, 205, 196, 0.4);
    }

    #winner-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 20;
      display: none;
      background: rgba(0, 0, 0, 0.95);
      padding: 32px;
      border-radius: 12px;
      border: 2px solid #FFD700;
      min-width: 300px;
      animation: popIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    @keyframes popIn {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    #winner-display h2 {
      font-size: 28px;
      color: #FFD700;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    #winner-display p {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #4ECDC4;
    }

    #winner-display .prize {
      font-size: 14px;
      color: #FFE66D;
      margin-top: 12px;
      font-weight: 600;
    }

    .spinning {
      animation: spin 4s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .stats {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.85);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 11px;
      color: #9CA3AF;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: none;
    }

    .stats.active {
      display: block;
    }
  </style>
</head>
<body>

<div id="wheel-container">
  <div class="wheel-pointer"></div>
  <div class="wheel" id="wheel">
    <!-- Segments generated by JavaScript -->
  </div>
  <div class="wheel-center">SPIN!</div>

  <div id="winner-display">
    <h2>🎉 WINNER 🎉</h2>
    <p id="winner-name"></p>
    <div class="prize" id="winner-prize"></div>
  </div>

  <div class="stats" id="wheel-stats">
    <div>Participants: <strong id="participant-count">0</strong></div>
    <div>Spins: <strong id="spin-count">0</strong></div>
  </div>
</div>

<script src="scene-base.js"></script>
<script>
  const COLORS = [
    '#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3',
    '#F38181', '#AA96DA', '#FCBAD3', '#A8D8EA'
  ];

  let wheelState = null;
  let isSpinning = false;
  let currentRotation = 0;

  function generateWheelSegments(prizes) {
    const wheel = document.getElementById('wheel');
    const segmentAngle = 360 / prizes.length;

    wheel.innerHTML = prizes.map((prize, i) => {
      const rotation = segmentAngle * i;
      const color = COLORS[i % COLORS.length];

      return `
        <div class="wheel-segment" style="transform: rotate(${rotation}deg);">
          <div class="segment-fill" style="background: ${color};">
            <div class="segment-label" style="--rotation: ${segmentAngle / 2}deg;">
              ${prize.name}
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function calculateWinnerIndex(prizes, targetRotation) {
    // Normalize rotation to 0-360
    let normalizedRotation = targetRotation % 360;
    if (normalizedRotation < 0) normalizedRotation += 360;

    // Pointer is at top (0°), so we calculate which segment it points to
    const segmentAngle = 360 / prizes.length;
    const index = Math.floor(normalizedRotation / segmentAngle);

    return Math.min(index, prizes.length - 1);
  }

  function spinWheel(participants, prizes) {
    if (isSpinning || !participants || participants.length === 0) {
      return;
    }

    isSpinning = true;
    const wheel = document.getElementById('wheel');
    const container = document.getElementById('wheel-container');

    // 4 full rotations + random additional rotation to land on winner
    const fullSpins = 4 * 360;
    const targetSegmentAngle = 360 / prizes.length;

    // Calculate how much additional rotation to land on a weighted random winner
    const totalWeight = participants.reduce((sum, p) => sum + p.weight, 0);
    let rand = Math.random() * totalWeight;
    let winnerIdx = 0;

    for (let i = 0; i < participants.length; i++) {
      rand -= participants[i].weight;
      if (rand <= 0) {
        winnerIdx = i;
        break;
      }
    }

    // Map participant to prize index
    const winner = participants[winnerIdx];
    let prizeIndex = prizes.findIndex(p => p.name === winner.prizePreference || p.id);

    if (prizeIndex === -1) {
      prizeIndex = Math.floor(Math.random() * prizes.length);
    }

    // Calculate exact rotation to land on winner prize
    const additionalRotation = prizeIndex * targetSegmentAngle + Math.random() * targetSegmentAngle;
    const finalRotation = fullSpins + additionalRotation;

    wheel.classList.add('spinning');
    wheel.style.transition = 'none';
    wheel.style.transform = `rotate(${currentRotation}deg)`;

    setTimeout(() => {
      wheel.style.transition = 'transform 4s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
      wheel.style.transform = `rotate(${currentRotation + finalRotation}deg)`;
      currentRotation += finalRotation;

      setTimeout(() => {
        wheel.classList.remove('spinning');
        isSpinning = false;
        showWinner(winner, prizes[prizeIndex]);
      }, 4000);
    }, 50);
  }

  function showWinner(winner, prize) {
    const display = document.getElementById('winner-display');
    const nameEl = document.getElementById('winner-name');
    const prizeEl = document.getElementById('winner-prize');

    if (nameEl) nameEl.textContent = winner.displayName || 'Viewer';
    if (prizeEl) prizeEl.textContent = `Prize: ${prize.name}`;

    display.style.display = 'block';

    setTimeout(() => {
      display.style.display = 'none';
    }, 5000);
  }

  SceneBase.connect(state => {
    const container = document.getElementById('wheel-container');
    const wheel = state.twitch?.wheel;

    if (!wheel) {
      container.style.display = 'none';
      return;
    }

    // Initialize wheel if prizes changed
    if (!wheelState || JSON.stringify(wheelState.prizes) !== JSON.stringify(wheel.prizes)) {
      wheelState = wheel;
      generateWheelSegments(wheel.prizes);
      container.style.display = 'flex';
    }

    // Update stats
    const participantCount = document.getElementById('participant-count');
    if (participantCount) {
      participantCount.textContent = wheel.participants?.length || 0;
    }

    const spinCount = document.getElementById('spin-count');
    if (spinCount) {
      spinCount.textContent = wheel.history?.length || 0;
    }

    // Handle spin request
    if (wheel.current && wheel.current.spinning && !isSpinning) {
      spinWheel(wheel.participants, wheel.prizes);
    }
  });
</script>

</body>
</html>
