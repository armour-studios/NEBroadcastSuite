// The bottom bar is built ONCE and updated in place (no per-tick <img> churn = no flicker).
let focusRefs = null;
function buildFocus(){
  const f = el('focus'); f.innerHTML = '';
  const mk = (label, cls) => {
    const c = document.createElement('div'); c.className = 'fcell ' + cls;
    const l = document.createElement('div'); l.className = 'lbl'; l.textContent = label;
    const v = document.createElement('div'); v.className = 'val';
    c.appendChild(l); c.appendChild(v); return { cell: c, val: v };
  };
  const who = document.createElement('div'); who.className = 'who';
  const hp = mk('HP', 'fhp'); const hpNum = document.createElement('span'); hp.val.appendChild(hpNum);
  const armor = mk('ARMOR', 'farmor');
  const armorIc = document.createElement('span'); armorIc.className = 'armor-ic-wrap';
  const armorNum = document.createElement('span'); armor.val.appendChild(armorIc); armor.val.appendChild(armorNum);
  const kad = mk('', 'fkad');
  const killIc = utilImg('elimination', 16, 'kad-ic'); const killN = document.createElement('span');
  const asN = document.createElement('span'); asN.className = 'kad-as';
  const skull = document.createElement('span'); skull.className = 'kad-skull'; skull.innerHTML = DEATH_SVG;
  const deathN = document.createElement('span');
  kad.val.appendChild(killIc); kad.val.appendChild(killN); kad.val.appendChild(asN);
  kad.val.appendChild(skull); kad.val.appendChild(deathN);
  const money = mk('MONEY', 'fmoney'); const moneyN = document.createElement('span'); money.val.appendChild(moneyN);
  const load = mk('LOADOUT', 'floadout');
  const fload = document.createElement('div'); fload.className = 'fload'; load.val.appendChild(fload);
  f.appendChild(who); f.appendChild(hp.cell); f.appendChild(armor.cell);
  f.appendChild(kad.cell); f.appendChild(money.cell); f.appendChild(load.cell);
  const bar = document.createElement('div'); bar.className = 'focus-hpbar';
  const fill = document.createElement('div'); fill.className = 'focus-hpfill'; bar.appendChild(fill); f.appendChild(bar);
  focusRefs = { who, hpCell: hp.cell, hpNum, armorIc, armorNum, killN, asN, deathN, moneyN,
    fload, fill, ammoEl: null, lastArmor: '', lastLoad: '' };
}

// Two-line bar:  row1 = NAME · HP · ARMOR,  row2 = [kill]K · [skull]D · MONEY · loadout
function renderFocus(o){
  const f = el('focus');
  if (!o || !o.name) { f.classList.add('hidden'); return; }
  if (!focusRefs) buildFocus();
  const r = focusRefs;
  f.classList.remove('hidden');
  f.classList.toggle('ct-side', o.team === 'CT');
  f.classList.toggle('t-side', o.team !== 'CT');

  r.who.textContent = o.name;
  r.hpNum.textContent = o.alive ? o.health : '☠';
  r.hpCell.classList.remove('hp-low', 'hp-crit');
  if (o.alive && o.health <= 20) r.hpCell.classList.add('hp-crit');
  else if (o.alive && o.health <= 50) r.hpCell.classList.add('hp-low');

  const armorSig = o.helmet ? 'h' : 'a';
  if (r.lastArmor !== armorSig){ r.lastArmor = armorSig; r.armorIc.innerHTML = ''; r.armorIc.appendChild(utilImg(o.helmet ? 'armor_helmet' : 'armor', 16, 'farmor-ic')); }
  r.armorNum.textContent = o.armor;

  r.killN.textContent = o.kills;
  r.asN.textContent = o.assists ? '+' + o.assists : '';
  r.deathN.textContent = o.deaths;
  r.moneyN.textContent = '$' + o.money;

  // Loadout: rebuild weapon/grenade images only when they change; ammo text updates each tick.
  const loadSig = `${o.weapon}|${(o.nades||[]).join(',')}|${o.hasKit?1:0}|${o.hasBomb?1:0}`;
  if (r.lastLoad !== loadSig){
    r.lastLoad = loadSig;
    r.fload.innerHTML = '';
    if (o.weapon) r.fload.appendChild(weaponImg(o.weapon, 24));
    const ammo = document.createElement('span'); ammo.className = 'fammo'; r.fload.appendChild(ammo); r.ammoEl = ammo;
    const util = loadoutIcons(o, 16);
    if (util.childNodes.length) r.fload.appendChild(util);
  }
  if (r.ammoEl) r.ammoEl.textContent = (o.clip !== null && o.clip !== undefined) ? `${o.clip}/${o.reserve ?? 0}` : '';

  r.fill.className = 'focus-hpfill' + (o.alive ? (o.health <= 20 ? ' crit' : o.health <= 50 ? ' low' : '') : '');
  r.fill.style.width = (o.alive ? Math.max(0, Math.min(100, o.health)) : 0) + '%';
}

const BOMB_TIME = 40; // CS2 C4 detonation time (seconds) — drives the drain bar

// ── Radar: world→image calibration per map (radar PNG is 1024×1024).
//    Exact CS2 overview pos_x / pos_y / scale, from the .txt files that ship
//    with the radar images (github.com/2mlml/cs2-radar-images). ──
const RADAR_CAL = {
  de_dust2:    { x: -2476, y: 3239, scale: 4.4 },
  de_mirage:   { x: -3230, y: 1713, scale: 5.0 },
  de_inferno:  { x: -2087, y: 3870, scale: 4.9 },
  de_nuke:     { x: -3453, y: 2887, scale: 7.0 },
  de_overpass: { x: -4831, y: 1781, scale: 5.2 },
  de_vertigo:  { x: -3168, y: 1762, scale: 4.0 },
  de_ancient:  { x: -2953, y: 2164, scale: 5.0 },
  de_anubis:   { x: -2796, y: 3328, scale: 5.22 },
  de_train:    { x: -2308, y: 2078, scale: 4.082077 }
};

// Bombsite label positions in radar-image space (left%, top%). Read off the radar
// PNGs — approximate; nudge per map if a letter sits off its site.
const SITE_POS = {
  de_dust2:    { A: { l: 80, t: 16 }, B: { l: 18, t: 13 } },
  de_mirage:   { A: { l: 23, t: 28 }, B: { l: 52, t: 77 } },
  de_inferno:  { A: { l: 48, t: 22 }, B: { l: 82, t: 67 } },
  de_nuke:     { A: { l: 58, t: 50 }, B: { l: 55, t: 62 } },
  de_overpass: { A: { l: 42, t: 20 }, B: { l: 36, t: 52 } },
  de_vertigo:  { A: { l: 21, t: 25 }, B: { l: 70, t: 59 } },
  de_ancient:  { A: { l: 28, t: 27 }, B: { l: 75, t: 42 } },
  de_anubis:   { A: { l: 76, t: 26 }, B: { l: 33, t: 49 } },
  de_train:    { A: { l: 50, t: 40 }, B: { l: 52, t: 78 } }
};

function imgCoord(pos, cal){            // world → radar image space (0..1024)
  return { x: (pos.x - cal.x) / cal.scale, y: (cal.y - pos.y) / cal.scale };
}
function worldToPct(pos, cal){          // marker position as % of the FULL map (world layer does the zoom)
  const c = imgCoord(pos, cal);
  return { left: c.x / 1024 * 100, top: c.y / 1024 * 100 };
}

// Auto zoom/pan ("follow the action"): eased viewport over the 1024² radar image.
let radarVP = { x0: 0, y0: 0, size: 1024 };
function radarViewportTarget(players, bomb, cal){
  // Auto-zoom disabled — always show the whole map (no pan/zoom to the action).
  return { x0: 0, y0: 0, size: 1024 };
}

const dotReg = new Map(); // steamid (or '__bomb__') -> dot element

function renderRadar(cs){
  const box = el('cs-radar');
  // Built-in radar off → boltobserv (or another external radar source) owns the top-left.
  if (!builtinRadar){ box.classList.add('hidden'); return; }
  const all = cs.players || [];
  const cal = RADAR_CAL[cs.map && cs.map.name];
  // Show the map whenever we know which map it is. Player dots need observer/spectator
  // GSI (positions) — but the map + A/B labels render regardless so it's never blank.
  if (!cal){ box.classList.add('hidden'); return; }
  box.classList.remove('hidden');

  if (box.dataset.map !== cs.map.name){     // swap the map image + A/B labels only when the map changes
    box.dataset.map = cs.map.name;
    const img = el('radar-img');
    img.classList.remove('hidden');
    img.onerror = () => { img.classList.add('hidden'); box.classList.add('no-map'); };
    img.onload  = () => { img.classList.remove('hidden'); box.classList.remove('no-map'); };
    img.src = '/assets/csgo/maps/' + cs.map.name + '.png';

    const sites = el('radar-sites'); sites.innerHTML = '';
    const sp = SITE_POS[cs.map.name];
    if (sp) ['A', 'B'].forEach(k => {
      if (!sp[k]) return;
      const s = document.createElement('div'); s.className = 'rsite'; s.textContent = k;
      s.style.left = sp[k].l + '%'; s.style.top = sp[k].t + '%';
      sites.appendChild(s);
    });
  }

  // Auto zoom/pan: ease the stored viewport toward the live action and drive the world layer.
  const target = radarViewportTarget(all, cs.bomb, cal);
  radarVP.x0 += (target.x0 - radarVP.x0) * 0.16;
  radarVP.y0 += (target.y0 - radarVP.y0) * 0.16;
  radarVP.size += (target.size - radarVP.size) * 0.16;
  const world = el('radar-world');
  const k = 1024 / radarVP.size;
  world.style.transform = `scale(${k.toFixed(4)}) translate(${(-radarVP.x0 / 1024 * 100).toFixed(3)}%, ${(-radarVP.y0 / 1024 * 100).toFixed(3)}%)`;
  world.style.setProperty('--rk', (radarVP.size / 1024).toFixed(4));   // counter-scale point markers

  // Grenades / smokes / molotovs — transient, rebuilt each tick (scale with the world).
  const fx = el('radar-fx'); fx.innerHTML = '';
  (cs.grenades || []).forEach(g => {
    if (!g || g.x == null) return;
    const c = worldToPct({ x: g.x, y: g.y }, cal);
    const d = document.createElement('div'); d.className = 'gren ' + (g.type || '');
    d.style.left = c.left + '%'; d.style.top = c.top + '%';
    fx.appendChild(d);
  });

  const layer = el('radar-dots');
  const activeId = (cs.observed && cs.observed.steamid) || '';
  const seen = new Set();

  // Show every player we have a position for: alive = team dot + facing; dead = faded X.
  all.filter(p => p.pos).forEach(p => {
    seen.add(p.steamid);
    let d = dotReg.get(p.steamid);
    if (!d){                                  // dot = colored circle + facing "nose" + number
      d = document.createElement('div');
      const nose = document.createElement('div'); nose.className = 'rdot-nose';
      const num = document.createElement('span'); num.className = 'rdot-num';
      d.appendChild(nose); d.appendChild(num);
      dotReg.set(p.steamid, d); layer.appendChild(d);
    }
    // Spectate-key number (observer_slot 0→"1" … 9→"0"); blank when unknown or dead.
    const num = d.lastChild;
    num.textContent = (p.alive && p.slot != null && p.slot < 99) ? String((p.slot + 1) % 10) : '';
    const low = p.alive && (p.health || 0) <= 30;
    d.className = 'rdot ' + (p.team === 'CT' ? 'ct' : 't')
      + (p.alive && p.steamid === activeId ? ' me' : '')
      + (p.alive && (p.smoked || 0) > 80 ? ' smoked' : '')   // dim players hidden in smoke
      + (!p.alive ? ' dead' : '')
      + (p.alive && p.hasBomb ? ' carry' : '')               // bomb carrier ring
      + (low ? ' low' : '');                                  // low-HP ring
    const c = worldToPct(p.pos, cal);
    d.style.left = c.left + '%'; d.style.top = c.top + '%';
    // Facing arrow from the view/forward vector (world→screen has Y flipped). Hidden when dead.
    const nose = d.firstChild;
    if (p.alive && p.fwd && (p.fwd.x || p.fwd.y)){
      const deg = Math.atan2(p.fwd.x, p.fwd.y) * 180 / Math.PI;
      nose.style.transform = `translate(-50%, -50%) rotate(${deg}deg) translateY(-11px)`;
      nose.style.display = '';
    } else { nose.style.display = 'none'; }
  });

  if (cs.bomb && cs.bomb.pos){
    let b = dotReg.get('__bomb__');
    if (!b){ b = document.createElement('div'); dotReg.set('__bomb__', b); layer.appendChild(b); }
    b.className = 'rbomb'; b.textContent = 'C4';
    const c = worldToPct(cs.bomb.pos, cal);
    b.style.left = c.left + '%'; b.style.top = c.top + '%';
    seen.add('__bomb__');
  }

  for (const [sid, dEl] of dotReg){ if (!seen.has(sid)){ dEl.remove(); dotReg.delete(sid); } }
}

// ── Kill feed — rows added/removed in place; the server feeds + expires the list. ──
const kfReg = new Map();   // event key -> row element
function kfKey(k){ return k.ts + '|' + (k.killer || '') + '|' + (k.victim || ''); }
function buildKillRow(k){
  const row = document.createElement('div'); row.className = 'kf-row';
  if (k.killer){
    const ks = document.createElement('span'); ks.className = 'kf-killer ' + (k.killerTeam === 'CT' ? 'ct' : 't');
    ks.textContent = k.killer; row.appendChild(ks);
  }
  const wpn = document.createElement('span'); wpn.className = 'kf-wpn';
  if (k.killer && k.weapon){ wpn.appendChild(weaponImg(k.weapon, 18)); }
  else { wpn.classList.add('kf-skull'); wpn.innerHTML = DEATH_SVG; }   // world / suicide
  row.appendChild(wpn);
  if (k.hs){ const hs = document.createElement('span'); hs.className = 'kf-hs'; row.appendChild(hs); }
  const vs = document.createElement('span'); vs.className = 'kf-victim ' + (k.victimTeam === 'CT' ? 'ct' : 't');
  vs.textContent = k.victim || ''; row.appendChild(vs);
  return row;
}
function renderKillfeed(feed){
  const box = el('cs-killfeed'); const list = feed || [];
  const seen = new Set();
  list.forEach(k => {
    const key = kfKey(k); seen.add(key);
    if (kfReg.has(key)) return;
    const row = buildKillRow(k); kfReg.set(key, row);
    box.insertBefore(row, box.firstChild);   // newest on top
  });
  for (const [key, row] of kfReg){
    if (seen.has(key)) continue;
    kfReg.delete(key);
    if (!row.classList.contains('leaving')){ row.classList.add('leaving'); setTimeout(() => row.remove(), 400); }
  }
}

// ── Buy / freeze phase board — both teams' economy + loadout, shown during freezetime ──
let _buySig = '';
function buyCell(p){
  const side = p.team === 'CT' ? 'ct' : 't';
  const dead = !p.alive;
  const money = '$' + (p.money || 0).toLocaleString();
  const equip = p.equip ? ('≈$' + (p.equip || 0).toLocaleString()) : '';
  // util column: grenades + kit + bomb
  let util = '';
  if (!dead) (p.nades || []).forEach(n => { util += `<img src="/assets/weapons/${nadeSvg(n)}.svg" alt="">`; });
  if (!dead && p.hasKit)  util += `<img src="/assets/csgo/shield.svg" alt="">`;
  if (!dead && p.hasBomb) util += `<img src="/assets/csgo/bomb_c4.svg" alt="">`;
  // gear column: armor + weapon (weapon sits in a fixed-width slot for row alignment)
  const armor = (!dead && (p.helmet || (p.armor || 0) > 0))
    ? `<img class="cb-armor" src="/assets/csgo/${p.helmet ? 'armor_helmet' : 'armor'}.svg" alt="">` : '';
  const weap = (!dead && p.weapon) ? `<img class="cb-weap" src="/assets/weapons/${p.weapon}.svg" alt="">` : '<span class="cb-weap"></span>';
  const kda = `<span class="k">${p.kills||0}</span>/<span class="d">${p.deaths||0}</span>/${p.assists||0}`;
  return `<div class="cb-cell ${side}">
    <div class="cb-money"><span class="cb-cash">${money}</span><span class="cb-equip">${equip}</span></div>
    <div class="cb-util">${util}</div>
    <div class="cb-gear">${armor}${weap}</div>
    <div class="cb-player"><span class="cb-name${dead ? ' dead' : ''}">${p.name || ''}</span><span class="cb-kda">${kda}</span></div>
  </div>`;
}
function renderBuyPhase(cs){
  const box = el('cs-buy'); if (!box) return;
  const all = cs.players || [];
  const ct = all.filter(p => p.team === 'CT');
  const t  = all.filter(p => p.team === 'T');
  // Rebuild only when buy-relevant data changes (players keep buying through freezetime).
  const sig = JSON.stringify(all.map(p => [p.steamid, p.money, p.equip, p.weapon, p.hasKit, p.hasBomb, p.helmet, p.armor, (p.nades||[]).join(','), p.kills, p.deaths, p.assists, p.alive])
    .concat([cs.ct.score, cs.t.score, cs.round.number, appTeams.blue.name, appTeams.orange.name]));
  if (sig === _buySig) return;
  _buySig = sig;

  const ctLogo = appTeams.blue.logo || CS_LOGO_FALLBACK, tLogo = appTeams.orange.logo || CS_LOGO_FALLBACK;
  const ctLogoCls = appTeams.blue.logo ? '' : ' cs-fallback', tLogoCls = appTeams.orange.logo ? '' : ' cs-fallback';
  const rn = cs.round.number || 1;
  const bz = cs.phaseEndsIn != null ? ('BUY ' + fmtClock(cs.phaseEndsIn)) : 'BUY PHASE';

  // Round-history strip: team-tinted win-method icon + round number, with a halftime split.
  const hist = (cs.roundHistory || []);
  const rounds = hist.map(h => {
    const side = h.winner === 'CT' ? 'ct' : 't';
    const icon = ROUND_METHOD_ICON[h.method] || 'elimination';
    const gap = h.round === 13 ? '<div class="cb-rgap"></div>' : '';   // divider before the second half
    return `${gap}<div class="cb-rslot ${side}"><div class="cb-rico"><img src="/assets/csgo/${icon}.svg" alt=""></div><span class="cb-rnum">${h.round}</span></div>`;
  }).join('');

  const rows = Array.from({ length: Math.max(ct.length, t.length, 1) }, (_, i) => {
    const a = ct[i], b = t[i];
    return `<div class="cb-row">${a ? buyCell(a) : '<div class="cb-cell ct"></div>'}${b ? buyCell(b) : '<div class="cb-cell t"></div>'}</div>`;
  }).join('');

  box.innerHTML = `
    <div class="cb-header">
      <div class="cb-team ct">
        <img class="cb-logo${ctLogoCls}" src="${ctLogo}" alt=""><span class="cb-tname">${appTeams.blue.name || 'CT'}</span><span class="cb-score">${cs.ct.score}</span>
      </div>
      <div class="cb-mid"><div class="r">ROUND</div><div class="rn">${String(rn).padStart(2,'0')}</div><div class="bz">${bz}</div></div>
      <div class="cb-team t">
        <img class="cb-logo${tLogoCls}" src="${tLogo}" alt=""><span class="cb-tname">${appTeams.orange.name || 'T'}</span><span class="cb-score">${cs.t.score}</span>
      </div>
    </div>
    <div class="cb-rounds">${rounds}</div>
    <div class="cb-board">${rows}</div>`;
}

// Live "X VS X" — flashes up for ~2.5s whenever a player dies, then hides. No bars.
let prevTotalAlive = null;
let aliveHideTimer = null;
function renderAlive(players){
  const list = players || [];
  const box = el('cs-alive');
  const ctAlive = list.filter(p => p.team === 'CT' && p.alive).length;
  const tAlive  = list.filter(p => p.team === 'T'  && p.alive).length;
  el('alive-ct').textContent = ctAlive;
  el('alive-t').textContent  = tAlive;
  const total = ctAlive + tAlive;
  if (prevTotalAlive !== null && list.length && total < prevTotalAlive){   // a death happened
    box.classList.remove('hidden');
    bump('alive-ct'); bump('alive-t');
    if (aliveHideTimer) clearTimeout(aliveHideTimer);
    aliveHideTimer = setTimeout(() => box.classList.add('hidden'), 2500);
  }
  prevTotalAlive = list.length ? total : null;
}

// ── Broadcast callouts: round result + phase only (multi-kill/clutch removed — not reliable) ──
const METHOD_WORD = { elimination: 'ELIMINATION', bomb: 'BOMB', defuse: 'DEFUSE', time: 'TIME' };
let prevHistLen = -1;
let announceTimer = null;

function showAnnounce(html, ms){
  const a = el('cs-announce');
  a.innerHTML = html;
  a.classList.remove('hidden', 'pop'); void a.offsetWidth; a.classList.add('pop');
  if (announceTimer) clearTimeout(announceTimer);
  announceTimer = setTimeout(() => a.classList.add('hidden'), ms);
}

function renderCallouts(cs, live){
  el('cs-clutch').classList.add('hidden');   // clutch callout retired
  if (!live){ el('cs-phase').classList.add('hidden'); return; }

  // Round result — fire when a new round-win entry appears (from round_wins — accurate).
  const hist = cs.roundHistory || [];
  const roundEnd = (prevHistLen >= 0 && hist.length > prevHistLen) ? hist[hist.length - 1] : null;
  prevHistLen = hist.length;
  if (roundEnd){
    const w = roundEnd.winner === 'CT' ? 'ct' : 't';
    const m = METHOD_WORD[roundEnd.method] || '';
    showAnnounce(`<span class="an-win ${w}">${roundEnd.winner} WIN</span>` +
      (m ? `<span class="an-sep">·</span><span class="an-method">${m}</span>` : ''), 4200);
  }

  // Phase banner (halftime / timeout only). Warmup shows under the timer (round label), not centre-screen.
  const ph = cs.phase || '';
  const ptext = ph === 'intermission' ? 'HALFTIME'
    : ph.indexOf('timeout') === 0 ? 'TACTICAL TIMEOUT'
    : '';
  const pe = el('cs-phase');
  if (ptext){ pe.textContent = ptext; pe.classList.remove('hidden'); }
  else pe.classList.add('hidden');
}

// Sponsor rail — rotates through the brand's partners (sellable inventory).
function renderSponsors(){
  const rail = el('cs-sponsors');
  const sp = (brand && (brand.railSponsors || brand.sponsors)) || [];
  if (!sp.length){ rail.classList.add('hidden'); lastSponsorSig = ''; return; }
  rail.classList.remove('hidden');
  el('sp-label').textContent = (brand.sponsorLabel || 'PARTNERS');
  if (sponsorIdx >= sp.length) sponsorIdx = 0;
  const s = sp[sponsorIdx] || {};
  // Only touch the DOM (and replay the fade) when the shown sponsor changes — kills the per-update flicker.
  const sig = (brand.sponsorLabel || 'PARTNERS') + '|' + (s.logo || s.name || '');
  if (sig === lastSponsorSig) return;
  lastSponsorSig = sig;
  const slot = el('sp-slot'); slot.innerHTML = '';
  if (s.logo){ const img = document.createElement('img'); img.className = 'sp-logo'; img.src = s.logo; img.alt = s.name || ''; slot.appendChild(img); }
  else { const t = document.createElement('span'); t.className = 'sp-name'; t.textContent = s.name || ''; slot.appendChild(t); }
}

function startSponsorRotation(){
  if (sponsorTimer){ clearInterval(sponsorTimer); sponsorTimer = null; }
  const sp = (brand && (brand.railSponsors || brand.sponsors)) || [];
  if (sp.length > 1){
    const ms = Math.max(2, brand.sponsorInterval || 6) * 1000;
    sponsorTimer = setInterval(() => { sponsorIdx = (sponsorIdx + 1) % sp.length; renderSponsors(); }, ms);
  }
}

// Sponsor banner (bottom-right) — producer-controlled rotating images from full_state.banner.
let bannerTimer = null, bannerIdx = 0, lastBannerSig = '';
function renderBanner(b){
  const box = el('cs-banner'); if (!box) return;
  const imgs = (b && b.visible && Array.isArray(b.images)) ? b.images.filter(Boolean) : [];
  box.classList.toggle('show', imgs.length > 0);
  const sig = imgs.join('|') + '#' + ((b && b.interval) || 10);
  if (sig === lastBannerSig) return;           // unchanged → keep the running rotation (no flicker)
  lastBannerSig = sig;
  if (bannerTimer) { clearInterval(bannerTimer); bannerTimer = null; }
  const wrap = el('cs-banner-imgs'); wrap.innerHTML = '';
  if (!imgs.length) return;
  const els = imgs.map((src, i) => { const im = document.createElement('img'); im.className = 'cbn-img' + (i === 0 ? ' active' : ''); im.src = src; wrap.appendChild(im); return im; });
  bannerIdx = 0;
  if (els.length > 1){
    const ms = Math.max(3, (b.interval || 10)) * 1000;
    bannerTimer = setInterval(() => { els[bannerIdx].classList.remove('active'); bannerIdx = (bannerIdx + 1) % els.length; els[bannerIdx].classList.add('active'); }, ms);
  }
}

// Apply the brand kit: recolor accents, swap font, drive the sponsor rail.
function applyBrand(){
  const root = document.documentElement;
  if (brand){
    if (brand.color)  root.style.setProperty('--accent', brand.color);
    if (brand.accent) root.style.setProperty('--accent-2', brand.accent);
    if (brand.font)   root.style.setProperty('--main-font', `'${brand.font}', sans-serif`);
  }
  // Only restart the rotation when the sponsor SET changes; otherwise a repeated brand apply
  // (e.g. every full_state) would keep resetting the timer and re-trigger the animation.
  const sp = (brand && (brand.railSponsors || brand.sponsors)) || [];
  const listSig = (brand && brand.sponsorLabel || '') + '#' + sp.map(x => x.logo || x.name || '').join('|');
  if (listSig !== lastSponsorListSig){
    lastSponsorListSig = listSig;
    sponsorIdx = 0;
    renderSponsors();
    startSponsorRotation();
  } else {
    renderSponsors();   // guarded → no-op unless the shown sponsor changed
  }
}

function render(cs){
  const live = !!(cs && cs.connected);
  cs = live ? cs : DEMO;
  el('preview-badge').classList.toggle('hidden', live);

  // Event title bar
  const evBar = el('cs-event');
  evBar.textContent = eventName;
  evBar.classList.toggle('hidden', !eventName);

  const mapTxt = mapLabel(cs.map && cs.map.name);
  el('cs-map').innerHTML = (mapTxt || '') +
    (bestOf ? `${mapTxt ? '  ·  ' : ''}<span class="bo">BEST OF ${bestOf}</span>` : '');
  renderSeries();

  setTeamPanel('ct', appTeams.blue, cs.ct.score);
  setTeamPanel('t',  appTeams.orange, cs.t.score);
  if (prevScore.ct !== undefined && prevScore.ct !== cs.ct.score) bump('ct-score');
  if (prevScore.t  !== undefined && prevScore.t  !== cs.t.score)  bump('t-score');
  prevScore.ct = cs.ct.score; prevScore.t = cs.t.score;

  // Overtime: CS2 is MR12 (first to 13); 12–12 → OT, each OT is MR3 (+4 to win, tie at +3 → next OT).
  const REG_WIN = 12;
  const inOT = cs.ct.score >= REG_WIN && cs.t.score >= REG_WIN;
  const otNum = inOT ? Math.floor((Math.min(cs.ct.score, cs.t.score) - REG_WIN) / 3) + 1 : 0;
  const otName = otLabel(otNum);

  const bombState = (cs.bomb && cs.bomb.state) || '';
  handleBombResult(bombState);   // fire explosion / defuse banner on state transition
  const defusing = bombState === 'defusing';
  const bombActive = bombState === 'planted' || defusing;
  const timerEl = el('cs-timer');
  const bombvis = el('cs-bombvis');
  const roundEl = el('cs-round');
  const midEl = el('cs-mid');
  if (bombActive) {
    bombvis.classList.add('show');
    const remain = Number(cs.bomb.countdown);
    const danger = !defusing && !isNaN(remain) && remain <= 10;
    timerEl.classList.remove('hidden');
    timerEl.classList.add('bomb');
    // No central bar in either state — the countdown lives in the big number + team fuses.
    bombvis.classList.add('nobar');
    bombvis.classList.toggle('danger', danger);
    bombvis.classList.toggle('defusing', defusing);
    midEl.classList.toggle('planted-glow', !defusing);
    midEl.classList.toggle('defusing-glow', defusing);
    roundEl.classList.remove('ot');
    if (defusing) {
      // Defuse mirrors the plant layout: cutters icon + big GREEN number = defuse time left.
      stopCornerPulse();                     // no red pulse during a defuse
      if (defuseStart === null) defuseStart = nowMs();
      const defuser = (cs.players || []).find(p => p.steamid === (cs.bomb && cs.bomb.player));
      const dur = (defuser && defuser.hasKit) ? 5 : DEFUSE_TIME;
      const elapsed = (nowMs() - defuseStart) / 1000;
      const defLeft = Math.max(0, dur - elapsed);
      // Eased: grows quickly, then slows toward completion
      const fuseW = easeOutCubic(elapsed / dur) * 100;
      setFuse(fuseW, 'defuse', false);       // green bars grow toward centre as defuse completes
      timerEl.classList.add('def');
      timerEl.textContent = defLeft.toFixed(1);
      roundEl.textContent = 'DEFUSING';
      roundEl.classList.add('defusing'); roundEl.classList.remove('planted');
    } else {
      defuseStart = null;
      // Eased: drains fast early, then crawls in the last seconds before detonation
      const elapsedFrac = isNaN(remain) ? 0 : (BOMB_TIME - remain) / BOMB_TIME;
      const fuseW = (1 - easeOutCubic(elapsedFrac)) * 100;
      setFuse(fuseW, 'planted', danger);     // red bars drain toward centre (time to explosion)
      timerEl.classList.remove('def');
      timerEl.textContent = isNaN(remain) ? '--' : Math.max(0, remain).toFixed(1);
      roundEl.textContent = 'BOMB PLANTED';
      roundEl.classList.add('planted'); roundEl.classList.remove('defusing');
    }
  } else {
    timerEl.classList.remove('hidden', 'bomb', 'def');
    bombvis.classList.remove('show', 'danger', 'defusing', 'nobar');
    midEl.classList.remove('planted-glow', 'defusing-glow');
    timerEl.textContent = fmtClock(cs.phaseEndsIn);
    defuseStart = null;
    el('bomb-defuse-fill').style.width = '0%';
    setFuse(0, 'off');   // hide the team fuses when no bomb is down
    const phase = (cs.round.phase || cs.phase || '').toUpperCase();
    roundEl.textContent = inOT ? otName
      : (cs.round.number ? `ROUND ${cs.round.number}${phase ? ' · ' + phase : ''}` : (phase || 'WARMUP'));
    roundEl.classList.remove('planted', 'defusing');
    roundEl.classList.toggle('ot', inOT);
  }

  renderRoundDots(cs.roundHistory);
  el('round-dots').classList.toggle('show', showHistory && (cs.roundHistory || []).length > 0);
  renderAlive(cs.players);
  renderKillfeed(cs.killfeed);
  renderEcon(cs.players);

  const activeId = (cs.observed && cs.observed.steamid) || '';
  // Order each column by scoreboard standing (score, then kills, then fewest deaths).
  const byLeaderboard = (a, b) =>
    (b.score || 0) - (a.score || 0) || (b.kills || 0) - (a.kills || 0) || (a.deaths || 0) - (b.deaths || 0);
  const ct = (cs.players || []).filter(p => p.team === 'CT').sort(byLeaderboard);
  const t  = (cs.players || []).filter(p => p.team === 'T').sort(byLeaderboard);
  syncColumn(el('players-ct'), ct, 'ct', activeId);
  syncColumn(el('players-t'),  t,  't',  activeId);
  // Drop rows for players who left the server / match.
  const present = new Set([...ct, ...t].map(p => p.steamid));
  for (const [sid, entry] of rowReg) { if (!present.has(sid)) { entry.el.remove(); rowReg.delete(sid); } }

  renderRadar(cs);
  renderFocus(cs.observed);
  renderCallouts(cs, live);

  // Buy / freeze phase: slide up the economy+loadout board, hide the live side columns.
  const isBuy = ((cs.round.phase || cs.phase || '') === 'freezetime');
  const buyEl = el('cs-buy');
  if (isBuy) { renderBuyPhase(cs); buyEl.classList.add('show'); document.body.classList.add('buying'); }
  else { buyEl.classList.remove('show'); document.body.classList.remove('buying'); }
}

function connect(){
  const sock = new WebSocket('ws://localhost:3001');
  sock.onopen = () => sock.send(JSON.stringify({ type: 'request_state' }));
  sock.onmessage = ({ data }) => {
    let msg; try { msg = JSON.parse(data); } catch { return; }
    if (msg.type === 'full_state') {
      const d = msg.data;
      document.documentElement.dataset.theme = d.theme || 'default';
      if (d.fontFamily) document.documentElement.style.setProperty('--main-font', `'${d.fontFamily}', sans-serif`);
      eventName = (d.eventName || '').trim();
      if (d.bestOf) bestOf = d.bestOf;
      if (d.series) series = d.series;
      const teams = d.teams || {};
      appTeams = {
        blue:   { name: (teams.blue && teams.blue.name) || 'TEAM A',   logo: (teams.blue && teams.blue.logo) || null },
        orange: { name: (teams.orange && teams.orange.name) || 'TEAM B', logo: (teams.orange && teams.orange.logo) || null }
      };
      // Team colors drive the CT (left/blue) and T (right/orange) sides of the HUD
      const ctC = (teams.blue && teams.blue.color) || '#6aa8e6';
      const tC  = (teams.orange && teams.orange.color) || '#e0b35a';
      document.documentElement.style.setProperty('--ct', ctC);
      document.documentElement.style.setProperty('--t', tC);
      brand = d.brand || null;   // null when no client kit is active → rail hides
      applyBrand();
      renderBanner(d.banner);    // bottom-right sponsor banner (producer-controlled)
      showHistory = !!(d.csgo && d.csgo.showHistory);
      builtinRadar = !!(d.csgo && d.csgo.builtinRadar);
      lastRealCs = d.csgo;
      if (!devState) render(d.csgo);   // don't let live data overwrite a running dev sim
    } else if (msg.type === 'csgo_update') {
      showHistory = !!(msg.data && msg.data.showHistory);
      builtinRadar = !!(msg.data && msg.data.builtinRadar);
      lastRealCs = msg.data;
      if (!devState) render(msg.data);
    }
  };
  sock.onclose = () => setTimeout(connect, 3000);
}

// ── Dev event tester (browser only; hidden inside OBS) ──────────────────────
let lastRealCs = null;     // last state from the live feed, for "Reset to live"
let devState = null;       // active simulation state (blocks live render while set)
let devTimer = null;
function devStop(){ if (devTimer){ clearInterval(devTimer); devTimer = null; } }
function devBase(){ const s = JSON.parse(JSON.stringify(DEMO)); s.connected = true; return s; }
function devReset(){
  devStop(); devState = null; prevBombState = ''; defuseStart = null;
  render(lastRealCs);   // back to the live feed (or DEMO preview if not connected)
}
// Plant the bomb, drain the timer, then detonate — exercises the real render path.
function devPlant(){
  devStop(); prevBombState = 'carried'; defuseStart = null;   // ≠ 'planted' so the plant pulse fires
  const s = devBase(); s.round = Object.assign({}, s.round, { bomb: 'planted' });
  let t = 40; s.bomb = { state: 'planted', countdown: t, pos: s.bomb && s.bomb.pos, player: '' };
  devState = s; render(s);
  devTimer = setInterval(() => {
    t -= 0.1;
    if (t <= 0){
      s.bomb = { state: 'exploded', countdown: 0, pos: null, player: '' };
      render(s); devStop();
      setTimeout(() => { if (devState === s) devReset(); }, 1900);
      return;
    }
    s.bomb.countdown = t; render(s);
  }, 100);
}
// Begin a defuse: grey loading bar fills, then the bomb is defused.
function devDefuse(){
  devStop(); prevBombState = 'planted'; defuseStart = null;
  const s = devBase(); s.round = Object.assign({}, s.round, { bomb: 'planted' });
  s.bomb = { state: 'defusing', countdown: 12, pos: s.bomb && s.bomb.pos, player: '' };
  devState = s; render(s);
  devTimer = setInterval(() => {
    if (defuseStart && (nowMs() - defuseStart) >= DEFUSE_TIME * 1000){
      s.bomb = { state: 'defused', countdown: 0, pos: null, player: '' };
      render(s); devStop();
      setTimeout(() => { if (devState === s) devReset(); }, 2100);
      return;
    }
    s.bomb.countdown = Math.max(0, s.bomb.countdown - 0.1); render(s);
  }, 100);
}
// Preview a status condition: ramp a player's intensity value then DECAY it to 0, exactly like
// the live GSI value does in-game — so the effect lasts only "while affected", then clears.
function devStatus(kind){
  devStop();
  const s = devBase();
  const key = kind === 'flash' ? 'flashed' : kind === 'fire' ? 'burning' : kind === 'smoke' ? 'smoked' : null;
  (s.players || []).forEach(p => { p.flashed = 0; p.burning = 0; p.smoked = 0; });
  devState = s;
  if (!key){ render(s); return; }                       // 'status-off' → just clear
  let v = 255;
  const setAll = () => (s.players || []).forEach(p => { if (p.alive) p[key] = v; });
  setAll(); render(s);
  const stepMs = 100, decay = 255 / (3500 / stepMs);    // ~3.5s full decay (a few seconds affected)
  devTimer = setInterval(() => {
    v -= decay;
    if (v <= 0){ (s.players || []).forEach(p => { p[key] = 0; }); render(s); devStop(); return; }
    setAll(); render(s);
  }, stepMs);
}
// Simulate freezetime so the buy board shows with the demo loadouts/economy.
function devBuy(){
  devStop();
  const s = devBase();
  s.round = Object.assign({}, s.round, { phase: 'freezetime', bomb: '' });
  s.bomb = { state: '', countdown: null, pos: null, player: '' };
  s.phase = 'freezetime'; s.phaseEndsIn = 15;
  devState = s; render(s);
}
// Preview the bottom-right sponsor banner with placeholder logos.
let _devBannerOn = false;
function devBanner(){
  _devBannerOn = !_devBannerOn;
  renderBanner(_devBannerOn
    ? { visible: true, interval: 3, images: ['/assets/games/valorant.svg', '/assets/rl.png'] }
    : { visible: false, images: [] });
}
function devAction(a){
  if (a === 'banner') return devBanner();
  if (a === 'buy') return devBuy();
  if (a === 'plant') devPlant();
  else if (a === 'defuse') devDefuse();
  else if (a === 'explode') triggerBombFlash('explode');   // just the banner
  else if (a === 'defused') triggerBombFlash('defused');
  else if (a === 'flash' || a === 'fire' || a === 'smoke') devStatus(a);
  else if (a === 'status-off') devStatus('');
  else if (a === 'reset') devReset();
}
(function initDevPanel(){
  // OBS browser sources expose window.obsstudio — keep the tester out of the broadcast.
  if (window.obsstudio) return;
  const panel = el('dev-panel'), fab = el('dev-fab');
  if (!panel || !fab) return;
  panel.classList.add('open');
  panel.querySelectorAll('[data-dev]').forEach(b =>
    b.addEventListener('click', () => devAction(b.getAttribute('data-dev'))));
  el('dev-collapse').addEventListener('click', () => { panel.classList.remove('open'); fab.style.display = 'block'; });
  fab.addEventListener('click', () => { fab.style.display = 'none'; panel.classList.add('open'); });
})();

render(null);
applyBrand();   // preview the demo brand's sponsor rail until live state arrives
connect();
</script>
