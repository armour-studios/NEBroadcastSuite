<!DOCTYPE html>
<!--
  analystspecial.html — analyst desk (NE Broadcast Suite style).
  Left = two stacked caster cams (slots 1 & 2). Right = one big 16:9 featured cam
  (slot 3) with the scorebar above it. Shares duorow.html's design language.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="/fonts.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --duo-bg: #111318; --duo-surface: #1a1d24; --duo-surface2: #20242e; --duo-border: #2e3340;
      --duo-accent: #e83a8b; --duo-accent2: #8b5cf6; --duo-text: #e8eaf0; --duo-muted: #8b93a8;
      --team-a: #055fdb; --team-b: #e97139;
      --stage-w: 1920px; --stage-h: 1080px; --pad-x: 24px; --hud-h: 104px; --cam-gap: 16px; --cam-plate-h: 50px; --left-w: 600px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: var(--stage-w); height: var(--stage-h); overflow: hidden; background: transparent;
      font-family: 'Inter', system-ui, sans-serif; color: var(--duo-text); -webkit-font-smoothing: antialiased; }

    .duo-stage { display: flex; flex-direction: column; width: var(--stage-w); height: var(--stage-h);
      padding: 16px var(--pad-x) 14px; opacity: 0; transition: opacity .35s ease; }
    .duo-stage.show { opacity: 1; }

    .an-body { flex: 1 1 0; min-height: 0; display: flex; align-items: stretch; gap: var(--cam-gap); }
    .an-left { flex: 0 0 var(--left-w); display: flex; flex-direction: column; gap: var(--cam-gap); min-height: 0; }
    .an-right { flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; gap: 12px; align-items: stretch; justify-content: center; }
    .zone-footer { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding-top: 12px; }

    /* ── Entry animations ── */
    .duo-stage:not(.show) .match-hud, .duo-stage:not(.show) .cam-card, .duo-stage:not(.show) .presented-by, .duo-stage:not(.show) .deck-strip { opacity: 0; }
    .duo-stage.show .match-hud { animation: hudEnter .7s cubic-bezier(.16,.84,.24,1) .06s forwards; }
    .duo-stage.show .an-left .cam-card:nth-child(1) { animation: camL .7s cubic-bezier(.16,.84,.24,1) .14s forwards; }
    .duo-stage.show .an-left .cam-card:nth-child(2) { animation: camL .7s cubic-bezier(.16,.84,.24,1) .22s forwards; }
    .duo-stage.show .cam-card.big { animation: camR .75s cubic-bezier(.16,.84,.24,1) .18s forwards; }
    .duo-stage.show .deck-strip { animation: stripUp .6s cubic-bezier(.16,.84,.24,1) .4s forwards; }
    @keyframes hudEnter { from { opacity: 0; transform: translateY(-26px) scale(.95); } to { opacity: 1; transform: none; } }
    @keyframes camL { from { opacity: 0; transform: translateX(-40px) scale(.97); } to { opacity: 1; transform: none; } }
    @keyframes camR { from { opacity: 0; transform: translateX(40px) scale(.98); } to { opacity: 1; transform: none; } }
    @keyframes stripUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

    /* ── Esports score HUD (above the big cam) ── */
    .match-hud { position: relative; display: flex; align-items: stretch; width: 100%; flex: 0 0 var(--hud-h); height: var(--hud-h);
      background: linear-gradient(180deg, rgba(24,27,34,.98), rgba(10,12,16,.99));
      border: 1px solid rgba(255,255,255,.07); border-radius: 12px; overflow: hidden; box-shadow: 0 12px 32px rgba(0,0,0,.55); }
    .match-hud::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent 4%, rgba(255,255,255,.35) 50%, transparent 96%); z-index: 3; }
    .match-team { flex: 1 1 0; min-width: 0; position: relative; display: flex; align-items: center; gap: 8px; }
    .match-team--a { padding: 0 8px 0 16px; }
    .match-team--b { padding: 0 16px 0 8px; }
    .match-team--a::before, .match-team--b::before { content: ''; position: absolute; top: 0; bottom: 0; width: 45%; pointer-events: none; }
    .match-team--a::before { left: 0; background: linear-gradient(90deg, color-mix(in srgb, var(--team-a) 22%, transparent), transparent); }
    .match-team--b::before { right: 0; width: 38%; background: linear-gradient(270deg, color-mix(in srgb, var(--team-b) 18%, transparent), transparent); }
    .match-team::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; }
    .match-team--a::after { background: linear-gradient(90deg, var(--team-a), transparent 70%); }
    .match-team--b::after { background: linear-gradient(270deg, var(--team-b), transparent 70%); }
    .match-logo { width: 62px; height: 62px; object-fit: contain; flex: 0 0 62px; position: relative; z-index: 1; filter: drop-shadow(0 2px 6px rgba(0,0,0,.5)); }
    .match-logo.logo-on-dark { filter: brightness(0) invert(1) drop-shadow(0 2px 6px rgba(0,0,0,.5)); }
    .match-name { flex: 1 1 0; min-width: 0; position: relative; z-index: 1; font-size: 24px; font-weight: 800; letter-spacing: .03em;
      text-transform: uppercase; line-height: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #fff; }
    .match-team--b .match-name { text-align: right; }
    .match-score { flex: 0 0 auto; position: relative; z-index: 1; font-size: 46px; font-weight: 900; font-variant-numeric: tabular-nums; line-height: 1; min-width: 24px; text-align: center; }
    .match-team--a .match-score { color: var(--team-a); text-shadow: 0 0 18px color-mix(in srgb, var(--team-a) 60%, transparent); }
    .match-team--b .match-score { color: var(--team-b); text-shadow: 0 0 18px color-mix(in srgb, var(--team-b) 60%, transparent); }
    .match-center { flex: 0 0 110px; display: flex; align-items: center; justify-content: center; position: relative; z-index: 2; background: rgba(6,8,12,.97); border-left: 1px solid rgba(255,255,255,.1); border-right: 1px solid rgba(255,255,255,.1); }
    .match-vs { font-size: 40px; font-weight: 900; letter-spacing: .08em; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,.85); }

    /* ── Cam cards ── */
    .cam-card { display: flex; flex-direction: column; border-radius: 12px; overflow: hidden; border: 1px solid var(--duo-border);
      background: var(--duo-surface); box-shadow: 0 14px 40px rgba(0,0,0,.45); min-height: 0; }
    .an-left .cam-card { flex: 1 1 0; }
    .cam-card.big { flex: 0 0 auto; }
    .cam-card::before { content: ''; display: block; height: 3px; flex: 0 0 auto; background: linear-gradient(90deg, transparent, var(--duo-accent) 30%, var(--duo-accent2) 70%, transparent); }
    .cam-hole { position: relative; width: 100%; flex: 1 1 auto; min-height: 0; background: #0d0f14; overflow: hidden; }
    .cam-card.big .cam-hole { aspect-ratio: 16 / 9; flex: 0 0 auto; }
    .cam-hole iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
    /* ?cams=off framing: transparent holes so per-caster OBS sources show through. */
    .duo-stage.frames-only .cam-hole { background: transparent; }
    .duo-stage.frames-only .cam-card { background: transparent; box-shadow: none; }
    .cam-plate { display: flex; align-items: center; justify-content: center; gap: 12px; height: var(--cam-plate-h); flex: 0 0 var(--cam-plate-h);
      padding: 0 18px; background: linear-gradient(180deg, var(--duo-surface2), var(--duo-surface)); border-top: 1px solid var(--duo-border); }
    .cam-name { font-size: 19px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cam-card.big .cam-name { font-size: 22px; }
    .cam-handle { font-size: 14px; font-weight: 600; color: #9aa3b8; }
    .cam-handle::before { font-family: 'Font Awesome 6 Brands'; font-weight: 400; margin-right: 6px; }
    .cam-handle.twitch::before { content: "\f1e8"; color: #9146ff; }
    .cam-handle.youtube::before { content: "\f167"; color: #ff0033; }
    .cam-handle.x-twitter::before { content: "\e61b"; color: #e8eaf0; }
    .cam-handle.instagram::before { content: "\f16d"; color: #e1306c; }
    .cam-handle.tiktok::before { content: "\e07b"; color: #25f4ee; }
    .cam-handle.discord::before { content: "\f392"; color: #5865f2; }
    .cam-handle.facebook::before { content: "\f09a"; color: #1877f2; }
    .cam-handle.kick::before { content: "K"; font-family: 'Inter', sans-serif; font-weight: 900; color: #53fc18; }
    .cam-handle.link::before { content: "\f0c1"; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: var(--duo-muted); }

    /* ── "Presented by" — centered plate attached under the featured cam ── */
    .presented-by { align-self: center; margin-top: -12px; display: inline-flex; flex-direction: row; align-items: center; gap: 14px;
      padding: 8px 24px; max-width: 100%;
      background: linear-gradient(180deg, var(--duo-surface2), var(--duo-surface));
      border: 1px solid var(--duo-border); border-top: 0; border-radius: 0 0 10px 10px;
      box-shadow: 0 10px 24px rgba(0,0,0,.4); }
    .presented-by.is-empty { display: none; }
    .pb-label { font-size: 10px; font-weight: 800; letter-spacing: .2em; text-transform: uppercase; color: var(--duo-muted); white-space: nowrap; }
    .pb-logo { height: 30px; max-width: 220px; object-fit: contain; filter: drop-shadow(0 2px 6px rgba(0,0,0,.35)); }

    /* ── Footer (lower-third tagline only) ── */
    .deck-strip { width: 100%; max-width: min(900px, calc(var(--stage-w) - 2 * var(--pad-x))); padding: 8px 28px; text-align: center; position: relative;
      background: linear-gradient(90deg, transparent, rgba(14,16,22,.92) 12%, rgba(14,16,22,.92) 88%, transparent);
      border-top: 1px solid rgba(255,255,255,.06); border-bottom: 1px solid rgba(255,255,255,.06); }
    .deck-strip::before, .deck-strip::after { content: ''; position: absolute; top: 50%; width: 48px; height: 1px; background: linear-gradient(90deg, transparent, var(--duo-accent)); opacity: .5; }
    .deck-strip::before { left: 12px; } .deck-strip::after { right: 12px; transform: scaleX(-1); }
    .deck-strip-text { font-size: 12px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #c8ced8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .deck-strip.is-empty { display: none; }

    .preview .cam-hole { background: repeating-linear-gradient(45deg, #181b22, #181b22 16px, #20242e 16px, #20242e 32px); }
    .preview .cam-hole::after { content: 'CAM'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; letter-spacing: .3em; color: #4a5162; }
    .preview .cam-hole iframe { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div id="stage" class="duo-stage">
    <div class="an-body">
      <div class="an-left" id="an-left"></div>
      <div class="an-right">
        <header class="match-hud">
          <div class="match-team match-team--a">
            <img id="teamlogo1" class="match-logo" alt="">
            <span id="teamname1" class="match-name">BLUE</span>
            <span id="teamscore1" class="match-score">0</span>
          </div>
          <div class="match-center"><span class="match-vs">VS</span></div>
          <div class="match-team match-team--b">
            <span id="teamscore2" class="match-score">0</span>
            <span id="teamname2" class="match-name">ORANGE</span>
            <img id="teamlogo2" class="match-logo" alt="">
          </div>
        </header>
        <div id="an-right-cam"></div>
        <div class="presented-by is-empty" id="presented-by">
          <span class="pb-label" id="pb-label">PRESENTED BY</span>
          <img id="pb-logo" class="pb-logo" alt="" style="display:none">
        </div>
      </div>
    </div>

    <div class="zone-footer">
      <div class="deck-strip is-empty" id="deck-strip"><span id="tagline" class="deck-strip-text">Live</span></div>
    </div>
  </div>

  <script src="scene-base.js"></script>
  <script>
    function el(id) { return document.getElementById(id); }
    const CAM_COUNT = 3;   // slots 1,2 = left stack; slot 3 = big featured cam
    const NO_CAMS = new URLSearchParams(location.search).get('cams') === 'off';
    if (NO_CAMS) document.getElementById('stage')?.classList.add('frames-only');
    let _lastCamUrl = new Array(CAM_COUNT).fill(null);

    function applyBrandTheme(data) {
      const root = document.documentElement;
      const color = SceneBase.brandColor(data), accent2 = SceneBase.brandAccent(data);
      if (color) root.style.setProperty('--duo-accent', color);
      if (accent2) root.style.setProperty('--duo-accent2', accent2);
      if (data.fontFamily) root.style.fontFamily = `'${data.fontFamily}', 'Inter', system-ui, sans-serif`;
    }

    function camCard(i, big) {
      const card = document.createElement('div');
      card.className = 'cam-card' + (big ? ' big' : '');
      card.innerHTML = `<div id="hole${i}" class="cam-hole"></div>
        <div class="cam-plate"><span id="staffname${i}" class="cam-name">—</span><span id="socials${i}" class="cam-handle" style="display:none"></span></div>`;
      return card;
    }
    function buildCams() {
      const left = el('an-left'), right = el('an-right-cam');
      left.innerHTML = ''; right.innerHTML = '';
      left.appendChild(camCard(1, false));
      left.appendChild(camCard(2, false));
      right.appendChild(camCard(3, true));
    }

    function renderCasters(casters) {
      if (NO_CAMS) return;
      const slots = SceneBase.castersBySlots(casters, CAM_COUNT);
      for (let i = 0; i < CAM_COUNT; i++) {
        const camUrl = ((slots[i] && slots[i].camUrl) || '').trim();
        if (camUrl === _lastCamUrl[i]) continue;
        _lastCamUrl[i] = camUrl;
        const hole = el('hole' + (i + 1));
        if (!hole) continue;
        hole.querySelectorAll('iframe').forEach(f => f.remove());
        if (camUrl) {
          const iframe = document.createElement('iframe');
          iframe.src = camUrl;
          iframe.setAttribute('allow', 'autoplay; encrypted-media; microphone; camera; fullscreen');
          iframe.referrerPolicy = 'no-referrer';
          hole.appendChild(iframe);
        }
      }
    }

    function renderCasterText(casters) {
      const slots = SceneBase.castersBySlots(casters, CAM_COUNT);
      for (let i = 0; i < CAM_COUNT; i++) {
        const c = slots[i] || {};
        const nameEl = el('staffname' + (i + 1)), socEl = el('socials' + (i + 1));
        if (!nameEl || !socEl) continue;
        nameEl.textContent = (c.name || '—').toString();
        const handle = SceneBase.formatCasterHandle(c), social = (c.social || 'none').toString().toLowerCase();
        if (handle && social !== 'none') {
          socEl.className = 'cam-handle ' + SceneBase.socialPlatformClass(social);
          socEl.textContent = handle; socEl.style.display = '';
        } else { socEl.style.display = 'none'; }
      }
    }

    function renderTeam(idx, t, side) {
      SceneBase.applyTeamLogo(el('teamlogo' + idx), t.customLogo, t.logo);
      el('teamname' + idx).textContent = (t.name || (side === 'b' ? 'ORANGE' : 'BLUE')).toUpperCase();
      el('teamscore' + idx).textContent = t.series != null ? t.series : 0;
      document.documentElement.style.setProperty(side === 'b' ? '--team-b' : '--team-a', t.color || (side === 'b' ? '#e97139' : '#055fdb'));
    }

    function renderPresentedBy(data) {
      const slot = data.scoreboardAd || {}, wrap = el('presented-by'), label = el('pb-label'), logo = el('pb-logo');
      const labelText = (slot.label || 'PRESENTED BY').toString().trim();
      label.textContent = labelText;
      if (slot.logo) { logo.src = slot.logo; logo.style.display = ''; wrap.classList.remove('is-empty'); }
      else if (labelText) { logo.style.display = 'none'; logo.removeAttribute('src'); wrap.classList.remove('is-empty'); }
      else wrap.classList.add('is-empty');
    }

    function renderDeckStrip(data) {
      const tag = ((data.casters && data.casters.lowerThird) || '').toString().trim();
      const strip = el('deck-strip'), tagEl = el('tagline');
      if (tag) { tagEl.textContent = tag; strip.classList.remove('is-empty'); }
      else { tagEl.textContent = ''; strip.classList.add('is-empty'); }
    }

    function render(data) {
      data = data || {};
      applyBrandTheme(data);
      const casters = data.casters || {};
      el('stage').classList.toggle('show', SceneBase.casterStageVisible(casters));
      renderCasters(casters);
      renderCasterText(casters);
      renderTeam(1, SceneBase.teamSide(data, 'blue'), 'a');
      renderTeam(2, SceneBase.teamSide(data, 'orange'), 'b');
      renderPresentedBy(data);
      renderDeckStrip(data);
    }

    buildCams();
    if (location.protocol === 'file:') {
      document.documentElement.classList.add('preview');
      render({
        casters: { visible: true, lowerThird: 'Summer Showdown 2026 — Analyst Desk', list: [
          { id: 'a1', name: 'Jordan Reyes', handle: 'jreyescasts', slot: 1, social: 'x' },
          { id: 'a2', name: 'Mia Tanaka', handle: 'miaplays', slot: 2, social: 'twitch' },
          { id: 'a3', name: 'Sam Okoye', handle: 'samok', slot: 3, social: 'youtube' } ] },
        teams: { blue: { name: 'Velocity Gaming', color: '#3b82f6' }, orange: { name: 'Team Apex Esports', color: '#f97316' } },
        series: { blue: 1, orange: 0 }, bestOf: 5,
        scoreboardAd: { label: 'PRESENTED BY', logo: 'data:image/svg+xml;utf8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="160" height="40"><rect width="160" height="40" rx="4" fill="#1a1d24"/><text x="80" y="27" font-size="18" fill="#e8eaf0" text-anchor="middle" font-family="Arial" font-weight="bold">SPONSOR</text></svg>') }
      });
      el('stage').classList.add('show');
    } else {
      SceneBase.connect(render);
    }
  </script>
</body>
</html>
