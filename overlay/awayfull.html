<!DOCTYPE html>
<!--
  awayfull.html — full-screen "away / be right back" standby scene.

  Ported from the EsportsDashBoard "DEFAULT HTML" pack (awayfull.html). The original
  polled http://localhost:8080/getfullJson + /api/get-bracket with jQuery, looped a
  stack of match scoreboards, applied a "Starting Soon / Be Right Back / Thanks for
  Watching" title and recoloured everything inline. Here it is driven entirely by
  NE Broadcast Suite's full_state (WS bridge :3001) via SceneBase.connect(); colours come
  from the active Brand Kit (--accent / --accent-2), so this file only carries
  layout-specific rules.

  Regions reproduced from the source (top to bottom):
    • TEAM SCOREBAR  — blue vs orange band (logos + names + VS + scoreboxes that hide
                       when both scores are 0), matching the source's scoreboard row.
    • CASTER CAMS    — the source's "away" desk row of caster cameras; mapped to
                       data.casters.list (up to 4) with curtain reveal + name plates.
    • CENTRE STAGE   — the source's big standby block: central brand logo + the large
                       title (eventName, falling back to breakScreen.title) and a
                       sub-message line (breakScreen.message).
    • FOOTER         — brand logo on the .tournament side, centred span.tertiary
                       tagline (eventName), brand logo on the .channel side.

  full_state fields used:
    • data.casters.visible              -> fade the whole stage in/out
    • data.casters.list[0..3]           -> caster cams (id/name/handle/camUrl)
    • SceneBase.teamSide(data,'blue')   -> team1 (name/logo/score)
    • SceneBase.teamSide(data,'orange') -> team2 (name/logo/score)
    • data.eventName                    -> central title + footer tagline
    • data.breakScreen.{title,message}  -> standby title fallback + sub-message
    • SceneBase.brandLogo(data)         -> central brand logo + footer logos
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="scene.css" />
  <style>
    /* Layout-specific sizing/positioning only — colours stay in scene.css. */

    /* Centre standby block sits between the scorebar/cams and the footer. */
    .away-stage {
      position: absolute;
      left: 0;
      top: 560px;
      width: 1920px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .away-logo {
      width: 380px;
      height: 240px;
      background-position: center;
      background-size: contain;
      background-repeat: no-repeat;
      margin-bottom: 10px;
      animation: slideright 1s 0.6s backwards;
    }
    .away-logo.empty { display: none; }
    .away-title {
      font-family: 'Rajdhani', var(--main-font);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 5.2em;
      line-height: 0.95;
      color: #fff;
      letter-spacing: 0.02em;
      animation: tagline 0.5s 1s backwards;
    }
    .away-message {
      font-family: 'Rajdhani', var(--main-font);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 2.2em;
      color: var(--accent);
      margin-top: 8px;
      letter-spacing: 0.18em;
      animation: tagline 0.5s 1.2s backwards;
    }
    .away-message.empty { display: none; }

    /* Caster desk row — sits just under the scorebar. */
    .away-cams {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 200px;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: center;
      gap: 24px;
    }
    .away-cams .camerabox { margin: 0; }
    .camerahole { position: relative; }
    .camerahole iframe { position: absolute; inset: 0; width: 100%; height: 100%; }
    .camerahole .curtain { position: relative; z-index: 2; }
    .staffiso { width: 100%; }
    .staff {
      width: 100%;
      height: 64px;
      box-sizing: border-box;
      padding: 0 16px;
      gap: 0.4ch;
    }
  </style>
</head>
<body>
  <!-- Whole stage fades with caster visibility -->
  <div id="stage" class="scene-fade">

    <!-- TEAM SCOREBAR -->
    <div class="scoreboardwrapper">
      <div class="scoreboard">
        <div class="team team1">
          <img id="teamlogo1" class="teamlogo" alt="" />
          <span id="teamname1" class="teamname"></span>
          <div id="scorebox1" class="scorebox">
            <span id="teamscore1" class="teamscore"></span>
          </div>
        </div>
        <div class="vs"><span>VS</span></div>
        <div class="team team2">
          <div id="scorebox2" class="scorebox">
            <span id="teamscore2" class="teamscore"></span>
          </div>
          <span id="teamname2" class="teamname"></span>
          <img id="teamlogo2" class="teamlogo" alt="" />
        </div>
      </div>
    </div>

    <!-- CASTER CAMS (away desk row, up to 4) -->
    <div id="cams" class="away-cams"></div>

    <!-- CENTRE STAGE (brand logo + standby title + sub-message) -->
    <div class="away-stage">
      <div id="awaylogo" class="away-logo empty"></div>
      <div id="awaytitle" class="away-title"></div>
      <div id="awaymessage" class="away-message empty"></div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <div id="tournament" class="tournament"></div>
      <div class="tagline">
        <div><span id="footertag" class="tertiary">Powered by Broadcast.gg</span></div>
      </div>
      <div id="channel" class="channel"></div>
    </div>

  </div>

  <script src="scene-base.js"></script>
  <script>
    function el(id) { return document.getElementById(id); }

    // Cam width by caster count — sized to fill the desk row while keeping 16:9.
    const CAM_WIDTHS = { 1: 760, 2: 560, 3: 440, 4: 380 };

    // Un-bold common filler words in team names (matches the source's styling).
    const FILLER = /\b(gaming|team|e-?sports|house|academy|uni(versity)?|state|tech|and|the|of|eu)\b/gi;
    function formatTeamName(name) {
      const n = (name || '').toString();
      return '<b>' + n.replace(FILLER, '</b>$1<b>').replace(/&/g, '</b>&<b>') + '</b>';
    }

    // Best-effort platform inference for the social-icon prefix class.
    function platformClass(handle) {
      const h = (handle || '').toLowerCase();
      if (h.includes('twitch')) return 'twitch';
      if (h.includes('youtube') || h.includes('yt.')) return 'youtube';
      if (h.includes('tiktok')) return 'tiktok';
      if (h.includes('instagram') || h.includes('insta')) return 'instagram';
      if (h.includes('bluesky') || h.includes('bsky')) return 'bluesky';
      if (h.includes('facebook') || h.includes('fb.')) return 'facebook';
      if (h.includes('discord')) return 'discord';
      if (h.includes('x.com') || h.includes('twitter')) return 'x-twitter';
      return 'socials';
    }

    let _lastCasterSig = '';

    // Rebuild the cam boxes only when the caster list actually changes, so the
    // vdo.ninja streams don't reconnect on every unrelated full_state tick.
    function renderCasters(casters) {
      const items = (casters && Array.isArray(casters.list))
        ? casters.list.filter(c => c && (c.name || c.handle || c.camUrl)).slice(0, 4)
        : [];

      const sig = JSON.stringify(items);
      if (sig === _lastCasterSig) return;
      _lastCasterSig = sig;

      const cams = el('cams');
      cams.innerHTML = '';
      if (!items.length) return;

      const camW = CAM_WIDTHS[items.length] || 380;
      const camH = Math.round(camW * 9 / 16);

      items.forEach(c => {
        const box = document.createElement('div');
        box.className = 'camerabox';

        const hole = document.createElement('div');
        hole.className = 'camerahole';
        hole.style.width = camW + 'px';
        hole.style.height = camH + 'px';

        // Embed a vdo.ninja cam if a URL is given; otherwise leave a blank hole
        // so a webcam composited behind this source in OBS shows through.
        const camUrl = ((c.camUrl) || '').trim();
        if (camUrl) {
          const iframe = document.createElement('iframe');
          iframe.src = camUrl;
          iframe.frameBorder = '0';
          iframe.allow = 'autoplay; encrypted-media';
          iframe.referrerPolicy = 'no-referrer';
          iframe.setAttribute('width', '100%');
          iframe.setAttribute('height', '100%');
          hole.appendChild(iframe);
        }
        const cl = document.createElement('div'); cl.className = 'curtain curtainl'; hole.appendChild(cl);
        const cr = document.createElement('div'); cr.className = 'curtain curtainr'; hole.appendChild(cr);
        box.appendChild(hole);

        const iso = document.createElement('div');
        iso.className = 'staffiso';
        const staff = document.createElement('div');
        staff.className = 'staff';

        const nameEl = document.createElement('span');
        nameEl.className = 'staffname';
        nameEl.textContent = (c.name || '').toString();
        staff.appendChild(nameEl);

        const handle = (c.handle || '').toString().trim();
        if (handle) {
          const soc = document.createElement('span');
          soc.className = 'socials ' + platformClass(handle);
          soc.textContent = handle.startsWith('@') ? handle : '@' + handle;
          staff.appendChild(soc);
        }

        iso.appendChild(staff);
        box.appendChild(iso);
        cams.appendChild(box);
      });
    }

    function renderTeam(idx, t) {
      const logo = el('teamlogo' + idx);
      if (t.logo) { logo.src = t.logo; logo.style.display = ''; }
      else { logo.removeAttribute('src'); logo.style.display = 'none'; }
      el('teamname' + idx).innerHTML = formatTeamName(t.name);
      el('teamscore' + idx).textContent = t.score != null ? t.score : 0;
    }

    function render(data) {
      data = data || {};
      const casters = data.casters || {};
      const brk = data.breakScreen || {};

      // Fade the stage with caster visibility.
      el('stage').classList.toggle('show', SceneBase.casterStageVisible(casters));

      renderCasters(casters);

      const blue = SceneBase.teamSide(data, 'blue');
      const orange = SceneBase.teamSide(data, 'orange');
      renderTeam(1, blue);
      renderTeam(2, orange);

      // Hide both scoreboxes when neither team has scored (source behaviour).
      const bothZero = (Number(blue.score) || 0) === 0 && (Number(orange.score) || 0) === 0;
      el('scorebox1').style.display = bothZero ? 'none' : 'flex';
      el('scorebox2').style.display = bothZero ? 'none' : 'flex';

      // CENTRE STAGE — brand logo + big title + sub-message.
      const brandLogo = SceneBase.brandLogo(data);
      const logoEl = el('awaylogo');
      logoEl.style.backgroundImage = brandLogo ? `url("${brandLogo}")` : '';
      logoEl.classList.toggle('empty', !brandLogo);

      // eventName is the primary title; breakScreen.title is the standby fallback.
      const title = data.eventName || brk.title || 'Be Right Back';
      el('awaytitle').textContent = title;

      const msg = brk.message || '';
      const msgEl = el('awaymessage');
      msgEl.textContent = msg;
      msgEl.classList.toggle('empty', !msg);

      // FOOTER — centred tagline = event name, brand logo on both sides.
      el('footertag').textContent = data.eventName || brk.title || 'Powered by Broadcast.gg';
      el('tournament').style.backgroundImage = brandLogo ? `url("${brandLogo}")` : '';
      el('channel').style.backgroundImage = brandLogo ? `url("${brandLogo}")` : '';
    }

    // DEMO fallback when opened directly from disk.
    if (location.protocol === 'file:') {
      render({
        casters: {
          visible: true,
          list: [
            { id: 'c1', name: 'Jordan Reyes', handle: '@jreyescasts', camUrl: '' },
            { id: 'c2', name: 'Mia Tanaka', handle: 'twitch.tv/miaplays', camUrl: '' }
          ]
        },
        teams: {
          blue: { name: 'Velocity Gaming', logo: null, score: 0 },
          orange: { name: 'Team Apex Esports', logo: null, score: 0 }
        },
        game: { blueScore: 0, orangeScore: 0 },
        eventName: 'Summer Showdown 2026',
        breakScreen: { title: 'Be Right Back', message: 'We will return shortly' }
      });
      document.getElementById('stage').classList.add('show');
    } else {
      SceneBase.connect(data => render(data));
    }
  </script>
</body>
</html>
