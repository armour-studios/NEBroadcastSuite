<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NE Broadcast Suite â€” Scene Sources</title>
  <style>
    :root { --bg:#0d0f13; --panel:#15181e; --panel2:#1c2027; --border:#2a2f38; --fg:#e8ebf0; --muted:#8a93a2; --accent:#4aa3ff; --on:#22c55e; --warn:#fbbf24; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--fg); font-family:'Segoe UI',system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
    header { position:sticky; top:0; z-index:5; background:linear-gradient(180deg,#11141a,#0d0f13); border-bottom:1px solid var(--border); padding:18px 28px; display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
    header h1 { font-size:20px; margin:0; font-weight:700; letter-spacing:0.02em; }
    .conn { display:flex; align-items:center; gap:7px; font-size:13px; color:var(--muted); }
    .dot { width:9px; height:9px; border-radius:50%; background:#555; }
    .dot.ok { background:var(--on); box-shadow:0 0 8px var(--on); }
    .baseurl { margin-left:auto; display:flex; align-items:center; gap:8px; font-size:13px; color:var(--muted); }
    .baseurl input { background:var(--panel2); border:1px solid var(--border); color:var(--fg); border-radius:6px; padding:6px 10px; font-size:13px; width:240px; }
    main { padding:24px 28px 60px; max-width:1180px; margin:0 auto; }
    .group { margin-bottom:30px; }
    .group h2 { font-size:13px; text-transform:uppercase; letter-spacing:0.14em; color:var(--muted); margin:0 0 12px; font-weight:600; }
    .cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:14px; }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:16px 16px 14px; display:flex; flex-direction:column; gap:10px; transition:border-color .15s; }
    .card:hover { border-color:#3a4250; }
    .card.customized { border-color:rgba(74,163,255,.45); }
    .card .top { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
    .card .name { font-weight:700; font-size:16px; }
    .card .desc { font-size:12.5px; color:var(--muted); line-height:1.45; min-height:34px; }
    .pill { font-size:10.5px; font-weight:700; letter-spacing:0.08em; padding:3px 9px; border-radius:999px; white-space:nowrap; }
    .pill.live { background:rgba(34,197,94,.16); color:#4ade80; border:1px solid rgba(34,197,94,.4); }
    .pill.idle { background:rgba(138,147,162,.12); color:var(--muted); border:1px solid var(--border); }
    .pill.always { background:rgba(74,163,255,.14); color:#7dbcff; border:1px solid rgba(74,163,255,.35); }
    .pill.custom { background:rgba(251,191,36,.14); color:var(--warn); border:1px solid rgba(251,191,36,.35); }
    .url { font-family:ui-monospace,'Cascadia Code',monospace; font-size:12px; color:#aeb6c2; background:var(--panel2); border:1px solid var(--border); border-radius:6px; padding:7px 9px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .row { display:flex; gap:8px; flex-wrap:wrap; }
    button.act { flex:1; min-width:72px; cursor:pointer; border:1px solid var(--border); background:var(--panel2); color:var(--fg); border-radius:7px; padding:8px 10px; font-size:13px; font-weight:600; transition:background .15s,border-color .15s; }
    button.act:hover { background:#262c35; }
    button.open { background:var(--accent); border-color:var(--accent); color:#06121f; }
    button.open:hover { background:#6fb6ff; }
    button.edit { border-color:rgba(74,163,255,.4); color:#9ec5ff; }
    button.copied { background:var(--on); border-color:var(--on); color:#04210f; }
    .hint { font-size:12px; color:var(--muted); margin:-6px 0 22px; }
    .hint code { background:var(--panel2); padding:1px 6px; border-radius:4px; }
    .editor-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.72); z-index:50; display:none; align-items:center; justify-content:center; padding:24px; }
    .editor-backdrop.open { display:flex; }
    .editor-modal { width:min(960px,100%); max-height:90vh; background:var(--panel); border:1px solid var(--border); border-radius:14px; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 24px 80px rgba(0,0,0,.55); }
    .editor-head { display:flex; justify-content:space-between; align-items:center; gap:12px; padding:14px 18px; border-bottom:1px solid var(--border); }
    .editor-head h3 { margin:0; font-size:16px; }
    .editor-badge { font-size:10px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; padding:4px 8px; border-radius:6px; background:rgba(251,191,36,.15); color:var(--warn); border:1px solid rgba(251,191,36,.3); }
    .editor-badge.original { background:rgba(138,147,162,.12); color:var(--muted); border-color:var(--border); }
    .editor-body { flex:1; min-height:0; padding:12px 18px; }
    .editor-textarea { width:100%; height:min(52vh,520px); resize:vertical; background:#0a0c10; color:#e8ebf0; border:1px solid var(--border); border-radius:8px; padding:12px; font-family:ui-monospace,'Cascadia Code',monospace; font-size:12px; line-height:1.5; }
    .editor-foot { display:flex; justify-content:space-between; align-items:center; gap:10px; padding:12px 18px; border-top:1px solid var(--border); flex-wrap:wrap; }
    .editor-status { font-size:12px; color:var(--muted); flex:1; }
    .editor-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .btn-primary { background:var(--accent); border:1px solid var(--accent); color:#06121f; font-weight:700; border-radius:8px; padding:8px 14px; cursor:pointer; }
    .btn-secondary { background:var(--panel2); border:1px solid var(--border); color:var(--fg); font-weight:600; border-radius:8px; padding:8px 14px; cursor:pointer; }
    .btn-danger { background:rgba(239,68,68,.15); border:1px solid rgba(239,68,68,.4); color:#fca5a5; font-weight:600; border-radius:8px; padding:8px 14px; cursor:pointer; }
    .preview-wrap { width:100%; aspect-ratio:16/9; border-radius:8px; background:#080a0e; overflow:hidden; }
    .preview-iframe { width:100%; height:100%; border:none; display:block; pointer-events:none; }
  </style>
</head>
<body>
  <header>
    <h1>NE Broadcast Suite â€” Scene Sources</h1>
    <div class="conn"><span class="dot" id="conn-dot"></span><span id="conn-text">connectingâ€¦</span></div>
    <div class="baseurl">
      <label for="base-input">Base URL</label>
      <input id="base-input" value="http://localhost:3000">
    </div>
  </header>
  <main>
    <p class="hint">Add any of these as a <strong>Browser Source</strong> in OBS at <code>1920Ã—1080</code>. <strong>Edit HTML</strong> opens a code editor â€” save creates a local override; <strong>Revert</strong> restores the shipped original. Customized scenes show a gold badge. <span id="onair-summary"></span></p>
    <div id="groups"></div>
  </main>

  <div class="editor-backdrop" id="editor-backdrop">
    <div class="editor-modal">
      <div class="editor-head">
        <div>
          <h3 id="editor-title">Edit scene</h3>
          <div style="font-size:12px;color:var(--muted);margin-top:4px;" id="editor-path"></div>
        </div>
        <span class="editor-badge original" id="editor-badge">Original</span>
      </div>
      <div class="editor-body">
        <textarea class="editor-textarea" id="editor-code" spellcheck="false"></textarea>
      </div>
      <div class="editor-foot">
        <span class="editor-status" id="editor-status"></span>
        <div class="editor-actions">
          <button type="button" class="btn-secondary" id="editor-cancel">Cancel</button>
          <button type="button" class="btn-danger" id="editor-revert" disabled>Revert to original</button>
          <button type="button" class="btn-primary" id="editor-save">Save override</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const CATALOG = [
      { group: 'In-Game HUD', items: [
        { name: 'Main Overlay (RL)', path: '/', desc: 'Scoreboard, goal replays, post-match stats, sponsor banner, ticker, spotlight.', live: 'always', editPath: '/index.html' },
        { name: 'RL HUD (Modern)', path: '/rl-hud.html', desc: 'Modern Rocket League HUD layout.', live: 'always' },
        { name: 'Live HUD (auto-game)', path: '/live.html', desc: 'Unified HUD that automatically follows whichever game is currently active.', live: 'always' },
        { name: 'CS2 / CS:GO HUD', path: '/csgo.html', desc: 'GSI-driven CS2 overlay - scorebar, players, radar, bomb, economy.', live: 'always' },
        { name: 'Valorant HUD', path: '/valorant.html', desc: 'Round scorebar, agents, spike and economy.', live: 'always' },
        { name: 'Overwatch 2 HUD', path: '/overwatch.html', desc: 'Hero line-up, objective and score HUD.', live: 'always' },
        { name: 'Marvel Rivals HUD', path: '/marvel-rivals.html', desc: 'Hero roster and objective scorebar.', live: 'always' },
        { name: 'Series Scoreboard', path: '/series.html', desc: 'Standalone series / match scoreboard banner.', live: null },
        { name: 'Mini Station', path: '/ministation.html', desc: 'Compact mini-HUD for secondary broadcast stations or split-screen.', live: null },
        { name: 'Director Preview', path: '/director-preview.html', desc: 'Producer-only director bug â€” add ?director=1 to activate.', live: null },
      ]},
      { group: 'Casters & Desk', items: [
        { name: 'Casters (grid)', path: '/casters.html', desc: 'Up to 4 commentators â€” auto-sized cam holes + name plates.', live: 'casters.visible' },
        { name: 'Duo Row', path: '/duorow.html', desc: '2 caster cams in a row + team scorebar + footer.', live: 'casters.visible' },
        { name: 'Trio Row', path: '/triorow.html', desc: '3 caster cams in a row + scorebar + footer.', live: 'casters.visible' },
        { name: 'Single Cam', path: '/singlecam.html', desc: 'Solo caster — one big cam + scorebar, sponsor under the cam.', live: 'casters.visible' },
        { name: 'Duo (single cam)', path: '/duosinglecam.html', desc: '2 casters sharing one wide camera.', live: 'casters.visible' },
        { name: 'Analyst Desk', path: '/analystspecial.html', desc: 'Featured host + analyst cams.', live: 'casters.visible' },
        { name: 'Cam Over Game (PiP)', path: '/campip.html', desc: 'Caster cam(s) in a corner over gameplay. ?pos=br|bl|tr|tl.', live: 'casters.visible' },
        { name: 'Talent Bar (lower third)', path: '/talentbar.html', desc: 'Slim bottom strip of caster cams + names over gameplay/replay.', live: 'casters.visible' },
        { name: 'Interview / Head-to-head', path: '/interview.html', desc: 'Two big cams side by side with a VS medallion.', live: 'casters.visible' },
        { name: 'Quad Desk (2x2)', path: '/quaddesk.html', desc: 'Four-person panel — 2x2 framed cams + scorebar.', live: 'casters.visible' },
        { name: 'Matchup Desk (pre-game)', path: '/matchup.html', desc: 'Both rosters side by side + casters.', live: 'casters.visible' },
        { name: 'Player Spotlight Desk', path: '/spotlightdesk.html', desc: 'Analyst cam + featured player card with live stats.', live: 'casters.visible' },
        { name: 'Vertical (9:16)', path: '/vertical.html', desc: 'Vertical co-stream — set the OBS source to 1080x1920.', live: 'casters.visible' },
        { name: 'Listen In', path: '/listen-in.html', desc: "One player's live mic + captions on stream (VDO talent).", live: 'listenIn.active' },
      ]},
      { group: 'Pre / Post / Breaks', items: [
        { name: 'Trigger Graphics (all-in-one)', path: '/triggers.html', desc: 'ONE source for every triggered graphic (countdown, winner, intro, veto, draft, bracket, upcoming, standings). Add to any scene; qrail Triggers/Overlays pop the right one over it.', live: null },
        { name: 'Countdown / Starting Soon', path: '/countdown.html', desc: 'Break standby timer with movie-countdown finish.', live: 'breakScreen.visible' },
        { name: 'Winner / Post-match', path: '/winner.html', desc: 'Champion screen â€” team logo, name, subtitle.', live: 'winner.visible' },
        { name: 'Team Line-up / Intro', path: '/intro.html', desc: 'Animated roster cards. Add ?side=blue or ?side=orange.', live: 'intro.visible' },
        { name: 'Draft Screen', path: '/draft.html', desc: 'Animated pick/ban draft overlay for character or agent selection.', live: null },
      ]},
      { group: 'Bracket & Veto', items: [
        { name: 'Bracket', path: '/bracket.html', desc: 'Live bracket â€” elim columns or standings table.', live: 'bracket.visible' },
        { name: 'Map Veto / Map Board', path: '/mapscreen.html', desc: 'Pick/ban board for CS2/Valorant-style series.', live: 'veto.visible' },
      ]},
      { group: 'Replays', items: [
        { name: 'Replay / Montage Player', path: '/replay-player.html', desc: 'Full-screen OBS replay buffer and montage playout overlay.', live: null },
      ]},
      { group: 'Twitch Interactions', items: [
        { name: 'Twitch Alerts', path: '/twitch-alerts.html', desc: 'Follower, subscriber and donation alerts overlay.', live: null },
        { name: 'Predictions', path: '/twitch-predictions.html', desc: 'Channel-point prediction tracker with hide timer.', live: null },
        { name: 'Giveaway Wheel', path: '/twitch-wheel.html', desc: 'On-screen spin wheel for Twitch chat giveaways.', live: null },
        { name: 'Mini-Games', path: '/twitch-minigames.html', desc: 'Interactive Twitch chat mini-games overlay.', live: null },
      ]},
      { group: 'Stingers & Transitions', items: [
        { name: 'Transition (accent wipe)', path: '/transition.html', desc: 'Brand wipe with centre logo. ?team=blue|orange for a team logo.', live: null },
        { name: 'Transition (solid)', path: '/transitionbgg.html', desc: 'Solid-fill wipe variant - dark panel behind the logo.', live: null },
        { name: 'Replay Wipe', path: '/replay.html', desc: '"REPLAY" plate slide-in. ?label=, ?team=.', live: null },
      ]},
      { group: 'Sponsors & Branding', items: [
        { name: 'Sponsor Banner (Main)', path: '/sponsor-banner.html?src=main', desc: 'Rotating sponsor strip driven by the Main banner.', live: 'banner.visible' },
        { name: 'Sponsor Banner (Active brand)', path: '/sponsor-banner.html?src=brand', desc: 'Sponsor strip driven by the active client brand kit.', live: 'banner.visible' },
      ]},
    ];

    function baseUrl() { return (document.getElementById('base-input').value || '').replace(/\/+$/, ''); }
    function fullUrl(path) { return baseUrl() + path; }
    function editPathFor(it) { return it.editPath || it.path; }

    function get(obj, dotted) {
      return dotted.split('.').reduce((o, k) => (o == null ? undefined : o[k]), obj);
    }

    let lastState = {};
    let overridePaths = new Set();
    const cardEls = [];

    async function fetchOverrides() {
      try {
        const r = await fetch(baseUrl() + '/api/overlay/overrides');
        const j = await r.json();
        overridePaths = new Set((j.paths || []).map((p) => p.replace(/^\//, '')));
      } catch (e) { overridePaths = new Set(); }
      refreshBadges();
    }

    function buildCards() {
      const root = document.getElementById('groups');
      root.innerHTML = '';
      cardEls.length = 0;
      CATALOG.forEach((g) => {
        const sec = document.createElement('div'); sec.className = 'group';
        const h = document.createElement('h2'); h.textContent = g.group; sec.appendChild(h);
        const cards = document.createElement('div'); cards.className = 'cards';
        g.items.forEach((it) => {
          const ep = editPathFor(it).replace(/^\//, '') || 'index.html';
          const isCustom = overridePaths.has(ep);
          const card = document.createElement('div'); card.className = 'card' + (isCustom ? ' customized' : '');
          const url = fullUrl(it.path);
          const pillClass = it.live === 'always' ? 'always' : (it.live ? 'idle' : 'idle');
          const pillText = isCustom ? 'CUSTOM' : (it.live === 'always' ? 'ALWAYS' : (it.live ? 'OFF AIR' : 'STINGER'));
          const previewSrc = url.replace(/"/g, '%22') + (url.includes('?') ? '&' : '?') + 'preview=1&thumb=1';
          card.innerHTML = `
            <div class="top">
              <div class="name">${it.name}</div>
              <span class="pill ${isCustom ? 'custom' : pillClass}">${pillText}</span>
            </div>
            <div class="preview-wrap">
              <iframe class="preview-iframe" data-src="${previewSrc}" tabindex="-1" title="${it.name} preview"></iframe>
            </div>
            <div class="desc">${it.desc}</div>
            <div class="url" title="${url}">${url}</div>
            <div class="row">
              <button class="act open">Open</button>
              <button class="act preview">Preview</button>
              <button class="act copy">Copy</button>
              <button class="act edit">Edit HTML</button>
            </div>`;
          card.querySelector('.open').addEventListener('click', () => window.open(fullUrl(it.path), '_blank'));
          card.querySelector('.preview').addEventListener('click', () => {
            const u = fullUrl(it.path);
            window.open(u + (u.includes('?') ? '&' : '?') + 'preview=1', '_blank');
          });
          const copyBtn = card.querySelector('.copy');
          copyBtn.addEventListener('click', () => {
            const text = fullUrl(it.path);
            navigator.clipboard?.writeText(text).then(() => {
              copyBtn.textContent = 'Copied!'; copyBtn.classList.add('copied');
              setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 1200);
            }).catch(() => { prompt('Copy this URL:', text); });
          });
          card.querySelector('.edit').addEventListener('click', () => openEditor(editPathFor(it), it.name));
          const urlEl = card.querySelector('.url');
          cards.appendChild(card);
          cardEls.push({ live: it.live, pill: card.querySelector('.pill'), urlEl, path: it.path, editRel: ep, card });
        });
        sec.appendChild(cards);
        root.appendChild(sec);
      });
      refreshBadges();
    }

    function refreshBadges() {
      let liveCount = 0;
      cardEls.forEach((c) => {
        c.urlEl.textContent = fullUrl(c.path);
        c.urlEl.title = fullUrl(c.path);
        const isCustom = overridePaths.has(c.editRel);
        if (c.card) c.card.classList.toggle('customized', isCustom);
        if (isCustom) {
          c.pill.className = 'pill custom';
          c.pill.textContent = 'CUSTOM';
        } else if (c.live === 'always' || !c.live) {
          c.pill.className = 'pill ' + (c.live === 'always' ? 'always' : 'idle');
          c.pill.textContent = c.live === 'always' ? 'ALWAYS' : 'STINGER';
        }
        if (c.live === 'always' || !c.live) return;
        const on = !!get(lastState, c.live);
        if (on) liveCount++;
        if (!isCustom) {
          c.pill.className = 'pill ' + (on ? 'live' : 'idle');
          c.pill.textContent = on ? 'ON AIR' : 'OFF AIR';
        }
      });
      const sum = document.getElementById('onair-summary');
      sum.textContent = liveCount ? `Â· ${liveCount} scene${liveCount > 1 ? 's' : ''} on air now.` : '';
    }

    let editorRel = '';
    async function openEditor(filePath, title) {
      editorRel = (filePath || '/').replace(/^\//, '') || 'index.html';
      document.getElementById('editor-title').textContent = title || 'Edit scene';
      document.getElementById('editor-path').textContent = filePath;
      document.getElementById('editor-status').textContent = 'Loadingâ€¦';
      document.getElementById('editor-backdrop').classList.add('open');
      try {
        const r = await fetch(baseUrl() + '/api/overlay/source?path=' + encodeURIComponent(filePath.startsWith('/') ? filePath : '/' + filePath));
        const j = await r.json();
        if (!j.ok) throw new Error(j.message || 'Load failed');
        document.getElementById('editor-code').value = j.content || '';
        const badge = document.getElementById('editor-badge');
        badge.textContent = j.isOverride ? 'Custom override' : 'Original';
        badge.className = 'editor-badge' + (j.isOverride ? '' : ' original');
        document.getElementById('editor-revert').disabled = !j.isOverride;
        document.getElementById('editor-status').textContent = j.isOverride ? 'Editing your saved override' : 'Editing original â€” Save creates an override';
      } catch (e) {
        document.getElementById('editor-status').textContent = 'Error: ' + e.message;
      }
    }

    function closeEditor() {
      document.getElementById('editor-backdrop').classList.remove('open');
      editorRel = '';
    }

    document.getElementById('editor-cancel').addEventListener('click', closeEditor);
    document.getElementById('editor-backdrop').addEventListener('click', (e) => {
      if (e.target.id === 'editor-backdrop') closeEditor();
    });
    document.getElementById('editor-save').addEventListener('click', async () => {
      const content = document.getElementById('editor-code').value;
      document.getElementById('editor-status').textContent = 'Savingâ€¦';
      try {
        const r = await fetch(baseUrl() + '/api/overlay/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: '/' + editorRel, content })
        });
        const j = await r.json();
        if (!j.ok) throw new Error(j.message || 'Save failed');
        document.getElementById('editor-status').textContent = 'Saved â€” refresh OBS browser source to see changes';
        document.getElementById('editor-badge').textContent = 'Custom override';
        document.getElementById('editor-badge').className = 'editor-badge';
        document.getElementById('editor-revert').disabled = false;
        await fetchOverrides();
      } catch (e) {
        document.getElementById('editor-status').textContent = 'Error: ' + e.message;
      }
    });
    document.getElementById('editor-revert').addEventListener('click', async () => {
      if (!confirm('Revert to the original shipped HTML? Your override will be deleted.')) return;
      document.getElementById('editor-status').textContent = 'Revertingâ€¦';
      try {
        const r = await fetch(baseUrl() + '/api/overlay/revert', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: '/' + editorRel })
        });
        const j = await r.json();
        if (!j.ok) throw new Error(j.message || 'Revert failed');
        const src = await fetch(baseUrl() + '/api/overlay/source?path=' + encodeURIComponent('/' + editorRel));
        const data = await src.json();
        document.getElementById('editor-code').value = data.content || '';
        document.getElementById('editor-badge').textContent = 'Original';
        document.getElementById('editor-badge').className = 'editor-badge original';
        document.getElementById('editor-revert').disabled = true;
        document.getElementById('editor-status').textContent = 'Reverted to original';
        await fetchOverrides();
      } catch (e) {
        document.getElementById('editor-status').textContent = 'Error: ' + e.message;
      }
    });

    function connect() {
      const ws = new WebSocket('ws://' + (location.hostname || 'localhost') + ':3001');
      ws.onopen = () => { setConn(true); ws.send(JSON.stringify({ type: 'request_state' })); };
      ws.onmessage = ({ data }) => {
        let msg; try { msg = JSON.parse(data); } catch { return; }
        if (msg.type === 'full_state') { lastState = msg.data || {}; refreshBadges(); }
      };
      ws.onclose = () => { setConn(false); setTimeout(connect, 800); };
      ws.onerror = () => { try { ws.close(); } catch {} };
    }
    function setConn(ok) {
      document.getElementById('conn-dot').classList.toggle('ok', ok);
      document.getElementById('conn-text').textContent = ok ? 'connected' : 'offline';
    }

    document.getElementById('base-input').addEventListener('input', () => { refreshBadges(); fetchOverrides(); });
    if (location.origin && location.origin.startsWith('http')) document.getElementById('base-input').value = location.origin;
    buildCards();
    fetchOverrides();
    connect();

    // Lazy-load previews and inject zoom after load.
    // Injecting zoom on the iframe's own <body> works for ALL pages â€” same-origin, no CSS fight.
    (function() {
      function injectZoom(fr, pw) {
        try {
          var doc = fr.contentDocument;
          if (!doc || !doc.body) return;
          doc.body.style.zoom = (pw / 1920);
          doc.documentElement.style.overflow = 'hidden';
        } catch (e) {}
      }
      var RO = new ResizeObserver(function(entries) {
        entries.forEach(function(entry) {
          var wrap = entry.target;
          if (wrap.dataset.loaded) return;
          var pw = entry.contentRect.width;
          if (!pw) return;
          wrap.dataset.loaded = '1';
          var fr = wrap.querySelector('.preview-iframe');
          if (!fr || !fr.dataset.src) return;
          fr.src = fr.dataset.src;
          fr.addEventListener('load', function() { injectZoom(fr, pw); });
        });
      });
      document.querySelectorAll('.preview-wrap').forEach(function(wrap) { RO.observe(wrap); });
    })();
  </script>
</body>
</html>
