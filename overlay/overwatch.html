<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>NE Broadcast Suite — Overwatch 2 Scoreboard</title>
<style>
:root {
  --text:    #f0f4ff;
  --muted:   rgba(200,215,255,.45);
  --surface2:#161c2e;
  --good:    #4adf88;
  --bad:     #f56565;
  --role-tank:    linear-gradient(160deg,#0b2d45,#143f60);
  --role-damage:  linear-gradient(160deg,#3d0d0d,#6b1818);
  --role-support: linear-gradient(160deg,#0b3322,#165232);
  --main-font:'Rajdhani','Barlow Condensed','Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:1920px;height:1080px;overflow:hidden;background:transparent;
  font-family:var(--main-font);color:var(--text)}

#ow-board{
  position:absolute;top:0;left:0;right:0;height:0;overflow:visible;
  transition:opacity .4s;
}
#ow-board.hidden{opacity:0;pointer-events:none}

/* ── Team panels — 64px, single row ─────────────────────────────────── */
.ow-panel{
  position:absolute;top:0;
  width:572px;height:64px;
  background:rgba(7,9,15,.93);
  display:flex;flex-direction:row;align-items:center;
  padding:0 10px;gap:8px;
  overflow:hidden;
}
.ow-panel.left {left:0}
.ow-panel.right{right:0;flex-direction:row-reverse}

/* inner colour accent — full height, on inner edge */
.ow-accent{position:absolute;top:0;bottom:0;width:2px}
.ow-panel.left  .ow-accent{right:0}
.ow-panel.right .ow-accent{left:0}

/* ── Outer stacked column (event/history top + dots/role bottom) ───────── */
.ow-panel-ctx-col{
  display:flex;flex-direction:column;flex-shrink:0;
  width:140px;align-self:stretch;overflow:hidden;
  /* pushes identity group to the inner side without stealing name's width */
  margin-right:auto;
}
.ow-panel.right .ow-panel-ctx-col{margin-right:0;margin-left:auto;}
/* top half of outer column: event info or bans — slides in/out */
.ow-panel-ctx-row{
  flex:0 0 28px;position:relative;
  border-bottom:1px solid rgba(255,255,255,.06);
  overflow:hidden;
}
/* bottom half of outer column: dots + role icon */
.ow-panel-dots-row{
  flex:1;display:flex;align-items:center;gap:5px;
}
/* right panel: dots and bans align to the outer (right) edge of the ctx-col */
.ow-panel.right .ow-panel-dots-row{justify-content:flex-end;}

/* slide-transition layers */
.ow-tb-default,.ow-tb-bans{
  position:absolute;inset:0;
  display:flex;align-items:center;gap:6px;padding:0 6px;
  transition:opacity .35s cubic-bezier(.4,0,.2,1),transform .35s cubic-bezier(.4,0,.2,1);
}
.ow-tb-bans{opacity:0;transform:translateY(110%);gap:5px}
.ow-panel.ban-mode .ow-tb-default{opacity:0;transform:translateY(-110%)}
.ow-panel.ban-mode .ow-tb-bans{opacity:1;transform:translateY(0)}
/* right panel bans/event-row: push content toward the outer edge */
.ow-panel.right .ow-tb-default,.ow-panel.right .ow-tb-bans{justify-content:flex-end;}

/* event name + format */
.ow-event-name{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;
  color:rgba(255,255,255,.45);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  flex:1;
}
.ow-event-format{
  font-size:10px;font-weight:900;letter-spacing:.5px;
  color:rgba(255,255,255,.65);flex-shrink:0;
  background:rgba(255,255,255,.08);padding:2px 5px;border-radius:3px;
}

/* mode icon — used in map history */
.ow-mode-icon{
  width:20px;height:20px;border-radius:2px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  background:rgba(255,255,255,.08);
}
.ow-mode-icon img{width:14px;height:14px;object-fit:contain}

/* map history cards */
.ow-hist-cards{display:flex;flex-direction:row;align-items:center;gap:7px;}
.ow-hist-card{display:flex;flex-direction:row;align-items:center;gap:4px;flex-shrink:0}
.ow-hist-logo{width:20px;height:20px;object-fit:contain;flex-shrink:0}
.ow-hist-label{font-size:10px;font-weight:900;letter-spacing:.5px;flex-shrink:0}
.ow-hist-label.win {color:#4adf88}
.ow-hist-label.loss{color:#f56565}
.ow-hist-label.pick{color:rgba(77,196,255,.9)}
.ow-hist-label.dcr {color:rgba(255,220,80,.9)}
.ow-hist-current-dot{
  width:9px;height:9px;border-radius:50%;
  background:transparent;border:1.5px solid rgba(77,196,255,.8);
  animation:pulse-ring 1.8s ease-in-out infinite;
}
@keyframes pulse-ring{
  0%,100%{box-shadow:0 0 0 0 rgba(77,196,255,.4)}
  50%     {box-shadow:0 0 0 3px rgba(77,196,255,.1)}
}
.ow-hist-future-num{font-size:11px;font-weight:600;color:rgba(255,255,255,.22)}
.ow-hist-divider{width:1px;height:16px;background:rgba(255,255,255,.1);flex-shrink:0}

/* bans label + portraits */
.ow-bans-lbl{
  font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:2px;
  color:#fff;flex-shrink:0;white-space:nowrap;
}
.ow-ban-portrait{
  width:20px;height:22px;border-radius:3px;
  background:var(--surface2);border:1px solid rgba(255,255,255,.15);
  overflow:hidden;position:relative;flex-shrink:0;
  transition:border-color .3s;
}
.ow-ban-img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block}
.ow-ban-role-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}

/* ── Map dots + role — inside outer column bottom half ────────────────── */
.ow-map-history{display:flex;flex-direction:row;align-items:center;gap:4px;flex-shrink:0}
.ow-role-icon{flex-shrink:0;display:none;align-items:center;justify-content:center;width:26px;height:26px;}
.ow-role-icon.visible{display:flex}
/* mirror: on the right panel, role icon sits at the outer (right) edge after the dots */
.ow-panel.right .ow-role-icon{order:2;}
.ow-panel.right .ow-map-history{order:1;}

/* ── Identity — name, logo, score: full 64px height available ─────────── */
.ow-gap{flex:1}

/* name — natural content width; ctx-col margin-right:auto handles spacing */
.ow-team-name{
  font-size:22px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;
  line-height:1;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  flex:0 1 auto;min-width:0;text-align:right;
}
.ow-panel.right .ow-team-name{text-align:left}

/* logo — big */
.ow-logo-wrap{
  width:44px;height:44px;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;flex-shrink:0;
}
.ow-logo-wrap img{width:44px;height:44px;object-fit:contain}

/* separator between logo and score */
.ow-panel-sep{flex-shrink:0;width:1px;height:28px;background:rgba(255,255,255,.15)}

/* score — dominant, inner edge */
.ow-score{
  font-size:40px;font-weight:900;line-height:1;letter-spacing:-1px;
  color:#fff;flex-shrink:0;min-width:28px;text-align:center;
}
.ow-map-dot{
  width:14px;height:14px;border-radius:50%;
  background:transparent;
  border:1.5px solid color-mix(in srgb,var(--team-color,rgba(255,255,255,.35)) 55%,transparent);
  transition:background .3s,border-color .3s;
}
.ow-map-dot.win{
  background:var(--team-color,#4dc4ff);
  border-color:var(--team-color,#4dc4ff);
}

/* ── Center group — two-layer rotating pill ── */
#ow-center-group{
  position:absolute;
  top:0;
  left:50%;transform:translateX(-50%);
  display:grid;
  background:rgba(7,9,15,.94);
  clip-path:polygon(0 0,100% 0,calc(100% - 14px) 100%,14px 100%);
  height:34px;
  overflow:hidden;
  filter:drop-shadow(0 4px 14px rgba(0,0,0,.65));
  transition:left .5s cubic-bezier(.4,0,.2,1);
}
/* Both slides occupy the same grid cell — pill auto-sizes to the wider one */
#ow-center-default,#ow-center-history{
  grid-row:1;grid-column:1;
  display:flex;align-items:center;justify-content:center;
  padding:0 32px;gap:0;
  white-space:nowrap;
  transition:opacity .4s cubic-bezier(.4,0,.2,1),transform .4s cubic-bezier(.4,0,.2,1);
}
#ow-center-history{opacity:0;transform:translateY(110%);gap:6px;}
#ow-center-group.show-history #ow-center-default{opacity:0;transform:translateY(-110%);}
#ow-center-group.show-history #ow-center-history{opacity:1;transform:translateY(0);}

#ow-map-box{
  display:flex;align-items:center;gap:7px;
}
.ow-map-label{
  font-size:13px;font-weight:800;text-transform:uppercase;
  letter-spacing:2px;color:#fff;line-height:1;
}
.ow-map-of{
  font-size:18px;font-weight:900;text-transform:uppercase;
  letter-spacing:.5px;color:#fff;line-height:1;
}

/* ── Sponsor section — inline with map label, separated by a divider ── */
#ow-sponsor-box{
  display:none;align-items:center;gap:10px;
  padding-left:14px;margin-left:14px;
  border-left:1px solid rgba(255,255,255,.18);
  height:20px;
}
#ow-sponsor-box.visible{display:flex}
.ow-sp-label{
  font-size:9px;font-weight:800;text-transform:uppercase;
  letter-spacing:1.5px;color:#fff;opacity:.75;
}
.ow-sp-sep{display:none}
.ow-sp-logo{max-height:20px;max-width:80px;object-fit:contain}
</style>
</head>
<body>
<div id="ow-board" class="hidden">

  <!-- LEFT: [event/dots col] [←gap→] [NAME] [LOGO] [|] [SCORE] — all one 64px row -->
  <div class="ow-panel left" id="ow-panel-a">
    <div class="ow-accent" id="ow-accent-a"></div>
    <div class="ow-panel-ctx-col">
      <div class="ow-panel-ctx-row">
        <div class="ow-tb-default">
          <span class="ow-event-name" id="ow-event-name">TOURNAMENT</span>
          <span class="ow-event-format" id="ow-event-format">BO5</span>
        </div>
        <div class="ow-tb-bans">
          <span class="ow-bans-lbl" id="ow-bans-lbl-a" style="display:none">BANS</span>
          <div class="ow-ban-portrait" id="ow-ban-portrait-a0" style="display:none">
            <img class="ow-ban-img" id="ow-ban-img-a0" src="" alt="" style="display:none"
                 onerror="this.style.display='none';owShowIcon('ow-ban-icon-a0')">
            <span class="ow-ban-role-icon" id="ow-ban-icon-a0"></span>
          </div>
          <div class="ow-ban-portrait" id="ow-ban-portrait-a1" style="display:none">
            <img class="ow-ban-img" id="ow-ban-img-a1" src="" alt="" style="display:none"
                 onerror="this.style.display='none';owShowIcon('ow-ban-icon-a1')">
            <span class="ow-ban-role-icon" id="ow-ban-icon-a1"></span>
          </div>
        </div>
      </div>
      <div class="ow-panel-dots-row">
        <div class="ow-role-icon" id="ow-role-a"></div>
        <div class="ow-map-history" id="ow-history-a"></div>
      </div>
    </div>
    <div class="ow-team-name" id="ow-name-a">TEAM A</div>
    <div class="ow-logo-wrap"><img id="ow-logo-a" src="" alt="" onerror="this.src='/assets/games/overwatch2.png'"></div>
    <div class="ow-panel-sep"></div>
    <div class="ow-score" id="ow-score-a">0</div>
  </div>

  <!-- CENTER pill — rotates between game counter and map history -->
  <div id="ow-center-group">
    <div id="ow-center-default">
      <div id="ow-map-box">
        <span class="ow-map-label">Game</span>
        <span class="ow-map-of" id="ow-map-of">1 of 5</span>
      </div>
      <div id="ow-sponsor-box">
        <span class="ow-sp-label">Presented By</span>
      </div>
    </div>
    <div id="ow-center-history">
      <div class="ow-hist-cards" id="ow-hist-cards"></div>
    </div>
  </div>

  <!-- RIGHT (row-reverse): [SCORE] [|] [LOGO] [NAME] [←gap→] [dots/event col] -->
  <div class="ow-panel right" id="ow-panel-b">
    <div class="ow-accent" id="ow-accent-b"></div>
    <div class="ow-panel-ctx-col">
      <div class="ow-panel-ctx-row">
        <div class="ow-tb-default">
        </div>
        <div class="ow-tb-bans">
          <span class="ow-bans-lbl" id="ow-bans-lbl-b" style="display:none">BANS</span>
          <div class="ow-ban-portrait" id="ow-ban-portrait-b0" style="display:none">
            <img class="ow-ban-img" id="ow-ban-img-b0" src="" alt="" style="display:none"
                 onerror="this.style.display='none';owShowIcon('ow-ban-icon-b0')">
            <span class="ow-ban-role-icon" id="ow-ban-icon-b0"></span>
          </div>
          <div class="ow-ban-portrait" id="ow-ban-portrait-b1" style="display:none">
            <img class="ow-ban-img" id="ow-ban-img-b1" src="" alt="" style="display:none"
                 onerror="this.style.display='none';owShowIcon('ow-ban-icon-b1')">
            <span class="ow-ban-role-icon" id="ow-ban-icon-b1"></span>
          </div>
        </div>
      </div>
      <div class="ow-panel-dots-row">
        <div class="ow-role-icon" id="ow-role-b"></div>
        <div class="ow-map-history" id="ow-history-b"></div>
      </div>
    </div>
    <div class="ow-team-name" id="ow-name-b">TEAM B</div>
    <div class="ow-logo-wrap"><img id="ow-logo-b" src="" alt="" onerror="this.src='/assets/games/overwatch2.png'"></div>
    <div class="ow-panel-sep"></div>
    <div class="ow-score" id="ow-score-b">0</div>
  </div>

</div>
<script src="scene-base.js"></script>
<script>
const HERO_ROLES = {
  dva:'tank',doomfist:'tank','junker-queen':'tank',mauga:'tank',hazard:'tank',
  orisa:'tank',ramattra:'tank',reinhardt:'tank',roadhog:'tank',
  sigma:'tank',winston:'tank','wrecking-ball':'tank',zarya:'tank',
  ashe:'damage',bastion:'damage',cassidy:'damage',echo:'damage',freja:'damage',
  genji:'damage',hanzo:'damage',junkrat:'damage',mei:'damage',
  pharah:'damage',reaper:'damage',sojourn:'damage','soldier-76':'damage',
  sombra:'damage',symmetra:'damage',torbjorn:'damage',tracer:'damage',
  venture:'damage',widowmaker:'damage',
  ana:'support',baptiste:'support',brigitte:'support',illari:'support',
  juno:'support',kiriko:'support',lifeweaver:'support',lucio:'support',
  mercy:'support',moira:'support',zenyatta:'support'
};
const ROLE_SVG = {
  tank:'<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L4 6v5c0 5.5 3.5 10.3 8 11.5 4.5-1.2 8-6 8-11.5V6z"/></svg>',
  damage:'<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>',
  support:'<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l7.78-7.78a5.5 5.5 0 0 0 0-7.78z"/></svg>'
};

function heroSlug(n){
  return(n||'').toLowerCase().replace(/ö/g,'o').replace(/ú/g,'u').replace(/[.']/g,'').replace(/:\s*/g,'-').replace(/\s+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
}
function heroRole(n){ return HERO_ROLES[heroSlug(n)]||null; }
function heroImgUrl(n){ const s=heroSlug(n); return s?`/assets/overwatch/heroes/${s}.png`:''; }
function owShowIcon(id){ const e=document.getElementById(id); if(e) e.style.opacity='.55'; }


function applyBan(pId,imgId,iconId,name){
  const p=document.getElementById(pId), img=document.getElementById(imgId), icon=document.getElementById(iconId);
  if(!p) return;
  p.className='ow-ban-portrait';
  if(!name){ p.style.display='none'; if(img){img.src='';img.style.display='none';} if(icon){icon.innerHTML='';icon.style.opacity='';} return; }
  p.style.display='flex';
  const role=heroRole(name);
  const url=heroImgUrl(name);
  if(url&&img){ img.style.display='block'; img.src=url; if(icon){icon.innerHTML='';icon.style.opacity='0';} }
  else { if(img){img.style.display='none';img.src='';} if(icon){icon.innerHTML=ROLE_SVG[role]||'';icon.style.opacity='.55';} }
}

function getBanNames(bansByMap,idx,side){
  const entry=(Array.isArray(bansByMap)?bansByMap[idx]:null)||{};
  const v=entry[side];
  if(Array.isArray(v)) return [v[0]&&v[0].hero||'', v[1]&&v[1].hero||''];
  if(v&&v.hero) return [v.hero, ''];
  return ['',''];
}

function applyTeamBans(team, bansByMap, idx){
  const names=getBanNames(bansByMap,idx,team);
  const lbl=document.getElementById('ow-bans-lbl-'+team);
  applyBan('ow-ban-portrait-'+team+'0','ow-ban-img-'+team+'0','ow-ban-icon-'+team+'0',names[0]);
  applyBan('ow-ban-portrait-'+team+'1','ow-ban-img-'+team+'1','ow-ban-icon-'+team+'1',names[1]);
  if(lbl) lbl.style.display=(names[0]||names[1])?'':'none';
}

function buildHistory(id, wins, target) {
  const w = document.getElementById(id); if (!w) return;
  w.innerHTML = '';
  for (let i = 0; i < target; i++) {
    const d = document.createElement('div');
    d.className = 'ow-map-dot' + (i < wins ? ' win' : '');
    w.appendChild(d);
  }
}

function renderSponsors(brand){
  const box=document.getElementById('ow-sponsor-box'); if(!box) return;
  const sponsors=(brand&&brand.railSponsors)||(brand&&brand.sponsors)||[];
  const logos=sponsors.filter(s=>s&&s.logo);
  box.innerHTML='';
  if(!logos.length){ box.classList.remove('visible'); return; }
  box.classList.add('visible');
  // "PRESENTED BY" label
  const lbl=document.createElement('div'); lbl.className='ow-sp-label';
  lbl.textContent='Presented by'; box.appendChild(lbl);
  logos.slice(0,3).forEach(s=>{
    const sep=document.createElement('div'); sep.className='ow-sp-sep'; box.appendChild(sep);
    const img=document.createElement('img'); img.className='ow-sp-logo';
    img.src=s.logo; img.alt=s.name||'';
    img.onerror=function(){this.previousSibling&&this.previousSibling.remove();this.remove();};
    box.appendChild(img);
  });
}

const MAP_MODES = {
  'dorado':'escort','havana':'escort','junkertown':'escort','rialto':'escort',
  'route 66':'escort','shambali monastery':'escort','watchpoint: gibraltar':'escort',
  'blizzard world':'hybrid','eichenwalde':'hybrid','hollywood':'hybrid',
  "king's row":'hybrid','midtown':'hybrid','numbani':'hybrid','paraíso':'hybrid',
  'antarctic peninsula':'control','busan':'control','ilios':'control',
  'lijiang tower':'control','nepal':'control','oasis':'control','samoa':'control',
  'colosseo':'push','esperança':'push','new queen street':'push','runasapi':'push',
  'new junk city':'flashpoint','suravasa':'flashpoint',
  'hanaoka':'clash','throne of anubis':'clash'
};
function getMapMode(mapName){
  return MAP_MODES[(mapName||'').toLowerCase().trim()]||null;
}

const MODE_IMG={
  escort:'/assets/overwatch/modes/Escort.webp',
  hybrid:'/assets/overwatch/modes/Hybrid.webp',
  control:'/assets/overwatch/modes/Control.webp',
  push:'/assets/overwatch/modes/Push.webp',
  flashpoint:'/assets/overwatch/modes/Flashpoint.webp',
  clash:'/assets/overwatch/modes/Clash.webp'
};

function buildHistoryBar(containerId,hist,tA,tB,fallbackMode,showLabels){
  const w=document.getElementById(containerId); if(!w) return;
  w.innerHTML='';
  hist.forEach(function(m,i){
    if(i>0){ const sep=document.createElement('div'); sep.className='ow-hist-divider'; w.appendChild(sep); }
    const card=document.createElement('div'); card.className='ow-hist-card';

    // Mode icon — only use gameMode fallback for the current map; everything else → unknown
    const mode=m.mode||getMapMode(m.name)||(m.current?fallbackMode:null)||'unknown';
    const icon=document.createElement('div');
    icon.className='ow-mode-icon';
    const imgSrc=MODE_IMG[mode];
    if(imgSrc){const mi=document.createElement('img');mi.src=imgSrc;mi.alt=mode;icon.appendChild(mi);}
    card.appendChild(icon);

    const OW_FB='/assets/games/overwatch2.png';
    if(m.winner){
      // Completed map — winner logo + WIN/LOSS label
      const winTeam=m.winner==='a'?tA:tB;
      if(winTeam){
        const img=document.createElement('img'); img.className='ow-hist-logo';
        img.src=winTeam.logo||OW_FB; img.alt='';
        img.onerror=function(){this.src=OW_FB;};
        card.appendChild(img);
      }
      if(showLabels){
        const lbl=document.createElement('span');
        lbl.className='ow-hist-label win';
        lbl.textContent='WIN';
        card.appendChild(lbl);
      }
    } else if(m.current){
      const dot=document.createElement('div'); dot.className='ow-hist-current-dot'; card.appendChild(dot);
    } else if(m.by){
      // Picked but not yet played — only show logo if team has a custom one
      const pickTeam=m.by==='a'?tA:tB;
      if(pickTeam&&pickTeam.logo){
        const img=document.createElement('img'); img.className='ow-hist-logo';
        img.src=pickTeam.logo; img.alt='';
        img.onerror=function(){this.style.display='none';};
        card.appendChild(img);
      }
      if(showLabels){
        const isDecider=m.action==='decider';
        const lbl=document.createElement('span');
        lbl.className='ow-hist-label '+(isDecider?'dcr':'pick');
        lbl.textContent=isDecider?'DCR':'PICK';
        card.appendChild(lbl);
      }
    } else {
      const num=document.createElement('span'); num.className='ow-hist-future-num'; num.textContent=i+1; card.appendChild(num);
    }
    w.appendChild(card);
  });
}

const PREVIEW=new URLSearchParams(location.search).get('preview')==='1';

function render(state){
  const ow=state.owMatch||{}, veto=state.veto||{}, teams=state.teams||{}, brand=state.brand||{};
  const board=document.getElementById('ow-board'); if(!board) return;
  const visible=!!ow.visible||PREVIEW;
  board.classList.toggle('hidden',!visible);
  if(!visible) return;

  const tA=teams.blue||{}, tB=teams.orange||{};
  setText('ow-name-a',(tA.name||'TEAM A').toUpperCase());
  setText('ow-name-b',(tB.name||'TEAM B').toUpperCase());
  const OW_FALLBACK='/assets/games/overwatch2.png';
  setSrc('ow-logo-a',tA.logo||OW_FALLBACK); setSrc('ow-logo-b',tB.logo||OW_FALLBACK);
  setStyle('ow-accent-a','background',tA.color||'#4dc4ff');
  setStyle('ow-accent-b','background',tB.color||'#ff6b35');
  const pA=document.getElementById('ow-panel-a'), pB=document.getElementById('ow-panel-b');
  if(pA) pA.style.setProperty('--team-color',tA.color||'#4dc4ff');
  if(pB) pB.style.setProperty('--team-color',tB.color||'#ff6b35');

  const vetoMaps=Array.isArray(veto.maps)?veto.maps:[];
  // Derive from scorecard state — no separate OW format/mapIdx needed
  const bestOf=state.bestOf||5;
  const total=Math.ceil(bestOf/2)*2-1; // max maps in series
  const gameNum=((state.game&&state.game.number)||1);
  const curIdx=Math.max(0,gameNum-1);

  // Scores come from the Scorecard (adjust_series → state.series.blue/orange)
  const series=state.series||{};
  setText('ow-score-a',String(series.blue||0));
  setText('ow-score-b',String(series.orange||0));

  // Center: "Game X of Y" — bestOf is total maps, not wins needed
  const displayGame=Math.min(Math.max(1,gameNum),bestOf);
  setText('ow-map-of',`${displayGame} of ${bestOf}`);

  renderSponsors(brand);

  // History dots + top map history bar
  const mapWinners=Array.isArray(ow.mapWinners)?ow.mapWinners:[];
  const mapModes  =Array.isArray(ow.mapModes)  ?ow.mapModes  :[];
  const hist=[];
  for(let i=0;i<total;i++){
    const m=vetoMaps[i]||{};
    const winner=mapWinners[i]||m.winner||null;
    hist.push({
      name:m.name||'',mode:mapModes[i]||m.mode||null,
      winner:winner,by:m.by||null,action:m.action||'',
      current:!winner&&i===curIdx
    });
  }
  const winsNeeded=Math.ceil(bestOf/2);
  buildHistory('ow-history-a',series.blue||0,winsNeeded);
  buildHistory('ow-history-b',series.orange||0,winsNeeded);
  buildHistoryBar('ow-hist-cards',hist,tA,tB,ow.gameMode||'escort',ow.showMapLabels!==false);

  // Event name bar
  setText('ow-event-name',(state.eventName||'TOURNAMENT').toUpperCase());
  const bestOfLabel=bestOf?'BO'+bestOf:(ow.format||'BO5');
  setText('ow-event-format',bestOfLabel);

  // Bans — treated as match-global (index 0 always); not per-map so winners
  // advancing the game number don't clear or flicker the ban display.
  const bans=Array.isArray(ow.bansByMap)?ow.bansByMap:[];
  applyTeamBans('a',bans,0);
  applyTeamBans('b',bans,0);
  const banEntry=bans[0]||{};
  const hasBans=!!(banEntry.a||banEntry.b);
  if(pA) pA.classList.toggle('ban-mode',hasBans);
  if(pB) pB.classList.toggle('ban-mode',hasBans);

  // Attack / Defense icons — only when the feature is enabled in the OW panel
  const atk = ow.showAttack ? (ow.attackSide || null) : null;
  applyRole('ow-role-a', atk==='a' ? 'attack' : atk==='b' ? 'defense' : null);
  applyRole('ow-role-b', atk==='b' ? 'attack' : atk==='a' ? 'defense' : null);

  // Center pill position — shifts horizontally to avoid game-mode HUD clutter
}

// Crossed daggers (attack)
const ROLE_ATTACK_SVG = '<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="21" x2="21" y2="3"/><line x1="3" y1="15" x2="9" y2="21"/><line x1="21" y1="9" x2="15" y2="3"/><line x1="21" y1="21" x2="3" y2="3"/><line x1="15" y1="21" x2="21" y2="15"/><line x1="3" y1="9" x2="9" y2="3"/></svg>';
// Shield (defense)
const ROLE_DEFENSE_SVG = '<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L4 5v6c0 5 3.6 9.7 8 11 4.4-1.3 8-6 8-11V5z"/><line x1="12" y1="7" x2="12" y2="17"/></svg>';

function applyRole(id, role){
  const el=document.getElementById(id); if(!el) return;
  el.classList.remove('visible');
  if(!role){ el.innerHTML=''; return; }
  el.innerHTML = role==='attack' ? ROLE_ATTACK_SVG : ROLE_DEFENSE_SVG;
  el.classList.add('visible');
}

function setText(id,v){const e=document.getElementById(id);if(e)e.textContent=v;}
function setSrc(id,v) {const e=document.getElementById(id);if(e)e.src=v;}
function setStyle(id,p,v){const e=document.getElementById(id);if(e)e.style[p]=v;}

SceneBase.connect(render);

// Rotate center pill between game counter and map history every 5 seconds
(function(){
  let _timer=null;
  function start(){
    if(_timer) return;
    _timer=setInterval(function(){
      const g=document.getElementById('ow-center-group');
      if(g) g.classList.toggle('show-history');
    },5000);
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',start);
  else start();
})();
</script>
