<!DOCTYPE html>
<!--
  matchup.html — pre-game "tale of the tape": both teams' rosters side by side with a
  VS medallion, series score, plus a caster strip at the bottom. Shares duorow.html's
  design language; driven by full_state (teams[].players, series, eventName, casters).
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="/fonts.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --duo-surface: #1a1d24; --duo-surface2: #20242e; --duo-border: #2e3340;
      --duo-accent: #e83a8b; --duo-accent2: #8b5cf6; --duo-muted: #8b93a8;
      --team-a: #055fdb; --team-b: #e97139; --pad-x: 30px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; color: #e8eaf0; -webkit-font-smoothing: antialiased; }
    /* No baked background — the Scenes page sets fill colour + opacity per graphic. */
    body { background: transparent; }
    .mu-stage { position: absolute; inset: 0; display: flex; flex-direction: column; padding: 34px var(--pad-x) 22px; opacity: 0; transition: opacity .4s ease; }
    .mu-stage.show { opacity: 1; }

    .mu-header { flex: 0 0 auto; text-align: center; margin-bottom: 22px; }
    .mu-eyebrow { font-family: 'Rajdhani','Inter',sans-serif; font-weight: 700; font-size: 18px; letter-spacing: .42em; text-transform: uppercase; color: var(--duo-accent); }
    .mu-title { font-family: 'Rajdhani','Inter',sans-serif; font-weight: 700; font-size: 44px; letter-spacing: .02em; text-transform: uppercase; color: #fff; line-height: 1; }
    .mu-title.is-empty { display: none; }

    .mu-body { flex: 1 1 0; min-height: 0; display: flex; align-items: stretch; gap: 0; position: relative; }
    .mu-team { flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; align-items: center; padding: 26px 22px;
      border: 1px solid var(--duo-border); background: linear-gradient(180deg, rgba(26,29,36,.9), rgba(14,16,22,.92)); opacity: 0; }
    .mu-team--a { border-radius: 16px 0 0 16px; border-right: 0; }
    .mu-team--b { border-radius: 0 16px 16px 0; border-left: 0; }
    .mu-team--a::before, .mu-team--b::before { content: ''; position: absolute; top: 0; bottom: 0; width: 5px; }
    .mu-team--a { position: relative; } .mu-team--b { position: relative; }
    .mu-team--a::before { left: 0; background: linear-gradient(180deg, var(--team-a), transparent); border-radius: 16px 0 0 0; }
    .mu-team--b::before { right: 0; background: linear-gradient(180deg, var(--team-b), transparent); border-radius: 0 16px 0 0; }
    .mu-stage.show .mu-team--a { animation: inL .7s cubic-bezier(.16,.84,.24,1) .1s forwards; }
    .mu-stage.show .mu-team--b { animation: inR .7s cubic-bezier(.16,.84,.24,1) .2s forwards; }
    @keyframes inL { from { opacity: 0; transform: translateX(-46px); } to { opacity: 1; transform: none; } }
    @keyframes inR { from { opacity: 0; transform: translateX(46px); } to { opacity: 1; transform: none; } }

    .mu-logo { width: 130px; height: 130px; object-fit: contain; filter: drop-shadow(0 6px 18px rgba(0,0,0,.5)); }
    .mu-logo.logo-on-dark { filter: brightness(0) invert(1) drop-shadow(0 6px 18px rgba(0,0,0,.5)); }
    .mu-name { font-family: 'Rajdhani','Inter',sans-serif; font-weight: 700; font-size: 40px; text-transform: uppercase; color: #fff; text-align: center; margin: 12px 0 4px; line-height: 1; max-width: 100%; }
    .mu-team--a .mu-name { text-shadow: 0 0 20px color-mix(in srgb, var(--team-a) 45%, transparent); }
    .mu-team--b .mu-name { text-shadow: 0 0 20px color-mix(in srgb, var(--team-b) 45%, transparent); }
    .mu-roster { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
    .mu-player { display: flex; align-items: center; gap: 12px; padding: 11px 18px; border-radius: 9px; background: rgba(255,255,255,.04); border: 1px solid var(--duo-border); }
    .mu-player .dot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; }
    .mu-team--a .mu-player .dot { background: var(--team-a); } .mu-team--b .mu-player .dot { background: var(--team-b); }
    .mu-pname { font-size: 24px; font-weight: 700; color: #eef1f7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1 1 auto; }
    .mu-prole { font-size: 13px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--duo-muted); }
    .mu-empty { color: var(--duo-muted); font-size: 16px; padding: 14px; text-align: center; }

    .mu-center { flex: 0 0 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; position: relative; z-index: 3; }
    .mu-vs { width: 104px; height: 104px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Rajdhani','Inter',sans-serif; font-weight: 900; font-size: 44px; color: #fff;
      background: radial-gradient(circle at 50% 35%, var(--duo-surface2), #0b0d12); border: 2px solid var(--duo-accent); box-shadow: 0 0 0 6px rgba(8,10,14,.9), 0 12px 30px rgba(0,0,0,.6); }
    .mu-series { display: flex; align-items: center; gap: 10px; font-family: 'Rajdhani','Inter',sans-serif; font-weight: 900; font-size: 40px; }
    .mu-series .sa { color: var(--team-a); } .mu-series .sb { color: var(--team-b); } .mu-series .sep { color: var(--duo-muted); font-size: 28px; }
    .mu-bo { font-size: 12px; font-weight: 800; letter-spacing: .18em; text-transform: uppercase; color: var(--duo-muted); }

    /* Caster strip */
    .mu-casters { flex: 0 0 auto; display: flex; align-items: center; justify-content: center; gap: 14px; margin-top: 18px; min-height: 92px; }
    .mu-casters.is-empty { display: none; }
    .mu-cast { display: flex; align-items: center; gap: 12px; padding: 8px 16px 8px 8px; background: linear-gradient(180deg, rgba(32,36,46,.85), rgba(20,23,30,.85)); border: 1px solid var(--duo-border); border-radius: 12px; }
    .mu-cast-cam { position: relative; width: 132px; height: 74px; border-radius: 7px; overflow: hidden; background: #0d0f14; border: 1px solid var(--duo-border); flex: 0 0 auto; }
    /* ?cams=off framing: transparent cam so a per-caster OBS source shows through. */
    .mu-stage.frames-only .mu-cast-cam { background: transparent; }
    .mu-cast-cam::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; z-index: 2; background: linear-gradient(90deg, var(--duo-accent), var(--duo-accent2)); }
    .mu-cast-cam iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
    .mu-cast-text { display: flex; flex-direction: column; gap: 2px; }
    .mu-cast-name { font-size: 20px; font-weight: 800; text-transform: uppercase; color: #fff; white-space: nowrap; }
    .mu-cast-tag { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--duo-muted); }

    .preview .mu-cast-cam { background: repeating-linear-gradient(45deg, #181b22, #181b22 12px, #20242e 12px, #20242e 24px); }
  </style>
</head>
<body>
  <div id="stage" class="mu-stage">
    <div class="mu-header">
      <div class="mu-eyebrow">Matchup</div>
      <div class="mu-title is-empty" id="title"></div>
    </div>
    <div class="mu-body">
      <div class="mu-team mu-team--a">
        <img id="logo1" class="mu-logo" alt=""><div id="name1" class="mu-name">BLUE</div>
        <div id="roster1" class="mu-roster"></div>
      </div>
      <div class="mu-center">
        <div class="mu-vs">VS</div>
        <div class="mu-series"><span class="sa" id="sa">0</span><span class="sep">–</span><span class="sb" id="sb">0</span></div>
        <div class="mu-bo" id="bo">BEST OF 5</div>
      </div>
      <div class="mu-team mu-team--b">
        <img id="logo2" class="mu-logo" alt=""><div id="name2" class="mu-name">ORANGE</div>
        <div id="roster2" class="mu-roster"></div>
      </div>
    </div>
    <div class="mu-casters is-empty" id="casters"></div>
  </div>

  <script src="scene-base.js"></script>
  <script>
    function el(id) { return document.getElementById(id); }
    const QP = new URLSearchParams(location.search);
    const NO_CAMS = QP.get('cams') === 'off';
    const QTITLE = QP.get('title');   // ?title=Custom (overrides event name; ?title=off hides)
    function resolveTitle(data) {
      if (QTITLE != null) { const t = QTITLE.trim(); return /^(off|none|hide|0)$/i.test(t) ? '' : t; }
      return (data.eventName || '').toString().trim();
    }
    if (NO_CAMS) document.getElementById('stage')?.classList.add('frames-only');

    function applyBrandTheme(data) {
      const root = document.documentElement;
      const color = SceneBase.brandColor(data), accent2 = SceneBase.brandAccent(data);
      if (color) root.style.setProperty('--duo-accent', color);
      if (accent2) root.style.setProperty('--duo-accent2', accent2);
      if (data.fontFamily) root.style.fontFamily = `'${data.fontFamily}', 'Inter', system-ui, sans-serif`;
    }
    function renderTeam(idx, t, side) {
      SceneBase.applyTeamLogo(el('logo' + idx), t.customLogo, t.logo);
      el('name' + idx).textContent = (t.name || (side === 'b' ? 'ORANGE' : 'BLUE')).toUpperCase();
      document.documentElement.style.setProperty(side === 'b' ? '--team-b' : '--team-a', t.color || (side === 'b' ? '#e97139' : '#055fdb'));
      const wrap = el('roster' + idx); wrap.innerHTML = '';
      const players = (t.players || []).filter(p => p && (p.name || p.gamerTag)).slice(0, 6);
      if (!players.length) { wrap.innerHTML = '<div class="mu-empty">Roster TBD</div>'; return; }
      players.forEach(p => {
        const row = document.createElement('div'); row.className = 'mu-player';
        const role = (p.role || '').toString().trim();
        row.innerHTML = `<span class="dot"></span><span class="mu-pname">${(p.name || p.gamerTag || '').toString().replace(/</g, '&lt;')}</span>${role ? `<span class="mu-prole">${role.replace(/</g, '&lt;')}</span>` : ''}`;
        wrap.appendChild(row);
      });
    }
    function renderCasters(casters) {
      const list = (Array.isArray(casters.list) ? casters.list : []).filter(c => c && (c.name || c.camUrl)).sort((a, b) => (Number(a.slot) || 9) - (Number(b.slot) || 9)).slice(0, 3);
      const wrap = el('casters'); wrap.innerHTML = '';
      wrap.classList.toggle('is-empty', !list.length);
      list.forEach(c => {
        const handle = SceneBase.formatCasterHandle(c), social = (c.social || 'none').toString().toLowerCase();
        const tag = (handle && social !== 'none') ? handle : '';
        const item = document.createElement('div'); item.className = 'mu-cast';
        item.innerHTML = `<div class="mu-cast-cam"></div><div class="mu-cast-text"><span class="mu-cast-name">${(c.name || '—').toString().replace(/</g, '&lt;')}</span>${tag ? `<span class="mu-cast-tag">${tag.replace(/</g, '&lt;')}</span>` : ''}</div>`;
        const camUrl = (!NO_CAMS && (c.camUrl || '').trim()) || '';
        if (camUrl) { const f = document.createElement('iframe'); f.src = camUrl; f.setAttribute('allow', 'autoplay; encrypted-media; microphone; camera; fullscreen'); f.referrerPolicy = 'no-referrer'; item.querySelector('.mu-cast-cam').appendChild(f); }
        wrap.appendChild(item);
      });
    }
    function render(data) {
      data = data || {};
      applyBrandTheme(data);
      const casters = data.casters || {};
      el('stage').classList.toggle('show', SceneBase.casterStageVisible(casters));
      const blue = SceneBase.teamSide(data, 'blue'), orange = SceneBase.teamSide(data, 'orange');
      renderTeam(1, blue, 'a'); renderTeam(2, orange, 'b');
      el('sa').textContent = blue.series != null ? blue.series : 0;
      el('sb').textContent = orange.series != null ? orange.series : 0;
      el('bo').textContent = 'BEST OF ' + (data.bestOf || 5);
      const ttl = resolveTitle(data);
      el('title').textContent = ttl.toUpperCase(); el('title').classList.toggle('is-empty', !ttl);
      renderCasters(casters);
    }
    if (location.protocol === 'file:') {
      document.documentElement.classList.add('preview');
      render({
        teams: {
          blue: { name: 'Velocity Gaming', color: '#3b82f6', players: [{ name: 'Aqua' }, { name: 'Nova' }, { name: 'Rhythm' }] },
          orange: { name: 'Team Apex Esports', color: '#f97316', players: [{ name: 'Blaze' }, { name: 'Cinder' }, { name: 'Ash' }] }
        },
        series: { blue: 1, orange: 2 }, bestOf: 5, eventName: 'Summer Showdown — Grand Final',
        casters: { visible: true, list: [
          { id: 'c1', name: 'Jordan Reyes', handle: 'jreyescasts', slot: 1, social: 'x' },
          { id: 'c2', name: 'Mia Tanaka', handle: 'miaplays', slot: 2, social: 'twitch' } ] },
        brand: { color: '#7c3aed', accent: '#22d3ee' }
      });
      el('stage').classList.add('show');
    } else { SceneBase.connect(render); }
  </script>
</body>
</html>
