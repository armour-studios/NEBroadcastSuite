<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>NE Broadcast Suite â€” Valorant</title>
<link rel="stylesheet" href="/fonts.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --main-font:  'Rajdhani', 'Montserrat', sans-serif;
    --accent:     #ff4655;
    --accent-2:   #23c08a;
    --atk-color:  #71edc0;   /* driven by blue team colour */
    --def-color:  #eb535d;   /* driven by orange team colour */
    --dark:       #101824;
    --dark-trans: rgba(16, 24, 36, 0.58);
    --atk-trans:  rgba(57, 123, 99, 0.71);
    --def-trans:  rgba(145, 50, 56, 0.68);
  }
  [data-theme="midnight"] { --accent: #4aa3ff; --accent-2: #7c5cff; }
  [data-theme="neon"]     { --accent: #00e5a0; --accent-2: #ff2e88; }

  html, body {
    width: 1920px; height: 1080px; overflow: hidden;
    background: transparent;
    font-family: var(--main-font);
    -webkit-font-smoothing: antialiased;
    color: #fff;
  }
  .hidden { display: none !important; }

  /* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
     TOP SCOREHEAD â€” centered CS-style panel with spike mechanics
  â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
  .cs-head {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; z-index: 10;
    animation: headIn 0.5s cubic-bezier(.2,.7,.3,1) backwards;
  }
  @keyframes headIn { from { opacity: 0; transform: translateX(-50%) translateY(-18px); } }

  .scorebar {
    position: relative;
    background: linear-gradient(180deg, rgba(20,23,31,0.96), rgba(11,13,19,0.96));
    border: 1px solid rgba(255,255,255,0.12); border-top: none; border-radius: 0 0 14px 14px;
    overflow: hidden; box-shadow: 0 12px 34px rgba(0,0,0,0.55);
  }

  /* Animated light that travels around the border */
  .head-beam { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 40; pointer-events: none; overflow: visible; }
  .head-beam path { fill: none; vector-effect: non-scaling-stroke; }
  .head-beam .hb-base { stroke: rgba(255,255,255,0.10); stroke-width: 1.5; }
  .head-beam .hb-beam {
    stroke: #fff; stroke-width: 2; stroke-linecap: round;
    stroke-dasharray: 13 87; filter: drop-shadow(0 0 4px rgba(255,255,255,0.85));
    animation: headBeam 9s linear infinite;
  }
  @keyframes headBeam {
    0%   { stroke-dashoffset: 0;   opacity: 1; }
    58%  { stroke-dashoffset: -87; opacity: 1; }
    64%  { stroke-dashoffset: -87; opacity: 0; }
    100% { stroke-dashoffset: -87; opacity: 0; }
  }

  /* Event title bar */
  .event-title {
    position: relative; box-sizing: border-box; width: 960px;
    text-align: center; padding: 5px 48px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    background: rgba(0,0,0,0.5);
    font-size: 13px; font-weight: 700; letter-spacing: 3px; color: #d7dae0; text-transform: uppercase;
  }
  .event-title::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: 0; height: 1.5px;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.92) 50%, transparent 100%);
  }

  /* Topbar row */
  .topbar { display: flex; align-items: stretch; height: 76px; position: relative; }
  .team { display: flex; align-items: center; gap: 13px; padding: 0 20px; width: 360px; position: relative; overflow: hidden; }
  .team.t-def { justify-content: flex-end; }

  /* 4px team-colour accent on the bottom of each team panel */
  .team::after { content: ''; position: absolute; bottom: 4px; left: 0; right: 0; height: 4px; opacity: 1; transition: opacity 0.35s ease; }
  .team.t-atk::after { background: var(--atk-color,#71edc0); }
  .team.t-def::after { background: var(--def-color,#eb535d); }
  .team.fused::after { opacity: 0; }

  /* Spike countdown fuse: replaces team-colour accent while spike is live */
  .team .fuse { position: absolute; bottom: 4px; height: 4px; width: 0; display: none; z-index: 2;
    background: linear-gradient(90deg, #ff5a2c, #ff1414); box-shadow: 0 0 12px rgba(255,40,30,0.9); }
  .team.t-atk .fuse { right: 0; left: auto; }
  .team.t-def .fuse { left: 0; right: auto; }
  .team .fuse.danger { animation: barflash 0.4s steps(2) infinite; }
  .team .fuse.defuse { background: linear-gradient(90deg, #2cff8a, #14d96e); box-shadow: 0 0 12px rgba(40,230,120,0.9); animation: none; }
  .team.t-atk .fuse.defuse { left: 0; right: auto; }
  .team.t-def .fuse.defuse { right: 0; left: auto; }
  @keyframes barflash { 50% { opacity: 0.5; } }

  .tlogo { width: 46px; height: 46px; object-fit: contain; flex-shrink: 0; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5)); }
  .team-mid { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; gap: 4px; }
  .team.t-def .team-mid { align-items: flex-end; }
  .team .nm { display: block; font-weight: 700; font-size: 22px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .team.t-def .nm { text-align: right; }

  /* Series dots */
  .cs-series { display: flex; gap: 4px; }
  .team.t-def .cs-series { flex-direction: row-reverse; }
  .sb-dot { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,0.16); transition: background 0.2s; }
  .sb-dot.won-atk { background: var(--atk-color,#71edc0); box-shadow: 0 0 6px var(--atk-color,#71edc0); }
  .sb-dot.won-def { background: var(--def-color,#eb535d); box-shadow: 0 0 6px var(--def-color,#eb535d); }

  /* Score numbers */
  .team .sc { font-weight: 700; font-size: 40px; font-variant-numeric: tabular-nums; min-width: 46px; text-align: center; }
  .team.t-atk .sc { color: var(--atk-color,#71edc0); text-shadow: 0 0 20px rgba(113,237,192,0.45); }
  .team.t-def .sc { color: var(--def-color,#eb535d); text-shadow: 0 0 20px rgba(235,83,93,0.45); }
  .sc.bump { animation: numBump 0.5s ease-out; }
  @keyframes numBump { 0% { transform: scale(1); } 35% { transform: scale(1.12); } 100% { transform: scale(1); } }

  /* Center panel */
  .mid { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
    padding: 0 20px; background: rgba(0,0,0,0.3); width: 240px; flex: 0 0 240px; overflow: hidden; }
  .mid.planted-glow .cs-map, .mid.defusing-glow .cs-map { display: none; }
  /* Large countdown number during spike events */
  .timer { font-weight: 900; font-size: 34px; font-variant-numeric: tabular-nums; color: #e8ecf2; line-height: 1; letter-spacing: 1px; }
  .timer.bomb { font-size: 40px; color: #ff4133; text-shadow: 0 0 18px rgba(255,65,51,0.85); animation: pulse 0.8s ease-in-out infinite; letter-spacing: 0; }
  .timer.bomb.def { color: #4ad991; text-shadow: 0 0 16px rgba(74,217,145,0.8); animation: none; }
  @keyframes pulse { 50% { opacity: 0.55; } }
  /* center panel buy-phase state: swap timer for series label */
  .mid-series {
    font-size: 13px; font-weight: 700; letter-spacing: 2.5px; color: #e8ecf2;
    white-space: nowrap; text-align: center; line-height: 1;
    opacity: 0; max-height: 0; overflow: hidden;
    transition: opacity 0.35s ease, max-height 0.35s ease;
  }
  .mid.buying { background: transparent; }
  .mid .timer              { transition: opacity 0.35s ease, max-height 0.35s ease; }
  /* Buy-phase full-width centered overlay â€” sits inside .topbar (position:relative) */
  .buy-cover {
    position: absolute; inset: 0; z-index: 8; pointer-events: none;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.35s ease;
  }
  .buy-cover.active { opacity: 1; }
  .buy-cover-text { font-size: 18px; font-weight: 700; letter-spacing: 4px; color: #e8ecf2; white-space: nowrap; }

  /* Pulsing spike logo â€” replaces the timer text when spike is planted */
  .spike-planted-logo { width: 46px; height: 46px; object-fit: contain; }
  @keyframes spikePulse {
    0%, 100% { transform: scale(1);    filter: drop-shadow(0 0 6px rgba(255,65,51,0.55)); }
    50%       { transform: scale(1.18); filter: drop-shadow(0 0 22px rgba(255,65,51,1)) drop-shadow(0 0 44px rgba(255,80,40,0.5)); }
  }
  @keyframes spikeDefusePulse {
    0%, 100% { filter: drop-shadow(0 0 6px rgba(74,217,145,0.5)); }
    50%       { filter: drop-shadow(0 0 20px rgba(74,217,145,1)); }
  }
  .spike-planted-logo.planted  { animation: spikePulse 1.4s ease-in-out infinite; }
  .spike-planted-logo.defusing { animation: spikeDefusePulse 1.8s ease-in-out infinite; }
  .mid.planted-glow { background: rgba(120,16,12,0.55); box-shadow: inset 0 0 26px rgba(255,50,40,0.5); animation: midPulse 1s ease-in-out infinite; }
  .mid.defusing-glow { background: rgba(10,60,38,0.5); box-shadow: inset 0 0 24px rgba(60,220,130,0.4); animation: none; }
  @keyframes midPulse { 0%,100% { box-shadow: inset 0 0 22px rgba(255,50,40,0.4); } 50% { box-shadow: inset 0 0 34px rgba(255,60,50,0.75); } }
  .cs-map { font-size: 12px; font-weight: 700; letter-spacing: 2px; color: #cdd2da; text-transform: uppercase;
    white-space: nowrap; max-width: 100%; overflow: hidden; text-overflow: ellipsis; }
  .cs-map:empty { display: none; }
  .cs-map .bo { color: #8b909a; }
  .roundlbl { font-size: 10px; letter-spacing: 2.5px; color: #8b909a; white-space: nowrap; }
  .roundlbl.planted { font-size: 11px; font-weight: 800; letter-spacing: 2px; color: #ff4133;
    text-shadow: 0 0 10px rgba(255,65,51,0.8); animation: pulse 0.8s ease-in-out infinite; }
  .roundlbl.defusing { font-size: 11px; font-weight: 800; letter-spacing: 2px; color: #4ad991; }
  .roundlbl.ot { color: #ffd34d; font-weight: 800; letter-spacing: 2px; }

  /* Full-screen spike result flash (position:fixed so overflow:hidden can't clip it) */
  .bomb-flash { position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    pointer-events: none; z-index: 200; }
  .bomb-flash.show { display: flex; }
  .bomb-flash .bf-label { font-weight: 900; white-space: nowrap; position: relative; z-index: 2; letter-spacing: 5px; }
  /* Detonation: radial fireball + text pop */
  .bomb-flash.explode {
    background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(255,200,80,0.92) 0%, rgba(255,100,20,0.65) 35%, rgba(160,20,5,0.25) 65%, transparent 80%);
    animation: bfExplodeIn 1.9s ease-out forwards;
  }
  .bomb-flash.explode .bf-label { font-size: 44px; color: #fff;
    text-shadow: 0 0 32px rgba(255,160,40,1), 0 0 60px rgba(255,100,20,0.7), 0 3px 8px rgba(0,0,0,0.9);
    animation: bfPop 1.9s ease-out forwards; }
  /* Defused: green sweep */
  .bomb-flash.defused {
    background: linear-gradient(90deg, transparent 0%, rgba(13,74,46,0.75) 50%, transparent 100%);
    animation: bfFade 2.4s ease-out forwards;
  }
  .bomb-flash.defused .bf-label { font-size: 38px; color: #5af0a8;
    text-shadow: 0 0 22px rgba(74,217,145,0.95), 0 2px 6px rgba(0,0,0,0.8);
    animation: bfSlide 2.4s ease-out forwards; }
  /* Scorebar shake on detonation */
  .scorebar.shake { animation: bfShake 0.5s ease-in-out; }
  @keyframes bfExplodeIn { 0%{opacity:0;} 6%{opacity:1;} 70%{opacity:1;} 100%{opacity:0;} }
  @keyframes bfPop   { 0%{transform:scale(0.6);opacity:0;} 12%{transform:scale(1.06);opacity:1;} 75%{opacity:1;} 100%{transform:scale(1.02);opacity:0;} }
  @keyframes bfShake { 0%,100%{transform:translateX(0);} 18%{transform:translateX(-7px);} 38%{transform:translateX(7px);} 58%{transform:translateX(-4px);} 78%{transform:translateX(4px);} }
  @keyframes bfFade  { 0%,72%{opacity:1;} 100%{opacity:0;} }
  @keyframes bfSlide { 0%{transform:translateX(-28px);opacity:0;} 14%{transform:translateX(0);opacity:1;} 72%{opacity:1;} 100%{opacity:0;} }

  /* Corner red pulse on spike plant */
  #corner-pulse { position: fixed; inset: 0; pointer-events: none; opacity: 0; z-index: 50;
    background:
      radial-gradient(circle at 0% 0%,    rgba(255,28,28,0.55),rgba(255,28,28,0) 22%),
      radial-gradient(circle at 100% 0%,  rgba(255,28,28,0.55),rgba(255,28,28,0) 22%),
      radial-gradient(circle at 0% 100%,  rgba(255,28,28,0.55),rgba(255,28,28,0) 22%),
      radial-gradient(circle at 100% 100%,rgba(255,28,28,0.55),rgba(255,28,28,0) 22%); }
  #corner-pulse.show { animation: cornerPulse 1.05s ease-in-out 4; }
  @keyframes cornerPulse { 0%,100%{opacity:0;} 50%{opacity:1;} }

  /* Round history dots */
  .round-dots { position: absolute; top: 108px; left: 50%; display: flex; gap: 3px;
    padding: 7px 14px 6px; background: rgba(13,15,21,0.96); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px; box-shadow: 0 8px 22px rgba(0,0,0,0.5);
    transform: translateX(-50%) translateY(-14px); opacity: 0; pointer-events: none;
    transition: transform 0.3s cubic-bezier(.2,.7,.3,1), opacity 0.3s ease; }
  .round-dots.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .round-dots:empty { display: none; }
  .rg-round { display: flex; flex-direction: column; align-items: center; gap: 3px; width: 24px; }
  .rg-num { font-size: 9px; font-weight: 700; color: #767c87; line-height: 1; }
  .rg-icon { height: 15px; display: flex; align-items: center; justify-content: center; }
  .rg-icon img { width: 15px; height: 15px; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.6)); }
  .rg-bar { width: 20px; height: 4px; border-radius: 2px; }
  .rg-bar.ATK { background: var(--atk-color,#71edc0); }
  .rg-bar.DEF { background: var(--def-color,#eb535d); }

  /* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
     PLAYER COLUMNS â€” bottom-left (ATK) and bottom-right (DEF)
  â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
  .player-col {
    position: absolute;
    bottom: 50px;
    width: 305px;
    display: flex; flex-direction: column; gap: 8px;
    transition: opacity 0.35s ease;
  }
  .player-col.col-atk { left: 20px; }
  .player-col.col-def { right: 20px; }
  .player-col.buy-hidden { opacity: 0; pointer-events: none; }

  /* â”€â”€ Individual player card â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  .pcard {
    position: relative;
    display: flex; flex-direction: column;
    border-radius: 4px; overflow: visible;
    background: rgba(8,11,20,0.94);
    transition: opacity 0.4s ease;
  }
  .col-atk .pcard { background: linear-gradient(to right, rgba(8,11,20,0.92) 45%, rgba(8,11,20,0.43)); }
  .col-def .pcard { background: linear-gradient(to left,  rgba(8,11,20,0.92) 45%, rgba(8,11,20,0.43)); }
  .pcard.dead { filter: grayscale(0.85); opacity: 0.5; }
  .col-atk .pcard.dead { mask-image: linear-gradient(to right, black, transparent 85%); -webkit-mask-image: linear-gradient(to right, black, transparent 85%); }
  .col-def .pcard.dead { mask-image: linear-gradient(to left, black, transparent 85%);  -webkit-mask-image: linear-gradient(to left, black, transparent 85%);  }

  /* â”€â”€ Spectated player â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  @keyframes specScan {
    0%   { top: -3px; opacity: 0; }
    8%   { opacity: 0.85; }
    88%  { opacity: 0.55; }
    100% { top: calc(100% + 3px); opacity: 0; }
  }
  @keyframes specRecDot {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.12; }
  }
  .pcard.spectated { z-index: 2; }
  .col-atk .pcard.spectated {
    outline: 1.5px solid color-mix(in srgb, var(--atk-color) 65%, white);
    box-shadow: 0 0 18px color-mix(in srgb, var(--atk-color) 55%, transparent),
                0 0 38px color-mix(in srgb, var(--atk-color) 22%, transparent);
  }
  .col-def .pcard.spectated {
    outline: 1.5px solid color-mix(in srgb, var(--def-color) 65%, white);
    box-shadow: 0 0 18px color-mix(in srgb, var(--def-color) 55%, transparent),
                0 0 38px color-mix(in srgb, var(--def-color) 22%, transparent);
  }
  .pcard-spec {
    position: absolute; inset: 0; z-index: 9;
    pointer-events: none; overflow: hidden; border-radius: inherit;
    opacity: 0; transition: opacity 0.3s ease;
  }
  .pcard.spectated > .pcard-spec { opacity: 1; }
  /* Sweeping scan line */
  .pcard-spec::before {
    content: ''; position: absolute; left: 0; right: 0; top: -3px; height: 2px;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.8) 30%, rgba(255,255,255,0.8) 70%, transparent 100%);
    animation: specScan 2.2s linear infinite;
  }
  /* REC badge */
  .pcard-spec::after {
    content: 'â— REC';
    position: absolute; top: 4px; right: 7px;
    font-size: 7.5px; font-weight: 800; letter-spacing: 1.5px; color: #ff4040;
    animation: specRecDot 1s ease-in-out infinite;
  }

  /* Spike carrier badge */
  .spike-carrier {
    position: absolute;
    width: 22px; height: 22px; border-radius: 50%;
    background: #fff; display: none;
    align-items: center; justify-content: center;
    top: 12px; z-index: 5;
  }
  .spike-carrier.show { display: flex; }
  .col-atk .spike-carrier { left: -11px; }
  .col-def .spike-carrier { right: -11px; }
  .spike-carrier img { height: 55%; filter: invert(); }

  /* â”€â”€ BAR 1: Agent portrait | Name + HP bar | Shield badge + HP number â”€â”€ */
  .pbar1 {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 10px;
    background: rgba(10,14,24,0.95);
    flex-shrink: 0; min-height: 62px; border-radius: 4px 4px 0 0; overflow: hidden;
    position: relative;
  }
  .col-atk .pbar1 { border-left: 3px solid var(--atk-color); }
  .col-def .pbar1 { flex-direction: row-reverse; border-right: 3px solid var(--def-color); }

  /* Team logo ghost + gradient wash â€” from center toward agent */
  .pbar1-team-bg {
    position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background-size: auto 300%; background-repeat: no-repeat;
    opacity: 0.07; transition: opacity 0.4s ease;
  }
  .col-atk .pbar1-team-bg { background-position: right -4px center; }
  .col-def .pbar1-team-bg { background-position: left -4px center; }
  .phase-buying .pbar1-team-bg { opacity: 0.03; transition: opacity 0.4s ease; }
  .pbar1::before {
    content: ''; position: absolute; inset: 0; z-index: 0; pointer-events: none;
  }
  .col-atk .pbar1::before {
    background: linear-gradient(to left, transparent 35%, color-mix(in srgb, var(--atk-color) 55%, transparent) 100%);
  }
  .col-def .pbar1::before {
    background: linear-gradient(to right, transparent 35%, color-mix(in srgb, var(--def-color) 55%, transparent) 100%);
  }
  /* Flex content must sit above the bg layers */
  .pbar1-agent, .pbar1-mid, .pbar1-right { position: relative; z-index: 1; }

  .pbar1-agent {
    width: 50px; height: 50px; border-radius: 4px;
    object-fit: cover; flex-shrink: 0;
  }
  .col-def .pbar1-agent { transform: scaleX(-1); }

  .pbar1-mid { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .pbar1-name {
    font-size: 15px; font-weight: 800; color: #fff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    line-height: 1; letter-spacing: 0.3px; text-align: left;
  }
  .col-def .pbar1-name { text-align: right; }
  .pcard-hpbar { height: 6px; overflow: visible; flex-shrink: 0; position: relative; }
  .col-atk .pcard-hpbar { padding-left: 63px; padding-right: 94px; }
  .col-def .pcard-hpbar { padding-right: 63px; padding-left: 94px; }
  .pcard-hpbar-fill { height: 100%; transition: width 0.35s ease; overflow: hidden; }
  .col-atk .pcard-hpbar-fill { background: var(--atk-color); }
  .col-def .pcard-hpbar-fill { background: var(--def-color); margin-left: auto; }

  .pbar1-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .col-def .pbar1-right { flex-direction: row-reverse; }

  .pbar1-shield { position: relative; display: flex; align-items: center; justify-content: center; flex-shrink: 0; width: 28px; height: 34px; }
  .pbar1-sh-img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .pbar1-sh-img.none  { visibility: hidden; }
  .pbar1-sh-img.heavy { filter: brightness(0) invert(1); }
  .pbar1-sh-val {
    position: absolute; font-size: 14px; font-weight: 400; line-height: 1;
    font-family: 'Rajdhani', sans-serif; color: #fff;
    text-shadow: -1px -1px 0 rgba(0,0,0,0.85), 1px -1px 0 rgba(0,0,0,0.85),
                 -1px  1px 0 rgba(0,0,0,0.85),  1px  1px 0 rgba(0,0,0,0.85);
    text-align: center; top: 47%; left: 50%; transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .pbar1-sh-val.no-sh { display: none; }

  .pbar1-hp {
    font-size: 24px; font-weight: 900; color: #fff; line-height: 1;
    font-variant-numeric: tabular-nums; width: 52px; flex: 0 0 52px;
    text-align: right; transition: color 0.3s ease;
  }
  .col-def .pbar1-hp { text-align: left; }

  /* â”€â”€ BAR 2: Ult | C/Q/E abilities | Weapon | Credits â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  .pbar2 {
    display: flex; align-items: center; gap: 6px;
    padding: 0 10px; height: 38px;
    background: rgba(6,9,15,0.92); flex-shrink: 0; border-radius: 0 0 4px 4px; overflow: hidden;
  }

  .pbar2-abilities { display: flex; gap: 3px; align-items: center; flex-shrink: 0; }
  .pbar2-abi { width: 20px; height: 20px; object-fit: contain; opacity: 0.28; transition: opacity 0.2s; }
  .pbar2-abi.ready { opacity: 1; }

  .pbar2-weap-wrap { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; overflow: hidden; }
  .pbar2-weap { max-height: 18px; max-width: 108px; object-fit: contain; flex-shrink: 0; opacity: 0.85; transform: scaleX(-1); }
  .col-atk .pbar2 { padding-left: 58px; }
  .col-def .pbar2 { flex-direction: row-reverse; padding-right: 58px; }
  .col-def .pbar2-weap { transform: none; }

  .pbar2-cred { display: flex; align-items: center; gap: 2px; font-size: 13px; font-weight: 700; color: #ffffff; white-space: nowrap; flex-shrink: 0; }
  .pbar2-cred img { height: 9px; }

  /* Ult circle â€” sidebar: absolute on hp-bar divider; buy phase: relative in-flow */
  .col-atk .ult-display { --uc: var(--atk-color); left: 8px; }
  .col-def .ult-display { --uc: var(--def-color); right: 8px; }
  .ult-display {
    position: absolute; top: 50%; transform: translateY(-25%);
    width: 42px; height: 42px; border-radius: 50%; z-index: 4;
    display: flex; align-items: center; justify-content: center;
    background: rgba(8,12,22,0.97);
    box-shadow: 0 0 0 3px rgba(10,14,24,1), 0 0 0 5px rgba(255,255,255,0.07);
    transition: background 0.3s;
  }
  .ult-display::after {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    background: conic-gradient(rgba(255,255,255,0.38) var(--ult-pct,0%), rgba(255,255,255,0.08) var(--ult-pct,0%));
    -webkit-mask: radial-gradient(farthest-side, transparent 72%, black 73%);
    mask: radial-gradient(farthest-side, transparent 72%, black 73%);
    transition: background 0.4s ease;
  }
  .ult-display.ult-ready { animation: ultTeamPulse 1.5s ease-in-out infinite; }
  .ult-display.ult-ready::after { background: conic-gradient(var(--uc, rgba(255,255,255,0.6)) 100%, transparent 0); }
  .ult-icon-sm { width: 22px; height: 22px; object-fit: contain; opacity: 0.25; position: relative; z-index: 1; transition: opacity 0.3s ease; flex-shrink: 0; }
  .ult-display.ult-ready .ult-icon-sm { opacity: 0.92; filter: drop-shadow(0 0 4px var(--uc, rgba(255,255,255,0.6))); }
  .ult-pips { display: none; }
  .ult-pip  { display: none; }

  /* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
     ROUND WIN PANEL â€” centred, animated in then slides down
  â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
  /* Round win panel â€” expands from center, collapses back to center */
  .rwp-wrapper {
    position: fixed;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 960px; height: 180px;
    pointer-events: none; z-index: 100;
    clip-path: inset(0 50%);
    animation: rwpExpand 5.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  @keyframes rwpExpand {
    0%   { clip-path: inset(0 50%); }
    10%  { clip-path: inset(0 0%); }
    80%  { clip-path: inset(0 0%); }
    94%  { clip-path: inset(0 50%); }
    100% { clip-path: inset(0 50%); }
  }
  .rwp-bar {
    position: absolute; inset: 0;
    background: rgba(12,15,22,0.97);
    border-top: 3px solid transparent;
    border-bottom: 3px solid transparent;
    display: flex; align-items: center; justify-content: center;
  }
  .rwp-bar.atk { border-color: var(--atk-color); box-shadow: 0 0 50px rgba(0,0,0,0.85), inset 0 0 80px rgba(57,123,99,0.12); }
  .rwp-bar.def { border-color: var(--def-color); box-shadow: 0 0 50px rgba(0,0,0,0.85), inset 0 0 80px rgba(145,50,56,0.12); }
  .rwp-edge {
    position: absolute; top: 0; bottom: 0; width: 8px;
  }
  .rwp-edge.left  { left: 0; }
  .rwp-edge.right { right: 0; }
  .rwp-bar.atk .rwp-edge { background: var(--atk-color); }
  .rwp-bar.def .rwp-edge { background: var(--def-color); }
  .rwp-inner {
    display: flex; align-items: center; justify-content: center; gap: 28px;
    opacity: 0; animation: rwpShowContent 5.5s forwards;
  }
  @keyframes rwpShowContent {
    0%   { opacity: 0; }
    13%  { opacity: 1; }
    76%  { opacity: 1; }
    88%  { opacity: 0; }
    100% { opacity: 0; }
  }
  .rwp-logo { height: 86px; object-fit: contain; }
  .rwp-text { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .rwp-label { font-size: 52px; font-weight: 900; letter-spacing: 6px; line-height: 1; }
  .rwp-bar.atk .rwp-label { color: var(--atk-color); }
  .rwp-bar.def .rwp-label { color: var(--def-color); }
  .rwp-roundnum { font-size: 12px; font-weight: 700; letter-spacing: 4px; color: #8b909a; }

  /* â”€â”€ Alive count popup â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  .val-alive {
    position: absolute; top: 120px; left: 50%;
    transform: translateX(-50%) translateY(-8px);
    display: flex; align-items: center; gap: 16px;
    padding: 8px 26px;
    background: linear-gradient(180deg, rgba(10,13,22,0.96), rgba(5,7,14,0.96));
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.65), 0 1px 0 rgba(255,255,255,0.06) inset;
    z-index: 10; pointer-events: none;
    opacity: 0;
    transition: opacity 0.22s ease, transform 0.22s ease;
  }
  .val-alive.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .val-alive-num {
    font-size: 38px; font-weight: 900; line-height: 1;
    font-variant-numeric: tabular-nums; min-width: 28px; text-align: center;
  }
  .val-alive-atk {
    color: var(--atk-color);
    text-shadow: 0 0 18px color-mix(in srgb, var(--atk-color) 55%, transparent);
  }
  .val-alive-def {
    color: var(--def-color);
    text-shadow: 0 0 18px color-mix(in srgb, var(--def-color) 55%, transparent);
  }
  .val-alive-vs { font-size: 11px; font-weight: 700; letter-spacing: 4px; color: #40495c; }
  @keyframes aliveBump {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.22); }
    100% { transform: scale(1); }
  }
  .val-alive-num.bump { animation: aliveBump 0.4s cubic-bezier(0.22,1,0.36,1); }

  /* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
     BUY PHASE LOWER THIRD â€” full-width 1920px slide-up panel
  â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
  .buy-lt {
    position: absolute; bottom: 0; left: 50%;
    width: 1920px; z-index: 25; pointer-events: none;
    transform: translateX(-50%) translateY(100%);
    transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .buy-lt.show { transform: translateX(-50%) translateY(0); }


  /* â”€â”€ Buy phase header: two team panels flanking round number â”€â”€ */
  .blt-header {
    display: flex; align-items: stretch;
    max-width: 1560px; margin: 0 auto;
    height: 80px;
    background: rgba(5,7,14,0.99);
    border-top: 1px solid rgba(255,255,255,0.12);
  }
  .blt-th-team {
    flex: 1; display: flex; align-items: center; gap: 18px;
    padding: 0 28px; overflow: hidden; position: relative;
  }
  .blt-th-team.blt-atk-side {
    background: linear-gradient(to right, color-mix(in srgb, var(--atk-color) 12%, rgba(5,7,14,0.95)) 0%, transparent 55%);
    border-right: 1px solid rgba(255,255,255,0.07);
  }
  .blt-th-team.blt-def-side {
    background: linear-gradient(to left, color-mix(in srgb, var(--def-color) 12%, rgba(5,7,14,0.95)) 0%, transparent 55%);
    border-left: 1px solid rgba(255,255,255,0.07);
  }
  /* Large ghost label â€” pushed to outer edge, clipped by overflow:hidden on the panel */
  .blt-th-team::before {
    position: absolute; top: 50%; transform: translateY(-50%);
    font-size: 100px; font-weight: 900; letter-spacing: 10px; text-transform: uppercase;
    opacity: 0.035; color: #fff; pointer-events: none; white-space: nowrap; user-select: none;
  }
  .blt-th-team.blt-atk-side::before { content: 'ATTACK';  left: 16px; }
  .blt-th-team.blt-def-side::before { content: 'DEFENSE'; right: 16px; }

  .blt-th-logo { width: 54px; height: 54px; object-fit: contain; flex-shrink: 0; }
  .blt-th-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 0; }
  .blt-th-info-r { text-align: right; }
  .blt-th-tname {
    font-size: 26px; font-weight: 900; color: #ffffff; letter-spacing: 0.3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .blt-th-score {
    font-size: 54px; font-weight: 900; line-height: 1; flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }
  .blt-atk-side .blt-th-score { color: var(--atk-color); }
  .blt-def-side .blt-th-score { color: var(--def-color); }
  .blt-th-center {
    flex: 0 0 130px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 2px;
    background: rgba(0,0,0,0.45);
    border-left: 1px solid rgba(255,255,255,0.08);
    border-right: 1px solid rgba(255,255,255,0.08);
  }
  .blt-th-rlabel { font-size: 9px; font-weight: 700; letter-spacing: 3.5px; color: #4a5268; text-transform: uppercase; }
  .blt-th-rnum   { font-size: 36px; font-weight: 900; color: #c8ccd8; font-variant-numeric: tabular-nums; line-height: 1; }

  /* â”€â”€ Round history strip â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  .blt-rounds-bar {
    display: flex; align-items: center; justify-content: center; padding: 0 24px; gap: 4px;
    height: 46px;
    max-width: 1560px; margin: 0 auto;
    background: rgba(4,5,11,0.99);
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .blt-rslot { flex: 0 0 42px; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .blt-rnum  { font-size: 7px; font-weight: 700; letter-spacing: 0.3px; color: #3a4560; }
  .blt-rind  {
    width: 36px; height: 28px; border-radius: 4px;
    background: rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .blt-rind img { width: 20px; height: 20px; object-fit: contain; }
  .blt-rslot.won-atk .blt-rnum { color: var(--atk-color); }
  .blt-rslot.won-def .blt-rnum { color: var(--def-color); }
  .blt-rslot.won-atk .blt-rind { background: color-mix(in srgb, var(--atk-color) 20%, rgba(4,5,11,0.9)); }
  .blt-rslot.won-def .blt-rind { background: color-mix(in srgb, var(--def-color) 20%, rgba(4,5,11,0.9)); }
  .blt-rslot.ot      .blt-rind { background: rgba(255,211,77,0.12); border: 1px solid rgba(255,211,77,0.35); }
  .blt-rslot.cur     .blt-rind { outline: 1.5px solid rgba(255,255,255,0.5); }

  /* â”€â”€ Buy phase board â€” full-width paired rows â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  @keyframes ultTeamPulse {
    0%, 100% { background: rgba(8,12,22,0.92); box-shadow: 0 0 0 0 var(--uc, rgba(255,255,255,0.2)); }
    50%       { background: color-mix(in srgb, var(--uc, #fff) 22%, rgba(8,12,22,0.92)); box-shadow: 0 0 9px 2px color-mix(in srgb, var(--uc, #fff) 45%, transparent); }
  }

  .blt-board {
    display: flex; flex-direction: column;
    max-width: 1560px; margin: 0 auto;
    position: relative;
    background: rgba(7,9,15,0.98);
    border-top: 1px solid rgba(255,255,255,0.06);
    border-radius: 0 0 4px 4px;
  }

  /* One row = ATK player (left half) + DEF player (right half) */
  .blt-pair-row { display: flex; height: 46px; }
  .blt-pair-row:nth-child(odd)  { background: rgba(255,255,255,0.0); }
  .blt-pair-row:nth-child(even) { background: rgba(255,255,255,0.025); }
  .blt-pair-row + .blt-pair-row { border-top: 1px solid rgba(255,255,255,0.05); }

  /* Each cell = 50% width */
  .blt-cell { flex: 1; display: flex; align-items: stretch; overflow: hidden; min-width: 0; }
  .blt-cell.blt-atk { --uc: var(--atk-color); flex-direction: row;         border-right: 1px solid rgba(255,255,255,0.08); }
  .blt-cell.blt-def { --uc: var(--def-color); flex-direction: row-reverse; }

  /* â”€â”€ MONEY (outermost) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  /* Money: spent | [icon] credits  â€” horizontal, side by side */
  .bc-money {
    display: flex; flex-direction: row; align-items: center; justify-content: flex-end; gap: 6px;
    flex: 0 0 118px; padding: 0 10px;
    background: rgba(4,6,12,0.55);
    border-left: 3px solid color-mix(in srgb, var(--uc) 55%, transparent);
  }
  .blt-cell.blt-def .bc-money { flex-direction: row-reverse; border-left: none; border-right: 3px solid color-mix(in srgb, var(--uc) 55%, transparent); }
  .bc-spent { font-size: 11px; font-weight: 700; color: #f5efc0; font-variant-numeric: tabular-nums; white-space: nowrap; opacity: 0.75; }
  .bc-cred  { font-size: 12px; font-weight: 800; color: #ffffff; font-variant-numeric: tabular-nums; display: flex; align-items: center; gap: 3px; white-space: nowrap; }
  .bc-cred img { height: 10px; opacity: 0.7; flex-shrink: 0; }

  /* â”€â”€ ABILITIES (C / Q / E) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  .bc-abi { display: flex; align-items: center; gap: 3px; flex: 0 0 75px; padding: 0 8px; border-left: 1px solid rgba(255,255,255,0.07); }
  .blt-cell.blt-def .bc-abi { border-left: none; border-right: 1px solid rgba(255,255,255,0.07); }
  .bc-abi-ic { width: 17px; height: 17px; object-fit: contain; opacity: 0.25; transition: opacity 0.2s; }
  .bc-abi-ic.ready { opacity: 1; }

  /* â”€â”€ GEAR: Shield Â· Weapon Â· Ult â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  /* Fixed width so agent portrait stays in the same column regardless of weapon length */
  .bc-gear {
    display: flex; align-items: center; gap: 8px; flex: 0 0 168px;
    padding: 0 12px;
    border-left: 1px solid rgba(255,255,255,0.07);
    background: rgba(4,6,12,0.35);
  }
  .blt-cell.blt-def .bc-gear { flex-direction: row-reverse; border-left: none; border-right: 1px solid rgba(255,255,255,0.07); }

  .bc-sh { width: 14px; height: 17px; flex-shrink: 0; object-fit: contain; display: block; }
  .bc-sh.none  { visibility: hidden; }
  .bc-sh.light { }
  .bc-sh.heavy { filter: brightness(0) invert(1); }

  /* Fixed weapon container â€” always 96px wide so rows stay aligned across all gun sizes */
  .bc-weap-img { flex: 0 0 96px; width: 96px; height: 20px; object-fit: contain; opacity: 0.92; transform: scaleX(-1); }
  .blt-cell.blt-def .bc-weap-img { transform: none; }

<script>
'use strict';

// â”€â”€ CDN base for GitHub repo assets â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
const CDN = 'https://cdn.jsdelivr.net/gh/Ailyrr/hel-valorant-overlay-server@master/overlays/visual_assets';
const VAL_LOGO_FALLBACK = 'data:image/svg+xml,' + encodeURIComponent(
  '<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path fill="white" d="M28.8002 15.4128V5.75643C28.8002 5.60749 28.6082 5.54543 28.5058 5.65714L17.6313 18.8384C17.5418 18.9377 17.6186 19.0991 17.7593 19.0991H25.6146C25.832 19.0991 26.024 18.9998 26.1519 18.8384L28.6337 15.8348C28.7361 15.7231 28.8002 15.5741 28.8002 15.4128ZM3.36651 15.8472L11.5288 25.7517C11.6567 25.913 11.8614 26 12.0789 26H19.9342C20.0749 26 20.1517 25.8511 20.0621 25.7517L3.49445 5.66955C3.3921 5.55784 3.2002 5.6199 3.2002 5.76884V15.4252C3.21299 15.5741 3.26416 15.7231 3.36651 15.8472Z"/></svg>'
);

function agentIconUrl(agent)    { return `/assets/valorant/agents/${agent}/${agent}_icon.webp`; }
function abilityIconUrl(agent, slot) { return `/assets/valorant/agents/${agent}/ability_${slot}.webp`; }
function weaponIconUrl(weapon)  { return `/assets/valorant/game_icons/${weapon}.webp`; }
function spikeCdnUrl(red)       { return `${CDN}/${red ? 'spike_red' : 'spike_white'}.png`; }
function spikeCarrierIconUrl()  { return `${CDN}/game_icons/spike.webp`; }
function creditsIconUrl()       { return `${CDN}/game_icons/credits.webp`; }
function diamondIconUrl()       { return `${CDN}/diamond-solid.svg`; }
function ultBorderUrl()         { return `${CDN}/ultimage-charged-border.svg`; }

// Fallback: try CDN after local miss
function withCdnFallback(img, localSrc, cdnPath, svgFallback) {
  if (img._cdnSrc === localSrc) return; // already attempted this key â€” don't retry
  img._cdnSrc = localSrc; // NOT cleared on error â€” prevents retry loop when local asset is missing
  img.src = localSrc;
  img.onerror = () => {
    img.onerror = null;
    if (img.src.includes('cdn.jsdelivr.net')) {
      if (svgFallback) img.src = svgFallback;
      return;
    }
    img.src = `${CDN}/${cdnPath}`;
    img.onerror = () => { if (svgFallback) img.src = svgFallback; img.onerror = null; };
  };
}

function svgLetter(letter, color) {
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(
    `<svg xmlns="http://www.w3.org/2000/svg" width="54" height="54"><rect width="54" height="54" rx="4" fill="${color}"/><text x="27" y="36" font-size="22" fill="#fff" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold">${String(letter).toUpperCase().slice(0,2)}</text></svg>`
  );
}

const AGENT_COLORS = {
  brimstone:'#d45c2a',viper:'#3d9e4a',omen:'#5a4a8c',killjoy:'#e6c225',
  cypher:'#7c8c9a',sova:'#2a5fa0',sage:'#3aafbb',phoenix:'#e07030',
  jett:'#7eaccc',reyna:'#8040b0',raze:'#d04a20',breach:'#b05a1a',
  skye:'#4a8a45',yoru:'#2a3acc',astra:'#6040b0',kayo:'#5070a0',
  chamber:'#c09050',neon:'#3060e0',fade:'#4a3060',harbor:'#2060a0',
  gekko:'#50901a',deadlock:'#5a7080',iso:'#405870',clove:'#805060',
  vyse:'#4a6088',tejo:'#a06028',waylay:'#3080a0',
};

function el(id) { return document.getElementById(id); }
function setText(id, v) { const e = el(id); if (e) e.textContent = v ?? ''; }
function setNum(id, v) {
  const e = el(id); if (!e) return;
  if (e.textContent !== String(v ?? 0)) {
    e.textContent = v ?? 0;
    e.classList.remove('bump'); void e.offsetWidth; e.classList.add('bump');
  }
}

// â”€â”€ Side logic â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// ORDER = attackers first half (rounds 1-12)
function atkSideForRound(round) {
  if (round <= 12) return 'order';
  if (round <= 24) return 'chaos';
  return Math.floor((round - 25) / 2) % 2 === 0 ? 'order' : 'chaos';
}
function roundLabel(round, phase) {
  if (!round || phase === 'warmup') return 'WARMUP';
  if (round > 24) return `OT Â· R${round}`;
  return `ROUND ${round}`;
}

// â”€â”€ State â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
let appTeams     = { blue: {}, orange: {} };
let appSeries    = { blue: 0, orange: 0 };
let bestOf       = 1;
let brand        = null;
let appEventName = '';
let valState  = null;
let spTimer   = null;
// Dev simulation
let devState  = null;

// â”€â”€ Spike countdown state â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
let prevSpikeState = '';
let spikeInterval  = null;
let spikePlantedAt = null;
let spikeSecsLeft  = null;
let defuseInterval = null;
let defuseStartedAt = null;
const SPIKE_DURATION  = 45;
const DEFUSE_DURATION = 7;

function startSpikeCountdown() {
  if (spikeInterval) return;
  spikePlantedAt = Date.now();
  spikeSecsLeft  = SPIKE_DURATION;
  // Set fuse bars to full immediately (before first interval tick)
  const fuseA0 = el('fuse-atk'), fuseD0 = el('fuse-def');
  if (fuseA0) { fuseA0.style.display = 'block'; fuseA0.style.width = '100%'; }
  if (fuseD0) { fuseD0.style.display = 'block'; fuseD0.style.width = '100%'; }
  const tim0 = el('val-timer'); if (tim0) tim0.textContent = SPIKE_DURATION + 's';
  spikeInterval = setInterval(() => {
    const elapsed = (Date.now() - spikePlantedAt) / 1000;
    spikeSecsLeft  = Math.max(0, SPIKE_DURATION - elapsed);
    const pct    = (spikeSecsLeft / SPIKE_DURATION) * 100;
    const danger = spikeSecsLeft < 5;
    const fuseA  = el('fuse-atk'), fuseD = el('fuse-def');
    if (fuseA) { fuseA.style.width = pct + '%'; fuseA.classList.toggle('danger', danger); }
    if (fuseD) { fuseD.style.width = pct + '%'; fuseD.classList.toggle('danger', danger); }
    const tim = el('val-timer');
    if (tim)  tim.textContent = Math.ceil(spikeSecsLeft) + 's';
    if (spikeSecsLeft <= 0) { clearInterval(spikeInterval); spikeInterval = null; }
  }, 100);
}

function startDefuseProgress() {
  if (defuseInterval) return;
  defuseStartedAt = Date.now();
  defuseInterval = setInterval(() => {
    const elapsed = (Date.now() - defuseStartedAt) / 1000;
    const pct = Math.min(100, (elapsed / DEFUSE_DURATION) * 100);
    const rem = Math.max(0, DEFUSE_DURATION - elapsed);
    const fuseA = el('fuse-atk'), fuseD = el('fuse-def');
    if (fuseA) { fuseA.className = 'fuse defuse'; fuseA.style.display = 'block'; fuseA.style.width = pct + '%'; }
    if (fuseD) { fuseD.className = 'fuse defuse'; fuseD.style.display = 'block'; fuseD.style.width = pct + '%'; }
    const tim = el('val-timer');
    if (tim) tim.textContent = Math.ceil(rem) + 's';
    if (rem <= 0) { clearInterval(defuseInterval); defuseInterval = null; }
  }, 100);
}

function clearSpikeCountdown() {
  if (spikeInterval) { clearInterval(spikeInterval); spikeInterval = null; }
  spikePlantedAt = null; spikeSecsLeft = null;
  const fuseA = el('fuse-atk'), fuseD = el('fuse-def');
  if (fuseA) { fuseA.style.width = '0'; fuseA.className = 'fuse'; }
  if (fuseD) { fuseD.style.width = '0'; fuseD.className = 'fuse'; }
  const tim = el('val-timer'); if (tim) tim.textContent = '--';
}

function clearDefuseProgress() {
  if (defuseInterval) { clearInterval(defuseInterval); defuseInterval = null; }
  defuseStartedAt = null;
}

function showBombFlash(type, label) {
  const flash = el('bomb-flash');
  if (!flash) return;
  flash.className = 'bomb-flash show ' + type;
  flash.innerHTML = `<span class="bf-label">${label}</span>`;
  if (type === 'explode') {
    const bar = document.querySelector('.scorebar');
    if (bar) { bar.classList.add('shake'); setTimeout(() => bar.classList.remove('shake'), 500); }
  }
  const dur = type === 'explode' ? 2000 : 2600;
  setTimeout(() => { flash.className = 'bomb-flash'; flash.innerHTML = ''; }, dur);
}

// â”€â”€ Series win dots (circular in CS-style panel) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function renderSeriesDots(containerId, total, won, wonCls) {
  const c = el(containerId); if (!c) return;
  const key = `${total}:${won}:${wonCls}`;
  if (c._dotsKey === key) return;
  c._dotsKey = key;
  c.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'sb-dot' + (i < won ? ` ${wonCls}` : '');
    c.appendChild(d);
  }
}

// â”€â”€ Team blocks (scorebar) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function renderTeamBlocks(v) {
  const round = (v && v.round && v.round.number) || 1;
  const atkSide = atkSideForRound(round);

  const atkTeam = atkSide === 'order' ? appTeams.blue   : appTeams.orange;
  const defTeam = atkSide === 'order' ? appTeams.orange : appTeams.blue;
  const atkSer  = atkSide === 'order' ? appSeries.blue  : appSeries.orange;
  const defSer  = atkSide === 'order' ? appSeries.orange: appSeries.blue;

  // Logos
  const atkLogo = el('atk-logo'), defLogo = el('def-logo');
  const atkFb = VAL_LOGO_FALLBACK;
  const defFb = VAL_LOGO_FALLBACK;
  const atkLogoSrc = atkTeam.logo || atkFb;
  const defLogoSrc = defTeam.logo || defFb;
  if (atkLogo && atkLogo._cdnSrc !== atkLogoSrc) { atkLogo._cdnSrc = atkLogoSrc; atkLogo.src = atkLogoSrc; atkLogo.onerror = () => { atkLogo.src = atkFb; atkLogo.onerror = null; }; }
  if (defLogo && defLogo._cdnSrc !== defLogoSrc) { defLogo._cdnSrc = defLogoSrc; defLogo.src = defLogoSrc; defLogo.onerror = () => { defLogo.src = defFb; defLogo.onerror = null; }; }

  const atkName = (atkTeam.name || 'ATK').toUpperCase();
  const defName = (defTeam.name || 'DEF').toUpperCase();
  setText('atk-name', atkName);
  setText('def-name', defName);
  // Scale both names to the same size based on whichever is longer
  const maxLen = Math.max(atkName.length, defName.length);
  const nmPx = maxLen <= 10 ? 22 : maxLen <= 13 ? 19 : maxLen <= 17 ? 16 : 14;
  document.querySelectorAll('.team .nm').forEach(n => n.style.fontSize = nmPx + 'px');

  // Scores from valorant state
  const atkScore = v ? (atkSide === 'order' ? (v.order && v.order.score) || 0 : (v.chaos && v.chaos.score) || 0) : 0;
  const defScore = v ? (atkSide === 'order' ? (v.chaos && v.chaos.score) || 0 : (v.order && v.order.score) || 0) : 0;
  setNum('atk-score', atkScore);
  setNum('def-score', defScore);

  // Team colours â†’ CSS vars (guard: setProperty triggers full style recalc, only write on change)
  const atkC = atkTeam.color || '#71edc0';
  const defC = defTeam.color || '#eb535d';
  const root = document.documentElement;
  if (root.style.getPropertyValue('--atk-color') !== atkC) { root.style.setProperty('--atk-color', atkC); root.style.setProperty('--atk-trans', hexAlpha(atkC, 0.45)); }
  if (root.style.getPropertyValue('--def-color') !== defC) { root.style.setProperty('--def-color', defC); root.style.setProperty('--def-trans', hexAlpha(defC, 0.45)); }

  // Series dots (Game X of Y) inside panel below each team name
  const winsNeeded = Math.ceil(bestOf / 2);
  renderSeriesDots('maps-atk', winsNeeded, atkSer, 'won-atk');
  renderSeriesDots('maps-def', winsNeeded, defSer, 'won-def');

  const phase = (v && v.round && v.round.phase) || 'warmup';
  const roundNum = (v && v.round && v.round.number) || 0;
  const isPlanted  = !!(v && v.spikeState === 'planted');
  const isDefusing = !!(v && v.spikeState === 'defusing');
  const spikeActive = isPlanted || isDefusing;

  // Mid panel glow state
  const midEl = el('cs-mid');
  if (midEl) {
    midEl.classList.toggle('planted-glow',  isPlanted && !isDefusing);
    midEl.classList.toggle('defusing-glow', isDefusing);
  }

  // Round timer â€” compute elapsed seconds since round start
  const _gameTime  = (v && v.round && v.round.gameTime)  || 0;
  const _startTime = (v && v.round && v.round.startTime) || 0;
  const _elapsed   = (_startTime > 0 && _gameTime > _startTime) ? (_gameTime - _startTime) : -1;
  const _phase     = (v && v.round && v.round.phase) || '';
  // Valorant: ~30 s buy phase then 100 s play (130 s total per round)
  // Also accept round.phase='shopping' as explicit buy-phase signal (dev mode / server fallback)
  const isBuying   = !spikeActive && (_phase === 'shopping' || (_elapsed >= 0 && _elapsed < 30));
  const isPlaying  = !spikeActive && !isBuying && _elapsed >= 30;

  const timerEl    = el('val-timer');
  const buyCover   = el('buy-cover');
  const buyCoverTx = el('buy-cover-text');

  document.body.classList.toggle('phase-buying', isBuying);

  if (spikeActive) {
    if (timerEl) { timerEl.style.display = 'none'; }
    if (midEl) midEl.classList.remove('buying');
  } else if (isBuying) {
    const buyLeft = Math.max(0, 30 - Math.floor(_elapsed >= 0 ? _elapsed : 0));
    const bss = buyLeft.toString().padStart(2, '0');
    if (timerEl) { timerEl.style.display = ''; timerEl.className = 'timer'; timerEl.textContent = `0:${bss}`; }
    if (midEl) midEl.classList.add('buying');
  } else if (isPlaying) {
    const remaining = Math.max(0, 130 - _elapsed);
    const mm = Math.floor(remaining / 60);
    const ss = Math.floor(remaining % 60).toString().padStart(2, '0');
    if (timerEl) { timerEl.style.display = ''; timerEl.className = 'timer'; timerEl.textContent = `${mm}:${ss}`; }
    if (midEl) midEl.classList.remove('buying');
  } else {
    // warmup / no data
    if (timerEl) { timerEl.style.display = 'none'; }
    if (midEl) midEl.classList.remove('buying');
  }

  // Top scorebar buy-cover: not used for series text (lives at bottom now)
  if (buyCover) buyCover.classList.remove('active');

  const spikeLogo = el('spike-planted-logo');
  if (spikeLogo) {
    if (spikeActive) {
      spikeLogo.style.display = '';
      if (!spikeLogo.getAttribute('src')) {
        spikeLogo.src = spikeCdnUrl(true);
        spikeLogo.onerror = () => { spikeLogo.onerror = null; spikeLogo.src = '../assets/valorant/spike_red.png'; };
      }
      spikeLogo.className = 'spike-planted-logo ' + (isDefusing ? 'defusing' : 'planted');
    } else {
      spikeLogo.style.display = 'none';
      spikeLogo.className = 'spike-planted-logo';
    }
  }

  // Fuse bars on each team panel
  const fuseA = el('fuse-atk'), fuseD = el('fuse-def');
  if (fuseA) fuseA.style.display = spikeActive ? 'block' : 'none';
  if (fuseD) fuseD.style.display = spikeActive ? 'block' : 'none';

  // Team accent â€” hide colour line, show fuse instead
  const atkPanel = document.querySelector('.team.t-atk');
  const defPanel = document.querySelector('.team.t-def');
  if (atkPanel) atkPanel.classList.toggle('fused', spikeActive);
  if (defPanel) defPanel.classList.toggle('fused', spikeActive);

  // Round label / phase text
  const phaseEl = el('sb-phase');
  if (phaseEl) {
    if (!roundNum || _startTime === 0) {
      phaseEl.textContent = 'WARMUP';
      phaseEl.className = 'roundlbl';
    } else if (roundNum > 24) {
      phaseEl.textContent = `OT Â· ROUND ${roundNum}`;
      phaseEl.className = 'roundlbl ot';
    } else {
      phaseEl.textContent = `ROUND ${roundNum}`;
      phaseEl.className = 'roundlbl' + (isDefusing ? ' defusing' : isPlanted ? ' planted' : '');
    }
  }

  // Spike countdown state machine
  const curSpikeState = v ? (v.spikeState || '') : '';
  const wasActive = prevSpikeState === 'planted' || prevSpikeState === 'defusing';

  if (prevSpikeState !== 'planted' && isPlanted) {
    // Spike just planted
    startSpikeCountdown();
    const cp = el('corner-pulse');
    if (cp) { cp.classList.remove('show'); void cp.offsetWidth; cp.classList.add('show'); }
  } else if (prevSpikeState === 'planted' && isDefusing) {
    // Defuse started â€” stop spike drain, start defuse grow
    clearSpikeCountdown();
    startDefuseProgress();
  } else if (wasActive && !spikeActive) {
    // Spike resolved (detonated or defused)
    clearSpikeCountdown();
    clearDefuseProgress();
  }

  // Flash banners â€” trigger on any transition INTO these final states
  if (curSpikeState === 'detonated' && prevSpikeState !== 'detonated') {
    showBombFlash('explode', 'DETONATED');
  } else if (curSpikeState === 'defused' && prevSpikeState !== 'defused') {
    showBombFlash('defused', 'SPIKE DEFUSED');
  }

  prevSpikeState = curSpikeState;
}

function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return isNaN(r) ? `rgba(100,100,100,${a})` : `rgba(${r},${g},${b},${a})`;
}

// â”€â”€ Player card builder â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
const rowReg = new Map(); // player name â†’ card element

function buildCard(p, side, teamLogo) {
  const wrap = document.createElement('div');
  wrap.className = 'pcard' + (p.alive ? '' : ' dead');
  wrap.dataset.pname = p.name;

  // Spike carrier badge
  const spBadge = document.createElement('div');
  spBadge.className = 'spike-carrier' + (p.hasSpike ? ' show' : '');
  const spImg = document.createElement('img'); spImg.alt = 'spike';
  spImg.src = spikeCarrierIconUrl();
  spBadge.appendChild(spImg);
  wrap.appendChild(spBadge);

  // â”€â”€ BAR 1: Agent portrait | Name + HP subbar | Shield badge + HP number â”€â”€
  const bar1 = document.createElement('div'); bar1.className = 'pbar1';
  if (teamLogo) {
    const bgDiv = document.createElement('div'); bgDiv.className = 'pbar1-team-bg';
    bgDiv.style.backgroundImage = `url('${teamLogo}')`;
    bar1.appendChild(bgDiv);
  }

  const agImg = document.createElement('img'); agImg.className = 'pbar1-agent';
  agImg.alt = p.agentName || p.agent || '';
  withCdnFallback(agImg, agentIconUrl(p.agent), `agent_icons/${p.agent}/${p.agent}_icon.webp`,
    svgLetter((p.agentName || p.agent || '?').slice(0,2), AGENT_COLORS[p.agent] || '#3a4050'));
  bar1.appendChild(agImg);

  const mid = document.createElement('div'); mid.className = 'pbar1-mid';
  const nameEl = document.createElement('div'); nameEl.className = 'pbar1-name'; nameEl.textContent = p.name;
  const hp = p.alive ? Math.max(0, p.health || 0) : 0;
  const hpTint = hp > 60 ? '' : hp > 30 ? '#f5a623' : '#e74c3c';
  mid.append(nameEl);
  bar1.appendChild(mid);

  const right = document.createElement('div'); right.className = 'pbar1-right';
  const shWrap = document.createElement('div'); shWrap.className = 'pbar1-shield';
  const shIco = document.createElement('img'); shIco.className = 'pbar1-sh-img'; shIco.src = '../assets/weapons/shield.png'; shIco.alt = '';
  const armor = p.armor || 0;
  shIco.classList.add(armor === 2 ? 'heavy' : armor === 1 ? 'light' : 'none');
  const shVal = document.createElement('span');
  shVal.className = 'pbar1-sh-val ' + (armor === 2 ? 'heavy' : armor === 1 ? 'light' : 'no-sh');
  shVal.textContent = armor === 2 ? '50' : armor === 1 ? '25' : '';
  shWrap.append(shIco, shVal);
  const hpNum = document.createElement('div'); hpNum.className = 'pbar1-hp';
  hpNum.textContent = hp;
  right.append(shWrap, hpNum);
  bar1.appendChild(right);
  wrap.appendChild(bar1);

  // Ult circle anchored to the hp-bar divider, straddling bar1 and bar2
  const ultGained = p.ultPointsGained || 0;
  const ultNeeded = p.ultPointsNeeded || 0;
  const ultReady  = ultNeeded > 0 && ultGained >= ultNeeded;
  const ultPct    = ultNeeded > 0 ? Math.round((ultGained / ultNeeded) * 100) : 0;
  const ultDisp = document.createElement('div');
  ultDisp.className = 'ult-display' + (ultReady ? ' ult-ready' : '');
  ultDisp.style.setProperty('--ult-pct', ultPct + '%');
  const ultIc = document.createElement('img'); ultIc.className = 'ult-icon-sm';
  withCdnFallback(ultIc, abilityIconUrl(p.agent, 'x'), `agent_icons/${p.agent}/ability_x.webp`, null);
  ultDisp.appendChild(ultIc);

  const hpSep = document.createElement('div'); hpSep.className = 'pcard-hpbar';
  const hpFill = document.createElement('div'); hpFill.className = 'pcard-hpbar-fill';
  hpFill.style.width = hp + '%';
  hpSep.append(hpFill, ultDisp);
  wrap.appendChild(hpSep);

  // â”€â”€ BAR 2: C/Q/E abilities | Weapon | Credits â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  const bar2 = document.createElement('div'); bar2.className = 'pbar2';

  if (p.alive) {
    const aRow = document.createElement('div'); aRow.className = 'pbar2-abilities';
    ['c','q','e'].forEach(slot => {
      const aImg = document.createElement('img'); aImg.className = 'pbar2-abi';
      withCdnFallback(aImg, abilityIconUrl(p.agent, slot), `agent_icons/${p.agent}/ability_${slot}.webp`, null);
      if (!!p[`${slot}_util`]) aImg.classList.add('ready');
      aRow.appendChild(aImg);
    });
    bar2.appendChild(aRow);
  }

  const wWrap = document.createElement('div'); wWrap.className = 'pbar2-weap-wrap';
  const wImg = document.createElement('img'); wImg.className = 'pbar2-weap'; wImg.alt = p.weapon || '';
  wImg.style.display = p.weapon ? '' : 'none';
  if (p.weapon) withCdnFallback(wImg, `/assets/valorant/game_icons/${p.weapon}.webp`, `game_icons/${p.weapon}.webp`, null);
  wWrap.appendChild(wImg);
  bar2.appendChild(wWrap);

  if (p.credits != null) {
    const credDiv = document.createElement('div'); credDiv.className = 'pbar2-cred';
    const cIcon = document.createElement('img'); cIcon.alt = 'Â¢'; cIcon.src = creditsIconUrl();
    const cVal  = document.createElement('span'); cVal.className = 'pbar2-cred-val';
    cVal.textContent = (p.credits || 0).toLocaleString();
    credDiv.append(cIcon, cVal);
    bar2.appendChild(credDiv);
  }

  wrap.appendChild(bar2);

  const specOverlay = document.createElement('div');
  specOverlay.className = 'pcard-spec';
  wrap.appendChild(specOverlay);

  return wrap;
}

// Update an existing card in-place (fast path)
function updateCard(card, p) {
  card.classList.toggle('dead', !p.alive);
  card.classList.toggle('spectated', !!p.observed);
  card.querySelector('.spike-carrier')?.classList.toggle('show', !!p.hasSpike);

  const hp = p.alive ? Math.max(0, p.health || 0) : 0;
  const hpTint = hp > 60 ? '' : hp > 30 ? '#f5a623' : '#e74c3c';

  const hpFill = card.querySelector('.pcard-hpbar-fill');
  if (hpFill) { hpFill.style.width = hp + '%'; hpFill.style.background = ''; }

  const hpNum = card.querySelector('.pbar1-hp');
  if (hpNum) { hpNum.textContent = hp; hpNum.style.color = ''; }

  const shIco = card.querySelector('.pbar1-sh-img');
  const shVal = card.querySelector('.pbar1-sh-val');
  const shArmor = p.armor || 0;
  if (shIco) { shIco.classList.remove('none','light','heavy'); shIco.classList.add(shArmor === 2 ? 'heavy' : shArmor === 1 ? 'light' : 'none'); }
  if (shVal) {
    shVal.classList.remove('no-sh','light','heavy');
    shVal.classList.add(shArmor === 2 ? 'heavy' : shArmor === 1 ? 'light' : 'no-sh');
    shVal.textContent = shArmor === 2 ? '50' : shArmor === 1 ? '25' : '';
  }

  card.querySelectorAll('.pbar2-abi').forEach((img, i) => {
    const slot = ['c','q','e'][i];
    if (slot) img.classList.toggle('ready', !!p[`${slot}_util`]);
  });

  const wImg = card.querySelector('.pbar2-weap');
  if (wImg) {
    const wDisp = p.weapon ? '' : 'none';
    if (wImg.style.display !== wDisp) wImg.style.display = wDisp;
    if (p.weapon) withCdnFallback(wImg, `/assets/valorant/game_icons/${p.weapon}.webp`, `game_icons/${p.weapon}.webp`, null);
  }
  const wWrap = card.querySelector('.pbar2-weap-wrap');
  if (wWrap) { const d = p.weapon ? '' : 'none'; if (wWrap.style.display !== d) wWrap.style.display = d; }

  const credVal = card.querySelector('.pbar2-cred-val');
  if (credVal) credVal.textContent = (p.credits || 0).toLocaleString();

  const ultDisp = card.querySelector('.ult-display');
  if (ultDisp) {
    const gained = p.ultPointsGained || 0;
    const needed = p.ultPointsNeeded || 0;
    const ready  = needed > 0 && gained >= needed;
    const pct = needed > 0 ? Math.round((gained / needed) * 100) : 0;
    ultDisp.classList.toggle('ult-ready', ready);
    ultDisp.style.setProperty('--ult-pct', pct + '%');
  }
}

function syncColumn(containerId, players, side, teamLogo) {
  const container = el(containerId); if (!container) return;
  const byKills = (a,b) => (b.kills||0)-(a.kills||0)||(a.deaths||0)-(b.deaths||0);
  const sorted = [...players].sort(byKills);

  sorted.forEach((p, i) => {
    let card = rowReg.get(p.name);
    if (!card) {
      card = buildCard(p, side, teamLogo);
      container.appendChild(card);
      rowReg.set(p.name, card);
    } else {
      updateCard(card, p);
    }
    if (container.children[i] !== card) container.insertBefore(card, container.children[i] || null);
  });
}

// â”€â”€ Alive count popup â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
let _prevTotalAlive = null;
let _aliveHideTimer = null;

function bumpEl(id) {
  const e = el(id); if (!e) return;
  e.classList.remove('bump'); void e.offsetWidth; e.classList.add('bump');
}

function renderAlivePopup(atkPlayers, defPlayers, isBuy) {
  const box = el('val-alive'); if (!box) return;
  if (isBuy) {
    box.classList.remove('show');
    clearTimeout(_aliveHideTimer); _aliveHideTimer = null;
    _prevTotalAlive = null; return;
  }
  const atkAlive = atkPlayers.filter(p => p.alive).length;
  const defAlive = defPlayers.filter(p => p.alive).length;
  const total = atkAlive + defAlive;
  const atkEl = el('val-alive-atk'), defEl = el('val-alive-def');
  if (atkEl) atkEl.textContent = atkAlive;
  if (defEl) defEl.textContent = defAlive;
  const hasPlayers = atkPlayers.length + defPlayers.length > 0;
  if (hasPlayers && _prevTotalAlive !== null && total < _prevTotalAlive) {
    box.classList.add('show');
    bumpEl('val-alive-atk'); bumpEl('val-alive-def');
    clearTimeout(_aliveHideTimer);
    _aliveHideTimer = setTimeout(() => box.classList.remove('show'), 2500);
  }
  _prevTotalAlive = hasPlayers ? total : null;
}

// â”€â”€ Round win panel â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
let rwpActive = null;
function showRoundWin(winSide, teamLogo, roundNum) {
  if (rwpActive) { rwpActive.remove(); rwpActive = null; }
  const wrapper = document.createElement('div');
  wrapper.className = 'rwp-wrapper';
  wrapper.innerHTML = `
    <div class="rwp-bar ${winSide}">
      <div class="rwp-edge left"></div>
      <div class="rwp-inner">
        ${teamLogo ? `<img class="rwp-logo" src="${teamLogo}" alt="">` : ''}
        <div class="rwp-text">
          <span class="rwp-label">ROUND WIN</span>
          <span class="rwp-roundnum">ROUND ${roundNum - 1}</span>
        </div>
      </div>
      <div class="rwp-edge right"></div>
    </div>`;
  document.body.appendChild(wrapper);
  rwpActive = wrapper;
  setTimeout(() => { if (rwpActive === wrapper) { wrapper.remove(); rwpActive = null; } }, 5700);
}

// â”€â”€ Buy phase lower third â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function renderBuyLt(v, atkPlayers, defPlayers, atkTeam, defTeam) {
  const lt = el('buy-lt');
  if (!lt) return;

  const hist     = v.roundHistory || [];
  const round    = (v.round && v.round.number) || 1;
  const atkSide  = atkSideForRound(round);
  const atkScore = atkSide === 'order' ? (v.order && v.order.score || 0) : (v.chaos && v.chaos.score || 0);
  const defScore = atkSide === 'order' ? (v.chaos && v.chaos.score || 0) : (v.order && v.order.score || 0);

  // CDN-fallback helper for inline img tags
  function cdnImg(cls, localSrc, cdnPath, extra) {
    return `<img class="${cls}" src="${localSrc}" onerror="this.onerror=null;this.src='${CDN}/${cdnPath}'" ${extra||''}>`;
  }

  // Logos needed in slot rendering â€” compute before slots
  const atkLogo = (atkTeam && atkTeam.logo) || VAL_LOGO_FALLBACK;
  const defLogo = (defTeam && defTeam.logo) || VAL_LOGO_FALLBACK;

  // Round history â€” starts at 12 slots, grows one-by-one after round 12,
  // then slides as a fixed-size window once it exceeds MAX_VISIBLE.
  const MAX_VISIBLE = 14;
  const displayCount = round <= MAX_VISIBLE ? Math.max(12, round) : MAX_VISIBLE;
  const startRound  = Math.max(1, round - displayCount + 1);
  const slots = Array.from({length: displayCount}, (_, i) => {
    const r = startRound + i;
    const h = hist.find(hr => hr.round === r);
    const atkWon = h && ((h.winner === 'ORDER' && atkSide === 'order') || (h.winner === 'CHAOS' && atkSide === 'chaos'));
    const defWon = h && !atkWon;
    const cls = !h ? '' : (r > 24 ? 'ot' : (atkWon ? 'won-atk' : 'won-def'));
    const winLogo = atkWon ? atkLogo : defWon ? defLogo : '';
    const logoHtml = winLogo ? `<img src="${winLogo}" onerror="this.onerror=null;this.src='${VAL_LOGO_FALLBACK}'" alt="">` : '';
    return `<div class="blt-rslot ${cls}${r === round ? ' cur' : ''}">
      <div class="blt-rind">${logoHtml}</div>
      <span class="blt-rnum">${r}</span>
    </div>`;
  }).join('');

  // Player cell â€” used for both ATK (row) and DEF (row-reverse) sides
  function prowCell(p, side, team) {
    const ultG   = p.ultPointsGained || 0;
    const ultN   = p.ultPointsNeeded || 0;
    const ultRdy = ultN > 0 && ultG >= ultN;
    const ultPct = ultN > 0 ? Math.round((ultG / ultN) * 100) : 0;
    const shCls  = p.armor === 2 ? 'heavy' : p.armor === 1 ? 'light' : 'none';
    const agent  = p.agent || 'sova';
    const spent  = p.spentCredits ? `-${p.spentCredits.toLocaleString()}` : '';
    return `<div class="blt-cell blt-${side}">
      <div class="bc-money">
        ${spent ? `<span class="bc-spent">${spent}</span>` : ''}
        <span class="bc-cred"><img src="${creditsIconUrl()}" alt=""> ${(p.credits||0).toLocaleString()}</span>
      </div>
      <div class="bc-abi">
        ${['c','q','e'].map(slot => cdnImg(
          `bc-abi-ic${p[slot+'_util'] ? ' ready' : ''}`,
          abilityIconUrl(agent, slot),
          `agent_icons/${agent}/ability_${slot}.webp`
        )).join('')}
      </div>
      <div class="bc-gear">
        <img class="bc-sh ${shCls}" src="../assets/weapons/shield.png" alt="">
        ${p.weapon ? cdnImg('bc-weap-img', weaponIconUrl(p.weapon), `game_icons/${p.weapon}.webp`, `alt="${p.weapon}"`) : ''}
        <div class="bc-ult-circle${ultRdy ? ' rdy' : ''}" style="--ult-pct:${ultPct}%">
          ${cdnImg('bc-ult-ic', abilityIconUrl(agent,'x'), `agent_icons/${agent}/ability_x.webp`)}
        </div>
      </div>
      <div class="bc-player">
        ${side === 'atk' ? `
          ${cdnImg('bc-agent', agentIconUrl(agent), `agent_icons/${agent}/${agent}_icon.webp`)}
          <span class="bc-pname">${p.name}</span>
          <span class="bc-kda"><span class="k">${p.kills||0}</span>/<span class="d">${p.deaths||0}</span>/${p.assists||0}</span>
        ` : `
          <span class="bc-kda"><span class="k">${p.kills||0}</span>/<span class="d">${p.deaths||0}</span>/${p.assists||0}</span>
          <span class="bc-pname">${p.name}</span>
          ${cdnImg('bc-agent', agentIconUrl(agent), `agent_icons/${agent}/${agent}_icon.webp`)}
        `}
      </div>
    </div>`;
  }

  const atkSorted = atkPlayers.slice().sort((a,b) => (b.kills||0)-(a.kills||0));
  const defSorted = defPlayers.slice().sort((a,b) => (b.kills||0)-(a.kills||0));
  const maxRows = Math.max(atkSorted.length, defSorted.length, 1);
  const rows = Array.from({length: maxRows}, (_, i) => {
    const a = atkSorted[i];
    const d = defSorted[i];
    return `<div class="blt-pair-row">
      ${a ? prowCell(a, 'atk', atkTeam) : '<div class="blt-cell blt-atk"></div>'}
      ${d ? prowCell(d, 'def', defTeam) : '<div class="blt-cell blt-def"></div>'}
    </div>`;
  }).join('');

  lt.innerHTML = `
    <div class="blt-header">
      <div class="blt-th-team blt-atk-side">
        <img class="blt-th-logo" src="${atkLogo}" onerror="this.onerror=null;this.src='${VAL_LOGO_FALLBACK}'" alt="">
        <div class="blt-th-info">
          <span class="blt-th-tname">${(atkTeam && atkTeam.name) || 'ATTACK'}</span>
        </div>
        <span class="blt-th-score">${atkScore}</span>
      </div>
      <div class="blt-th-center">
        <span class="blt-th-rlabel">ROUND</span>
        <span class="blt-th-rnum">${String(round).padStart(2,'0')}</span>
      </div>
      <div class="blt-th-team blt-def-side">
        <span class="blt-th-score">${defScore}</span>
        <div class="blt-th-info blt-th-info-r">
          <span class="blt-th-tname">${(defTeam && defTeam.name) || 'DEFENSE'}</span>
        </div>
        <img class="blt-th-logo" src="${defLogo}" onerror="this.onerror=null;this.src='${VAL_LOGO_FALLBACK}'" alt="">
      </div>
    </div>
    <div class="blt-rounds-bar">${slots}</div>
    <div class="blt-board">
      <div class="blt-logo-atk" style="background-image:url('${atkLogo}')"></div>
      <div class="blt-logo-def" style="background-image:url('${defLogo}')"></div>
      ${rows}
    </div>`;
}

// â”€â”€ Sponsor rail â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function renderSponsors(b) {
  const rail = el('val-sponsors');
  if (!b || !b.sponsors || !b.sponsors.length) { if (rail) rail.classList.add('hidden'); return; }
  if (rail) rail.classList.remove('hidden');
  setText('sp-label', (b.sponsorLabel || 'PARTNERS').toUpperCase());
  if (spTimer) clearInterval(spTimer);
  let i = 0;
  const show = () => {
    const sp = b.sponsors[i % b.sponsors.length];
    const slot = el('sp-slot'); if (!slot) return;
    slot.innerHTML = '';
    if (sp && sp.logo) { const img = document.createElement('img'); img.className = 'sp-logo'; img.src = sp.logo; slot.appendChild(img); }
    else if (sp && sp.name) { const span = document.createElement('span'); span.className = 'sp-name'; span.textContent = sp.name; slot.appendChild(span); }
    i++;
  };
  show();
  if (b.sponsors.length > 1) spTimer = setInterval(show, Math.max(3, b.sponsorInterval || 6) * 1000);
}

// â”€â”€ Main render â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
let prevRoundTotal = 0;
function render(v) {
  const offline = el('val-offline');
  if (!v || !v.connected) { if (offline) offline.classList.remove('hidden'); renderTeamBlocks(null); return; }
  if (offline) offline.classList.add('hidden');

  // Event title (show/hide based on content)
  const evEl = el('val-event-name');
  if (evEl) { evEl.textContent = appEventName; evEl.classList.toggle('hidden', !appEventName); }

  // Bottom bar: round label + series
  const totalMaps  = (appSeries.blue || 0) + (appSeries.orange || 0) + 1;
  const metaSeries = bestOf > 1 ? `GAME ${totalMaps} OF ${bestOf}` : '';
  const roundNum   = (v.round && v.round.number) || 0;
  const roundPhase = (v.round && v.round.phase) || 'warmup';
  const vbbRoundEl = el('vbb-round');
  const vbbSerEl   = el('vbb-series');
  const vbbSepEl   = el('vbb-sep');
  if (vbbRoundEl) {
    vbbRoundEl.textContent = roundLabel(roundNum, roundPhase);
    vbbRoundEl.className = 'vbb-round' + (roundNum > 24 ? ' ot' : '');
  }
  if (vbbSerEl)   vbbSerEl.textContent    = metaSeries;
  if (vbbSepEl)   vbbSepEl.style.display  = metaSeries ? '' : 'none';

  renderTeamBlocks(v);

  const round = (v.round && v.round.number) || 1;
  const atkSide = atkSideForRound(round);

  // Annotate each player with observed flag (server stores v.observed as the player object)
  const _observedName = v.observed && v.observed.name;
  const allPlayers = (v.players || []).map(p =>
    _observedName && p.name === _observedName ? { ...p, observed: true } : p
  );
  const orderPlayers = allPlayers.filter(p => p.team === 'ORDER');
  const chaosPlayers = allPlayers.filter(p => p.team === 'CHAOS');
  const atkPlayers = atkSide === 'order' ? orderPlayers : chaosPlayers;
  const defPlayers = atkSide === 'order' ? chaosPlayers : orderPlayers;

  const _atkTeam = atkSide === 'order' ? appTeams.blue : appTeams.orange;
  const _defTeam = atkSide === 'order' ? appTeams.orange : appTeams.blue;
  syncColumn('players-atk', atkPlayers, 'atk', _atkTeam.logo || null);
  syncColumn('players-def', defPlayers, 'def', _defTeam.logo || null);

  // Cleanup stale rows
  const names = new Set(allPlayers.map(p => p.name));
  for (const [n, rowEl] of rowReg) {
    if (!names.has(n)) { rowEl.remove(); rowReg.delete(n); }
  }

  // Buy phase lower third
  const isBuy = roundPhase === 'shopping';
  renderAlivePopup(atkPlayers, defPlayers, isBuy);
  const atkCol = el('players-atk');
  const defCol = el('players-def');
  const buyLt  = el('buy-lt');
  if (atkCol) atkCol.classList.toggle('buy-hidden', isBuy);
  if (defCol) defCol.classList.toggle('buy-hidden', isBuy);
  if (buyLt) {
    if (isBuy) {
      // Only rebuild innerHTML when buy phase first opens â€” not on every timer tick
      if (!buyLt.classList.contains('show')) {
        const atkTeam = atkSide === 'order' ? appTeams.blue : appTeams.orange;
        const defTeam = atkSide === 'order' ? appTeams.orange : appTeams.blue;
        renderBuyLt(v, atkPlayers, defPlayers, atkTeam, defTeam);
      }
      buyLt.classList.add('show');
    } else {
      buyLt.classList.remove('show');
    }
  }

  // Round win panel trigger
  const newTotal = (v.order && v.order.score || 0) + (v.chaos && v.chaos.score || 0);
  if (newTotal > prevRoundTotal && prevRoundTotal > 0) {
    const prevO = v.order && v.order.score || 0;
    const prevC = v.chaos && v.chaos.score || 0;
    // Infer who just won (the total went up)
    const hist = v.roundHistory || [];
    const lastWin = hist.length > 0 ? hist[hist.length - 1].winner : '';
    if (lastWin) {
      const winnerIsAtk = (lastWin === 'ORDER' && atkSide === 'order') || (lastWin === 'CHAOS' && atkSide === 'chaos');
      const winTeam = winnerIsAtk ? (atkSide === 'order' ? appTeams.blue : appTeams.orange)
                                  : (atkSide === 'order' ? appTeams.orange : appTeams.blue);
      showRoundWin(winnerIsAtk ? 'atk' : 'def', winTeam && winTeam.logo, round);
    }
  }
  prevRoundTotal = newTotal;
}

function applyBrand(data) {
  const root = document.documentElement;
  root.dataset.theme = data.theme || 'default';
  if (data.fontFamily) root.style.setProperty('--main-font', `'${data.fontFamily}', sans-serif`);
  const b = data.brand;
  if (b) {
    if (b.color)  root.style.setProperty('--accent', b.color);
    if (b.accent) root.style.setProperty('--accent-2', b.accent);
    if (b.font)   root.style.setProperty('--main-font', `'${b.font}', sans-serif`);
  }
}

// â”€â”€ WebSocket â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function connect() {
  const sock = new WebSocket('ws://localhost:3001');
  sock.onopen  = () => sock.send(JSON.stringify({ type: 'request_state' }));
  sock.onmessage = ({ data }) => {
    let msg; try { msg = JSON.parse(data); } catch { return; }
    if (msg.type === 'full_state') {
      const d = msg.data;
      applyBrand(d);
      appTeams     = { blue: (d.teams && d.teams.blue) || {}, orange: (d.teams && d.teams.orange) || {} };
      appSeries    = d.series || { blue: 0, orange: 0 };
      bestOf       = d.bestOf || 1;
      brand        = d.brand || null;
      appEventName = d.eventName || appEventName;
      valState  = d.valorant || null;
      if (!devState) render(valState);
      renderSponsors(brand);
    } else if (msg.type === 'valorant_update') {
      valState = msg.data;
      if (!devState) render(valState);
    }
  };
  sock.onclose = () => setTimeout(connect, 800);
  sock.onerror = () => { try { sock.close(); } catch {} };
}
