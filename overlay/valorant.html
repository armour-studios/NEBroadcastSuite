// â”€â”€ Developer toolbar â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
let lastRealValState = null;
let _devTimerInterval = null;

function _devStartTimer() {
  clearInterval(_devTimerInterval);
  _devTimerInterval = setInterval(() => {
    if (!devState) { clearInterval(_devTimerInterval); return; }
    devState.round.gameTime = (devState.round.gameTime || 0) + 1;
    render(devState);
  }, 1000);
}
function _devStopTimer() { clearInterval(_devTimerInterval); _devTimerInterval = null; }

function _devSetPlaying(roundGameTime) {
  devState.round.phase = 'live';
  devState.round.startTime = roundGameTime || 1000;
  devState.round.gameTime  = (roundGameTime || 1000) + 45;
  _devStartTimer();
}
function _devSetBuying(roundGameTime) {
  devState.round.phase = 'shopping';
  devState.round.startTime = roundGameTime || 2000;
  devState.round.gameTime  = (roundGameTime || 2000) + 5;
  _devStartTimer(); // keep ticking so buy-phase countdown updates
}

function devAction(action) {
  if (action === 'live') {
    _devStopTimer();
    devState = null; prevRoundTotal = 0;
    render(lastRealValState || valState);
    return;
  }
  if (action === 'reset' || action === 'load-demo') {
    _devStopTimer();
    devState = makeDemoState();
    _devSetPlaying(1000);
    render(devState);
    return;
  }
  if (!devState) { devState = JSON.parse(JSON.stringify(makeDemoState())); _devSetPlaying(1000); }

  const _curGameTime = devState.round.gameTime || 1000;
  if (action === 'plant') {
    _devStopTimer();
    devState.spikeState = 'planted';
    devState.round.phase = 'bomb';
  } else if (action === 'defusing') {
    devState.spikeState = 'defusing';
    devState.round.phase = 'bomb';
  } else if (action === 'defuse') {
    devState.spikeState = 'defused';
    devState.round.phase = 'live';
    setTimeout(() => { if (devState) { devState.spikeState = ''; _devSetBuying(_curGameTime + 20); render(devState); } }, 2500);
  } else if (action === 'detonate') {
    devState.spikeState = 'detonated';
    devState.round.phase = 'live';
    setTimeout(() => { if (devState) { devState.spikeState = ''; _devSetBuying(_curGameTime + 20); render(devState); } }, 1500);
  } else if (action === 'win-atk') {
    const atkSide = atkSideForRound(devState.round.number || 1);
    if (atkSide === 'order') devState.order.score++;
    else devState.chaos.score++;
    devState.roundHistory.push({ round: devState.round.number, winner: atkSide === 'order' ? 'ORDER' : 'CHAOS' });
    devState.round.number = (devState.round.number || 1) + 1;
    devState.spikeState = '';
    devState.players.forEach(p => { p.alive = true; p.health = 100; });
    _devSetBuying(_curGameTime + 5);
  } else if (action === 'win-def') {
    const atkSide = atkSideForRound(devState.round.number || 1);
    const defSide = atkSide === 'order' ? 'chaos' : 'order';
    if (defSide === 'order') devState.order.score++;
    else devState.chaos.score++;
    devState.roundHistory.push({ round: devState.round.number, winner: defSide === 'order' ? 'ORDER' : 'CHAOS' });
    devState.round.number = (devState.round.number || 1) + 1;
    devState.spikeState = '';
    devState.players.forEach(p => { p.alive = true; p.health = 100; });
    _devSetBuying(_curGameTime + 5);
  } else if (action === 'buy-phase') {
    devState.spikeState = '';
    if (devState.round.phase === 'shopping') _devSetPlaying(_curGameTime + 25);
    else _devSetBuying(_curGameTime + 5);
  } else if (action === 'halftime') {
    devState.round.number = 13;
    devState.spikeState = '';
    _devSetBuying(_curGameTime + 5);
  } else if (action === 'ot-round') {
    devState.round.number = Math.max(25, devState.round.number + 1);
    _devSetBuying(_curGameTime + 5);
  } else if (action === 'kill-atk') {
    const atkSide = atkSideForRound(devState.round.number || 1);
    const team = atkSide === 'order' ? 'ORDER' : 'CHAOS';
    const p = devState.players.find(pl => pl.team === team && pl.alive);
    if (p) { p.alive = false; p.health = 0; }
  } else if (action === 'kill-def') {
    const atkSide = atkSideForRound(devState.round.number || 1);
    const team = atkSide === 'order' ? 'CHAOS' : 'ORDER';
    const p = devState.players.find(pl => pl.team === team && pl.alive);
    if (p) { p.alive = false; p.health = 0; }
  } else if (action === 'revive-all') {
    devState.players.forEach(p => { p.alive = true; p.health = 100; });
  } else if (action === 'spec-cycle') {
    const alive = devState.players.filter(p => p.alive);
    const curIdx = alive.findIndex(p => p.observed);
    devState.players.forEach(p => { p.observed = false; });
    const next = alive[(curIdx + 1) % alive.length];
    if (next) next.observed = true;
  }
  render(devState);
}

(function initDevPanel() {
  const devMode = new URLSearchParams(location.search).get('dev') === '1';
  if (window.obsstudio && !devMode) return; // hide inside OBS unless ?dev=1
  const panel = el('dev-panel'), fab = el('dev-fab');
  if (!panel || !fab) return;
  panel.classList.add('open');
  panel.querySelectorAll('[data-dev]').forEach(btn =>
    btn.addEventListener('click', () => devAction(btn.getAttribute('data-dev')))
  );
  el('dev-collapse').addEventListener('click', () => { panel.classList.remove('open'); fab.style.display = 'block'; });
  fab.addEventListener('click', () => { fab.style.display = 'none'; panel.classList.add('open'); });
  if (window.obsstudio && devMode) {
    const badge = el('dev-obs-badge');
    if (badge) badge.style.display = 'inline';
  }
  if (devMode && !devState) {
    if (!appEventName) appEventName = 'VCT MASTERS â€” GRAND FINAL';
    devState = makeDemoState();
    _devSetPlaying(1000);
    render(devState);
  }
})();
