// ============================================================
//  cs2-spectator.cfg  —  clean observer view for JotaOverlay
//  Hides the native CS2 in-game HUD so only your broadcast
//  overlay (scoreboard / radar / kill feed) shows over the feed.
//
//  INSTALL — copy this file into your CS2 cfg folder:
//    ...\Counter-Strike Global Offensive\game\csgo\cfg\
//
//  USE IT (two ways):
//   1) Dedicated observer / broadcast PC  (fully automatic):
//        add this one line to  autoexec.cfg :
//            exec cs2-spectator
//        → HUD is hidden every launch, no keypress, nothing to remember.
//
//   2) Shared PC you also play on:
//        run in console when you start spectating:
//            exec cs2-spectator
//        → press F9 anytime to toggle the HUD back for normal play.
// ============================================================

// Enter clean observer view now (HUD + crosshair off):
cl_drawhud 0            // hide the entire native HUD (we draw our own)
crosshair 0             // hide the observed player's crosshair

// --- optional clean-feed extras --------------------------------------------
// These are cheat-flagged, so they only apply when the PRIVATE-MATCH HOST has
// set  sv_cheats 1  (harmless / ignored otherwise):
cl_draw_only_deathnotices 0     // we render our own kill feed
spec_show_xray 0                // no auto wall-hack outlines on the feed
cl_drawhud_force_radar 0

// F9 flips between CLEAN (spectating) and NORMAL (playing) — toggles HUD + crosshair together,
// so going back to play restores your crosshair too. First press after exec = back to normal.
alias _hud_clean  "cl_drawhud 0; crosshair 0; alias _hud_toggle _hud_normal"
alias _hud_normal "cl_drawhud 1; crosshair 1; alias _hud_toggle _hud_clean"
alias _hud_toggle _hud_normal
bind "F9" "_hud_toggle"

echo "[JotaOverlay] spectator HUD config loaded -- F9 toggles clean observer view"
